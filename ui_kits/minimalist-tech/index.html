<!doctype html>
<html lang="en" data-preset="tech">
<head>
<meta charset="utf-8" />
<title>Forge — minimalist-tech UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  /* Local overrides — paleta cool blue-grey + acento neon-green único.
     A diferença pro warm-editorial: sidebar CLARA (não dark), zero card-shadow,
     hairlines e densidade no lugar de respiro generoso, asymmetric grid. */
  :root{
    --ink: 222 42% 9%;
    --paper: 220 18% 97%;
    --paper-2: 220 16% 94%;
    --rule: 222 12% 82%;
    --rule-soft: 222 12% 88%;
    --muted: 222 10% 42%;
    --signal: 142 100% 45%;       /* neon green */
    --signal-ink: 142 90% 22%;
    --warn: 28 92% 50%;
    --bad: 0 72% 48%;
  }
  html,body{margin:0;padding:0;background:hsl(var(--paper));color:hsl(var(--ink));font-family:'Inter',ui-sans-serif,system-ui,sans-serif;font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;border-radius:0}
  input,select{font-family:inherit;font-size:13px;color:inherit;border-radius:0}
  a{color:inherit;text-decoration:none}

  /* Numbers always tabular, mono */
  .num,.mono{font-family:'Geist Mono',ui-monospace,monospace;font-feature-settings:'tnum','ss01'}

  /* Global icon sizing — all chrome SVGs constrained to 14×14 unless overridden */
  .side svg, .topbar svg, .ws svg, .deploy-card svg, .modal-head svg, .form-row svg, .filterbar svg, .pipeline svg, .toast svg{width:14px;height:14px;flex-shrink:0}
  .metric .spark{width:80px;height:24px;flex-shrink:0}

  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* ===== Sidebar — LIGHT, hairline, dense ===== */
  .side{background:hsl(var(--paper));border-right:1px solid hsl(var(--rule));display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid hsl(var(--rule))}
  .brand-mark{width:24px;height:24px;background:hsl(var(--ink));color:hsl(var(--signal));display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-weight:600;font-size:13px;letter-spacing:-.04em}
  .brand-name{font-family:'Geist Mono',monospace;font-size:14px;font-weight:600;letter-spacing:-.01em}
  .brand-name b{color:hsl(var(--signal-ink))}

  /* workspace pill */
  .ws{margin:14px 14px 8px;padding:8px 10px;border:1px solid hsl(var(--rule));background:hsl(var(--paper));display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
  .ws:hover{background:hsl(var(--paper-2))}
  .ws-orb{width:10px;height:10px;background:hsl(var(--signal));position:relative}
  .ws-orb::after{content:"";position:absolute;inset:-3px;border:1px solid hsl(var(--signal));opacity:.4}
  .ws-name{font-family:'Geist Mono',monospace;font-weight:500}
  .ws-team{margin-left:auto;font-size:10px;color:hsl(var(--muted));text-transform:uppercase;letter-spacing:.08em}

  .nav-section{padding:8px 6px}
  .section-label{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.18em;color:hsl(var(--muted));padding:10px 12px 8px;display:flex;align-items:baseline;gap:8px}
  .section-label::after{content:"";flex:1;height:1px;background:hsl(var(--rule))}

  .nav{display:flex;align-items:center;gap:10px;padding:5px 12px;font-size:13px;color:hsl(var(--ink));position:relative;cursor:pointer;font-family:'Geist Mono',monospace;letter-spacing:-.005em;line-height:1.6}
  .nav:hover{background:hsl(var(--paper-2))}
  .nav.active{background:hsl(var(--ink));color:hsl(var(--paper))}
  .nav.active .num-tag{color:hsl(var(--signal))}
  .nav .ic{width:14px;height:14px;flex-shrink:0;opacity:.85}
  .nav .num-tag{margin-left:auto;font-size:11px;color:hsl(var(--muted));font-feature-settings:'tnum'}
  .nav .new-dot{margin-left:auto;width:5px;height:5px;background:hsl(var(--signal))}
  .nav .new-dot + .num-tag{margin-left:6px}

  /* sidebar bottom: deploy state */
  .deploy-card{margin:auto 14px 14px;border:1px solid hsl(var(--rule));padding:12px;font-family:'Geist Mono',monospace;font-size:11px;background:hsl(var(--paper))}
  .deploy-card .lbl{color:hsl(var(--muted));text-transform:uppercase;letter-spacing:.12em;font-size:9.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .deploy-card .lbl .pulse{width:6px;height:6px;background:hsl(var(--signal));position:relative}
  .deploy-card .lbl .pulse::after{content:"";position:absolute;inset:-3px;border:1px solid hsl(var(--signal));animation:wave 1.6s ease-out infinite;opacity:0}
  @keyframes wave{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.4);opacity:0}}
  .deploy-card .sha{font-size:13px;font-weight:600;letter-spacing:-.005em}
  .deploy-card .sha em{color:hsl(var(--signal-ink));font-style:normal}
  .deploy-card .meta{color:hsl(var(--muted));margin-top:4px;font-size:10.5px;line-height:1.4}
  .deploy-card .progress{height:2px;background:hsl(var(--rule));margin-top:8px;position:relative;overflow:hidden}
  .deploy-card .progress::after{content:"";position:absolute;inset:0;width:62%;background:hsl(var(--signal))}

  /* user footer */
  .user{padding:10px 14px;border-top:1px solid hsl(var(--rule));display:flex;align-items:center;gap:10px;font-family:'Geist Mono',monospace;font-size:11.5px}
  .avatar{width:24px;height:24px;background:hsl(var(--ink));color:hsl(var(--signal));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px}
  .uname{font-weight:500}
  .ushort{color:hsl(var(--muted));font-size:10px;margin-left:auto}

  /* ===== Main ===== */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{height:48px;border-bottom:1px solid hsl(var(--rule));display:flex;align-items:center;padding:0 24px;gap:14px;background:hsl(var(--paper));position:sticky;top:0;z-index:5;font-family:'Geist Mono',monospace;font-size:12px}
  .crumbs{display:flex;align-items:center;gap:6px;color:hsl(var(--muted))}
  .crumbs .sep{opacity:.4}
  .crumbs strong{color:hsl(var(--ink));font-weight:500}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .branch-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid hsl(var(--rule));padding:3px 8px;font-size:11.5px}
  .branch-pill .dot{width:6px;height:6px;background:hsl(var(--signal))}
  .branch-pill b{color:hsl(var(--ink));font-weight:500}
  .search{display:flex;align-items:center;gap:8px;border:1px solid hsl(var(--rule));padding:4px 10px;width:240px;background:hsl(var(--paper))}
  .search:focus-within{border-color:hsl(var(--ink))}
  .search input{background:transparent;border:none;outline:none;flex:1;font-size:12px;font-family:'Geist Mono',monospace;color:hsl(var(--ink))}
  .search input::placeholder{color:hsl(var(--muted))}
  .kbd{font-family:'Geist Mono',monospace;font-size:10px;border:1px solid hsl(var(--rule));padding:0 4px;color:hsl(var(--muted));background:hsl(var(--paper-2))}

  /* PAGE shell */
  .page{padding:28px 32px 64px;display:flex;flex-direction:column;gap:28px;max-width:1320px}

  /* Page header — asymmetric, no cards */
  .page-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:flex-end;border-bottom:1px solid hsl(var(--rule));padding-bottom:18px}
  .page-eyebrow{font-family:'Geist Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.18em;color:hsl(var(--muted));margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .page-eyebrow::before{content:"//";color:hsl(var(--signal-ink));font-weight:600;letter-spacing:0}
  .page-title{font-size:34px;font-weight:600;letter-spacing:-.025em;margin:0;line-height:1.05}
  .page-title em{font-style:normal;color:hsl(var(--signal-ink));font-feature-settings:'tnum'}
  .page-sub{font-size:13px;color:hsl(var(--muted));margin:6px 0 0;max-width:540px;line-height:1.5}
  .page-actions{display:flex;gap:8px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;font-weight:500;font-family:'Geist Mono',monospace;letter-spacing:-.005em;transition:all 100ms;border-radius:0}
  .btn-primary{background:hsl(var(--ink));color:hsl(var(--paper));border:1px solid hsl(var(--ink));box-shadow:3px 3px 0 hsl(var(--signal))}
  .btn-primary:hover{box-shadow:1px 1px 0 hsl(var(--signal));transform:translate(2px,2px)}
  .btn-secondary{background:transparent;color:hsl(var(--ink));border:1px solid hsl(var(--ink))}
  .btn-secondary:hover{background:hsl(var(--ink));color:hsl(var(--paper))}
  .btn-ghost{color:hsl(var(--muted));padding:6px 8px}
  .btn-ghost:hover{color:hsl(var(--ink))}

  /* ============ KPI ROW — INLINE METRICS, not cards ============ */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid hsl(var(--rule));border-bottom:1px solid hsl(var(--rule))}
  .metric{padding:18px 20px 16px;display:flex;flex-direction:column;gap:6px;border-right:1px solid hsl(var(--rule));position:relative}
  .metric:last-child{border-right:none}
  .metric .lbl{font-family:'Geist Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted))}
  .metric .val{font-size:38px;font-weight:600;letter-spacing:-.035em;line-height:1;font-feature-settings:'tnum';margin-top:2px}
  .metric .val .unit{font-size:18px;color:hsl(var(--muted));font-weight:500;margin-left:4px;letter-spacing:-.02em}
  .metric .delta{font-family:'Geist Mono',monospace;font-size:11px;color:hsl(var(--muted));display:flex;align-items:center;gap:6px;margin-top:auto}
  .metric .delta b{font-weight:500}
  .metric .delta.up b{color:hsl(var(--signal-ink))}
  .metric .delta.dn b{color:hsl(var(--bad))}
  .metric .spark{position:absolute;right:16px;top:18px;width:80px;height:24px}

  /* ============ MAIN GRID — asymmetric 12-col ============ */
  .grid12{display:grid;grid-template-columns:repeat(12,1fr);gap:0;border-top:1px solid hsl(var(--rule));border-bottom:1px solid hsl(var(--rule))}
  .panel{padding:20px 22px;border-right:1px solid hsl(var(--rule))}
  .panel:last-child{border-right:none}
  .panel-7{grid-column:span 7}
  .panel-5{grid-column:span 5}
  .panel-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:14px}
  .panel-h h3{font-size:14px;font-weight:600;margin:0;letter-spacing:-.01em}
  .panel-h .meta{font-family:'Geist Mono',monospace;font-size:10.5px;color:hsl(var(--muted));text-transform:uppercase;letter-spacing:.12em}

  /* ============ DEPLOY LIST (left panel) ============ */
  .deploy-list{display:flex;flex-direction:column}
  .deploy-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;padding:12px 0;border-bottom:1px solid hsl(var(--rule-soft));align-items:center}
  .deploy-row:last-child{border-bottom:none}
  .deploy-row:hover{background:hsl(var(--paper-2));margin:0 -22px;padding-left:22px;padding-right:22px}
  .step-dot{width:10px;height:10px;flex-shrink:0;position:relative}
  .step-dot.ok{background:hsl(var(--signal))}
  .step-dot.live{background:hsl(var(--signal))}
  .step-dot.live::after{content:"";position:absolute;inset:-4px;border:1px solid hsl(var(--signal));animation:wave 1.6s ease-out infinite}
  .step-dot.warn{background:hsl(var(--warn))}
  .step-dot.bad{background:hsl(var(--bad))}
  .step-dot.queued{background:hsl(var(--rule));border:1px solid hsl(var(--muted))}

  .deploy-info{min-width:0}
  .deploy-info .top{display:flex;align-items:baseline;gap:10px;font-size:13.5px;font-weight:500}
  .deploy-info .top .sha{font-family:'Geist Mono',monospace;background:hsl(var(--paper-2));padding:1px 5px;font-size:11px;color:hsl(var(--ink));border:1px solid hsl(var(--rule));font-weight:500}
  .deploy-info .msg{margin-left:0;color:hsl(var(--ink));overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .deploy-info .bot{font-family:'Geist Mono',monospace;font-size:10.5px;color:hsl(var(--muted));margin-top:3px;display:flex;gap:10px;align-items:center}
  .deploy-info .bot .arrow{opacity:.5}
  .deploy-info .bot .author{color:hsl(var(--ink));font-weight:500}

  .deploy-time{font-family:'Geist Mono',monospace;font-size:11px;color:hsl(var(--muted));text-align:right;line-height:1.3}
  .deploy-time .took{color:hsl(var(--ink));font-weight:500}

  .deploy-status{font-family:'Geist Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border:1px solid currentColor;width:fit-content}
  .deploy-status.live{color:hsl(var(--signal-ink));background:hsl(var(--signal)/.18);border-color:hsl(var(--signal-ink))}
  .deploy-status.ok{color:hsl(var(--ink))}
  .deploy-status.warn{color:hsl(var(--warn));background:hsl(var(--warn)/.08)}
  .deploy-status.bad{color:hsl(var(--bad));background:hsl(var(--bad)/.06)}
  .deploy-status.queued{color:hsl(var(--muted))}

  /* ============ ENVIRONMENT MATRIX (right panel) ============ */
  .env-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:hsl(var(--rule));margin:0 -22px -20px;padding:1px 0 0;border-top:1px solid hsl(var(--rule))}
  .env-cell{background:hsl(var(--paper));padding:14px 16px;display:flex;flex-direction:column;gap:4px;cursor:pointer;border-bottom:1px solid hsl(var(--rule));position:relative}
  .env-cell:hover{background:hsl(var(--paper-2))}
  .env-cell.live{background:hsl(var(--signal)/.08)}
  .env-cell.live::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:hsl(var(--signal))}
  .env-cell .env-name{font-family:'Geist Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:hsl(var(--ink))}
  .env-cell .env-sha{font-family:'Geist Mono',monospace;font-size:14px;font-weight:600;letter-spacing:-.01em;color:hsl(var(--ink))}
  .env-cell .env-meta{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(var(--muted));line-height:1.45}
  .env-cell .env-region{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(var(--muted));margin-top:auto;display:flex;gap:6px;flex-wrap:wrap}
  .env-cell .env-region span{padding:1px 5px;border:1px solid hsl(var(--rule));background:hsl(var(--paper-2));color:hsl(var(--ink))}

  /* ============ FILTER BAR + SUB ============ */
  .filterbar{display:flex;align-items:center;gap:14px;justify-content:space-between}
  .filter-group{display:flex;border:1px solid hsl(var(--rule))}
  .filter-group .seg{padding:5px 12px;font-family:'Geist Mono',monospace;font-size:11.5px;color:hsl(var(--muted));border-right:1px solid hsl(var(--rule));cursor:pointer;letter-spacing:-.005em}
  .filter-group .seg:last-child{border-right:none}
  .filter-group .seg.active{background:hsl(var(--ink));color:hsl(var(--paper))}
  .filter-group .seg .count{margin-left:6px;color:hsl(var(--muted))}
  .filter-group .seg.active .count{color:hsl(var(--signal))}
  .filter-group .seg:hover:not(.active){background:hsl(var(--paper-2));color:hsl(var(--ink))}

  .filter-counts{font-family:'Geist Mono',monospace;font-size:11px;color:hsl(var(--muted))}
  .filter-counts b{color:hsl(var(--ink));font-weight:500}

  /* ============ PIPELINE TABLE ============ */
  .pipeline{border:1px solid hsl(var(--rule));background:hsl(var(--paper))}
  .pipeline-head{display:grid;grid-template-columns:24px 1.4fr 110px 130px 120px 120px 60px;gap:12px;padding:8px 16px;font-family:'Geist Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:hsl(var(--muted));border-bottom:1px solid hsl(var(--rule));background:hsl(var(--paper-2))}

  .grow-head{font-family:'Geist Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.16em;color:hsl(var(--ink));text-transform:uppercase;padding:10px 16px 6px;display:flex;align-items:center;gap:10px;background:hsl(var(--paper));border-bottom:1px solid hsl(var(--rule-soft))}
  .grow-head::before{content:"▸";color:hsl(var(--signal-ink));margin-right:2px}
  .grow-head .count{margin-left:auto;color:hsl(var(--muted));font-weight:400}

  .pipe-row{display:grid;grid-template-columns:24px 1.4fr 110px 130px 120px 120px 60px;gap:12px;padding:11px 16px;align-items:center;font-size:13px;border-bottom:1px solid hsl(var(--rule-soft));cursor:pointer;font-family:'Geist Mono',monospace}
  .pipe-row:hover{background:hsl(var(--paper-2))}
  .pipe-row:last-child{border-bottom:none}
  .pipe-row .check{width:14px;height:14px;border:1px solid hsl(var(--rule));background:hsl(var(--paper))}
  .pipe-row.checked .check{background:hsl(var(--ink));border-color:hsl(var(--ink));position:relative}
  .pipe-row.checked .check::after{content:"";position:absolute;inset:3px 4px 4px 3px;border-bottom:2px solid hsl(var(--signal));border-right:2px solid hsl(var(--signal));transform:rotate(45deg) translate(-1px,-1px);width:3px;height:7px}
  .pipe-row .name-c{display:flex;align-items:center;gap:8px;min-width:0;font-family:'Inter',sans-serif}
  .pipe-row .name-c .name{font-weight:500;color:hsl(var(--ink));overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pipe-row .name-c .icon-svc{width:18px;height:18px;background:hsl(var(--ink));color:hsl(var(--signal));display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:9.5px;font-weight:600;flex-shrink:0;letter-spacing:-.03em}
  .pipe-row .name-c .icon-svc.b{background:hsl(220 80% 50%);color:#fff}
  .pipe-row .name-c .icon-svc.c{background:hsl(290 70% 55%);color:#fff}
  .pipe-row .name-c .icon-svc.d{background:hsl(28 90% 55%);color:#fff}
  .pipe-row .name-c .icon-svc.e{background:hsl(180 70% 30%);color:hsl(var(--signal))}

  .pipe-row .v{font-feature-settings:'tnum';color:hsl(var(--ink))}
  .pipe-row .build{display:flex;align-items:center;gap:8px;font-size:11.5px;color:hsl(var(--muted))}
  .pipe-row .build .bar{height:4px;flex:1;background:hsl(var(--rule));position:relative;max-width:80px}
  .pipe-row .build .bar::after{content:"";position:absolute;left:0;top:0;bottom:0;background:hsl(var(--signal));width:var(--p,100%)}
  .pipe-row .build.fail .bar::after{background:hsl(var(--bad))}
  .pipe-row .build.warn .bar::after{background:hsl(var(--warn))}

  .pipe-row .stat{font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .pipe-row .stat.ok{color:hsl(var(--signal-ink))}
  .pipe-row .stat.warn{color:hsl(var(--warn))}
  .pipe-row .stat.fail{color:hsl(var(--bad))}
  .pipe-row .stat.queued{color:hsl(var(--muted))}
  .pipe-row .stat::before{content:"●";margin-right:5px;font-size:9px;vertical-align:middle}

  .pipe-row .time{font-size:11px;color:hsl(var(--muted))}
  .pipe-row .actions{font-size:11px;color:hsl(var(--muted));text-align:right}
  .pipe-row .actions:hover{color:hsl(var(--ink))}

  /* ============ MODAL ============ */
  .scrim{position:fixed;inset:0;background:hsl(var(--ink)/.55);display:flex;align-items:center;justify-content:center;z-index:50;animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:hsl(var(--paper));max-width:520px;width:100%;border:1px solid hsl(var(--ink));box-shadow:6px 6px 0 hsl(var(--signal))}
  .modal-head{padding:14px 18px;border-bottom:1px solid hsl(var(--rule));display:flex;justify-content:space-between;align-items:center;font-family:'Geist Mono',monospace}
  .modal-head h3{font-size:14px;font-weight:600;margin:0}
  .modal-head h3::before{content:"//";color:hsl(var(--signal-ink));margin-right:8px}
  .modal-head .esc{font-size:10px;text-transform:uppercase;letter-spacing:.15em;border:1px solid hsl(var(--rule));padding:2px 7px;color:hsl(var(--muted))}
  .modal-body{padding:18px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .form-row label{font-family:'Geist Mono',monospace;font-size:10.5px;color:hsl(var(--muted));text-transform:uppercase;letter-spacing:.14em}
  .form-row input,.form-row select,.form-row textarea{padding:7px 10px;border:1px solid hsl(var(--rule));background:hsl(var(--paper));outline:none;color:hsl(var(--ink));font-family:'Geist Mono',monospace;font-size:13px}
  .form-row input:focus,.form-row select:focus{border-color:hsl(var(--ink));box-shadow:2px 2px 0 hsl(var(--signal))}
  .form-row .helper{font-size:11px;color:hsl(var(--muted));font-family:'Geist Mono',monospace}
  .modal-foot{padding:12px 18px;border-top:1px solid hsl(var(--rule));display:flex;justify-content:space-between;align-items:center;background:hsl(var(--paper-2))}

  /* ============ TOAST ============ */

// === Mini sparkline ===
function Spark({ data, color = "currentColor" }) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const w = 80, h = 24, step = w / (data.length - 1);
  const pts = data.map((v, i) => `${i * step},${h - ((v - min) / range) * (h - 2) - 1}`).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="spark" style={{stroke: color, fill:"none", strokeWidth:1.25}}>
      <polyline points={pts} />
    </svg>
  );
}

function Metric({ lbl, value, unit, delta, dir, spark, sparkColor }) {
  return (
    <div className="metric">

        <div className="toast">
          <span className="ok-mark">▸</span>
          <span>{toast.svc} / <b style={{color:"hsl(var(--signal))"}}>{toast.sha}</b> shipped to canary</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
