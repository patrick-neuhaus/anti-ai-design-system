<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Display · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }
  
    /* Wave 9.4 — CTA responsive */
    .nav-cta-mini .nav-cta-text { display: inline; }
    .nav-cta-mini .nav-cta-icon { display: none; }
    @media (max-width: 768px) {
      .nav-cta-mini {
        width: 36px; height: 36px; padding: 0;
        border-radius: 50%; display: inline-flex;
        align-items: center; justify-content: center;
      }
      .nav-cta-mini .nav-cta-text { display: none; }
      .nav-cta-mini .nav-cta-icon { display: inline; font-size: 16px; }
    }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/display/Badge.jsx"></script>
  <script type="text/babel" src="../components/display/StatusBadge.jsx"></script>
  <script type="text/babel" src="../components/display/Tag.jsx"></script>
  <script type="text/babel" src="../components/display/Avatar.jsx"></script>
  <script type="text/babel" src="../components/display/Alert.jsx"></script>
  <script type="text/babel" src="../components/display/EmptyState.jsx"></script>
  <script type="text/babel" src="../components/display/Skeleton.jsx"></script>
  <script type="text/babel" src="../components/display/Spinner.jsx"></script>
  <script type="text/babel" src="../components/display/Toast.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"],["screens","Screens"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const App = () => {
      const [skLoaded, setSkLoaded] = React.useState(false);
      return (
        <>
          <h1>Display</h1>
          <p className="lead">Pílulas de status, avatares, alerts e estados de carregamento.</p>

          <ShowcaseSection title="Badge — intents (dot auto em non-neutral)">
            {/* F-UX-009: intent guidance legend — grid 3x2 */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, padding: "12px 16px", background: "hsl(var(--muted) / .4)", borderRadius: 8, border: "1px solid hsl(var(--border) / .4)" }}>
              {[
                { intent: "neutral",     label: "Neutral",     use: "Rótulos informativos, contagens" },
                { intent: "primary",     label: "Primary",     use: "Destaque, novo, selecionado" },
                { intent: "success",     label: "Success",     use: "Completo, aprovado, ativo" },
                { intent: "warning",     label: "Warning",     use: "Atenção, pendente, expirado" },
                { intent: "info",        label: "Info",        use: "Em andamento, em conferência" },
                { intent: "destructive", label: "Destructive", use: "Erro, rejeitado, crítico" },
              ].map(({ intent, label, use }) => (
                <div key={intent} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <Badge intent={intent}>{label}</Badge>
                  <span style={{ fontSize: 11, color: "hsl(var(--muted-foreground))", lineHeight: 1.3 }}>{use}</span>
                </div>
              ))}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="StatusBadge — domain mapping">
            <div className="showcase-row">
              {["conferido","pendente","em_conferencia","divergente","finalizado"].map((s) => (
                <StatusBadge key={s} value={s} />
              ))}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Tag, Avatar">
            <div className="showcase-row">
              <Tag>filtro</Tag>
              <Tag onRemove={() => {}}>removível</Tag>
              <Avatar name="Carlos Andrade" />
              <Avatar name="Ana Souza" intent="accent" />
              <Avatar name="Pedro Lima" size={48} intent="neutral" />
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Alert">
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <Alert intent="info" title="Info">Mensagem informativa.</Alert>
              <Alert intent="success" title="Sucesso">Operação concluída.</Alert>
              <Alert intent="warning" title="Atenção">Algo precisa de revisão.</Alert>
              <Alert intent="destructive" title="Erro">Falhou — tente novamente.</Alert>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="EmptyState">
            <EmptyState
              icon={Icon.Inbox}
              title="Nada por aqui"
              description="Crie um item pra começar."
              action={<Button iconLeft={Icon.Plus}>Novo</Button>}
            />
          </ShowcaseSection>

          <ShowcaseSection title="Skeleton, Spinner">
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <Skeleton width="60%" height={20} />
              <Skeleton width="80%" height={14} />
              <Skeleton width="40%" height={14} />
              <div className="showcase-row" style={{ marginTop: 12 }}>
                <Spinner />
                <Spinner size={24} color="hsl(var(--accent))" />
                <Button onClick={() => setSkLoaded((v) => !v)} variant="outline">{skLoaded ? "Reset" : "Demo loading"}</Button>
              </div>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Toast — imperative API"
            meta="Notificações que aparecem no canto da tela. Stack automático, dismiss manual.">
            <div className="showcase-row">
              <Button onClick={() => window.toast("Salvo")}>Default</Button>
              <Button variant="outline" onClick={() => window.toast({ title: "Sucesso", body: "Tudo certo.", intent: "success" })}>Success</Button>
              <Button variant="outline" onClick={() => window.toast({ title: "Falhou", body: "Tente de novo.", intent: "destructive", duration: 6000 })}>Destructive</Button>
            </div>
            <ToastHost />
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="display" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* Dropdown click-to-open */
    (function () {
      var dd = document.querySelector('.fh-dropdown');
      var btn = document.querySelector('.fh-dropdown-btn');
      var menu = document.querySelector('.fh-dropdown-menu');
      if (!dd || !btn || !menu) return;
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-haspopup', 'true');
      function openDD() { dd.setAttribute('data-open', 'true'); btn.setAttribute('aria-expanded', 'true'); }
      function closeDD() { dd.removeAttribute('data-open'); btn.setAttribute('aria-expanded', 'false'); }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        dd.hasAttribute('data-open') ? closeDD() : openDD();
      });
      document.addEventListener('click', function (e) {
        if (!dd.contains(e.target)) closeDD();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeDD(); btn.focus(); }
      });
      menu.addEventListener('keydown', function (e) {
        var items = Array.from(menu.querySelectorAll('a'));
        var idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); var next = items[(idx + 1) % items.length]; if (next) next.focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); var prev = items[(idx - 1 + items.length) % items.length]; if (prev) prev.focus(); }
        if (e.key === 'Escape')    { closeDD(); btn.focus(); }
        if (e.key === 'Tab' && !e.shiftKey && idx === items.length - 1) { closeDD(); }
      });
    })();
  </script>
</body>
</html>
