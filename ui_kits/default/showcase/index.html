<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-AI Design System</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      margin: 0;
      overflow-x: hidden;
    }

    /* Sticky CTA */
    .sticky-cta {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 16px hsl(var(--accent) / .35);
      transition: transform 150ms, box-shadow 150ms;
    }
    .sticky-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px hsl(var(--accent) / .45);
    }

    /* Layout */
    .section-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px;
    }
    .section-wrap + .section-wrap {
      padding-top: 0;
    }
    section.alt-bg {
      background: hsl(var(--muted) / .4);
    }

    /* Typography */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    h1.hero-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 600;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin: 0 0 20px;
      color: hsl(var(--foreground));
    }
    h2.section-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0 0 8px;
    }
    .section-sub {
      font-size: 15px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0 0 40px;
    }

    /* Hero */
    .hero-sub {
      font-size: 18px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      max-width: 560px;
      margin: 0 0 32px;
    }
    .palette-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    .chip-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      cursor: default;
      transition: border-color 150ms;
    }
    .chip-swatch:hover { border-color: hsl(var(--foreground) / .3); }
    .chip-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }

    /* Anti-padrão cards */
    .antipatterns-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .antipattern-card {
      padding: 24px;
      border: 1px solid hsl(var(--border));
      border-radius: 16px;
      background: hsl(var(--card));
    }
    .antipattern-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: hsl(var(--accent) / .12);
      color: hsl(var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
    }
    .antipattern-card h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .antipattern-card p {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0;
    }

    /* Tokens vivos */
    .tokens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .token-group h4 {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    .token-swatches { display: flex; flex-direction: column; gap: 6px; }
    .token-swatch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-color {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-label { font-size: 12px; font-weight: 500; }
    .token-swatch-var { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); margin-top: 1px; }

    /* Type scale */
    .type-scale { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    .type-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid hsl(var(--border));
    }
    .type-meta { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); min-width: 100px; flex-shrink: 0; }
    .radius-demo { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .radius-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .radius-box {
      width: 56px;
      height: 56px;
      background: hsl(var(--primary) / .15);
      border: 2px solid hsl(var(--primary) / .4);
    }
    .radius-label { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); }

    /* Categorias */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .category-card {
      display: block;
      padding: 20px;
      border: 1px solid hsl(var(--border));
      border-radius: 14px;
      background: hsl(var(--card));
      text-decoration: none;
      color: inherit;
      transition: border-color 150ms, box-shadow 150ms, transform 150ms;
    }
    .category-card:hover {
      border-color: hsl(var(--accent) / .5);
      box-shadow: 0 4px 16px hsl(var(--foreground) / .06);
      transform: translateY(-2px);
    }
    .category-card .cat-icon { font-size: 22px; margin-bottom: 10px; }
    .category-card .cat-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .category-card .cat-count { font-size: 12px; color: hsl(var(--muted-foreground)); }
    .category-card .cat-arrow {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 500;
      color: hsl(var(--accent));
    }

    /* Template preview */
    .templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .template-card {
      border: 1px solid hsl(var(--border));
      border-radius: 20px;
      overflow: hidden;
      background: hsl(var(--card));
      transition: box-shadow 150ms, transform 150ms;
    }
    .template-card:hover {
      box-shadow: 0 8px 32px hsl(var(--foreground) / .08);
      transform: translateY(-3px);
    }
    .template-preview {
      height: 180px;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .mini-sidebar {
      width: 60px;
      background: hsl(var(--sidebar-background));
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 6px;
      flex-shrink: 0;
    }
    .mini-brand {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: hsl(var(--accent));
      margin: 0 auto 8px;
    }
    .mini-nav-item {
      height: 6px;
      border-radius: 3px;
      background: hsl(var(--sidebar-foreground) / .3);
    }
    .mini-nav-item.active {
      background: hsl(var(--sidebar-indicator));
      width: 70%;
    }
    .mini-main {
      flex: 1;
      padding: 12px;
      background: hsl(var(--background));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mini-kpi-row { display: flex; gap: 6px; }
    .mini-kpi {
      flex: 1;
      height: 36px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .mini-table {
      flex: 1;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .template-info { padding: 20px; }
    .template-info h4 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
    .template-info p { font-size: 13px; color: hsl(var(--muted-foreground)); margin: 0 0 14px; line-height: 1.5; }
    .template-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 150ms;
    }
    .template-link:hover { background: hsl(var(--primary) / .9); }

    /* Como usar tabs */
    .tabs-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid hsl(var(--border));
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 18px;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: hsl(var(--muted-foreground));
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 150ms;
    }
    .tab-btn.active {
      color: hsl(var(--foreground));
      border-bottom-color: hsl(var(--accent));
    }
    .tab-btn:hover:not(.active) { color: hsl(var(--foreground)); }
    .code-block {
      background: hsl(var(--sidebar-background));
      color: hsl(var(--sidebar-foreground));
      border-radius: 12px;
      padding: 20px 24px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }
    .code-comment { color: hsl(var(--sidebar-foreground) / .5); }
    .code-tag { color: hsl(var(--accent)); }
    .code-attr { color: hsl(var(--sidebar-indicator)); }
    .code-string { color: hsl(174 60% 65%); }

    /* Footer */
    footer {
      border-top: 1px solid hsl(var(--border));
      padding: 40px 32px;
      text-align: center;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    footer a { color: hsl(var(--accent)); text-decoration: none; }

    @media (max-width: 640px) {
      .section-wrap { padding: 48px 20px; }
      .sticky-cta { top: 12px; right: 12px; padding: 8px 14px; font-size: 12px; }
    }

    /* ==================================================
       SCROLLYTELLING — sections fade-up + stagger children
       ================================================== */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    /* Stagger children (.reveal-stagger > *) */
    .reveal-stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1); }
    .reveal-stagger.in > *  { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
    .reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
    .reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }

    /* Section progress bar (top of viewport) */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 200;
      transition: width 80ms linear;
      pointer-events: none;
    }

    /* ==================================================
       HERO CANVAS — floating component cards + parallax
       ================================================== */
    .hero-canvas-wrap {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
      min-height: 520px;
    }
    @media (min-width: 960px) {
      .hero-canvas-wrap { grid-template-columns: 1.1fr 1fr; }
    }
    .hero-canvas {
      position: relative;
      height: 480px;
      perspective: 1200px;
      pointer-events: none;
    }
    .float-card {
      position: absolute;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 20px 50px -20px hsl(var(--foreground) / .18), 0 4px 12px -4px hsl(var(--foreground) / .08);
      transition: transform 200ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
      pointer-events: auto;
    }
    .float-card.fc-stat   { top: 8%;  left: 0;  width: 220px; animation: float-a 6s ease-in-out infinite; }
    .float-card.fc-side   { top: 26%; right: 4%; width: 200px; animation: float-b 7s ease-in-out infinite; padding: 0; overflow: hidden; }
    .float-card.fc-pal    { bottom: 14%; left: 8%; width: 240px; animation: float-c 8s ease-in-out infinite; }
    .float-card.fc-badge  { bottom: 6%; right: 10%; width: auto; animation: float-d 5.5s ease-in-out infinite; padding: 8px 14px; border-radius: 999px; }

    @keyframes float-a { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(-1deg); } }
    @keyframes float-b { 0%,100% { transform: translateY(0) rotate(1deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
    @keyframes float-c { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
    @keyframes float-d { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    /* Hero card content */
    .fc-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .fc-stat-icon { width: 32px; height: 32px; border-radius: 8px; background: hsl(var(--accent) / .15); display: grid; place-items: center; color: hsl(var(--accent)); font-size: 16px; }
    .fc-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase; }
    .fc-stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; }
    .fc-stat-trend { font-size: 11px; color: hsl(var(--success)); margin-top: 4px; font-family: var(--font-mono); }

    .fc-side-mini { background: hsl(var(--sidebar-background)); padding: 12px 10px; }
    .fc-side-brand { font-family: var(--font-display); font-size: 13px; color: hsl(var(--sidebar-foreground)); font-weight: 600; margin-bottom: 10px; padding-left: 6px; }
    .fc-side-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 11px; color: hsl(var(--sidebar-foreground) / .8); }
    .fc-side-row.active { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); position: relative; }
    .fc-side-row.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 14px; background: hsl(var(--sidebar-indicator)); border-radius: 2px; }
    .fc-side-dot { width: 10px; height: 10px; border-radius: 3px; background: currentColor; opacity: .7; }

    .fc-pal-title { font-size: 11px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .fc-pal-row { display: flex; gap: 6px; }
    .fc-pal-chip {
      flex: 1;
      height: 32px;
      border-radius: 6px;
      animation: pal-morph 8s ease-in-out infinite;
    }
    .fc-pal-chip:nth-child(1) { background: hsl(var(--primary)); animation-delay: 0s; }
    .fc-pal-chip:nth-child(2) { background: hsl(var(--accent)); animation-delay: .8s; }
    .fc-pal-chip:nth-child(3) { background: hsl(var(--success)); animation-delay: 1.6s; }
    .fc-pal-chip:nth-child(4) { background: hsl(var(--info)); animation-delay: 2.4s; }
    .fc-pal-chip:nth-child(5) { background: hsl(var(--destructive)); animation-delay: 3.2s; }
    @keyframes pal-morph {
      0%, 100% { filter: hue-rotate(0deg) saturate(1); }
      50%      { filter: hue-rotate(20deg) saturate(1.15); }
    }

    .fc-badge-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .fc-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: hsl(var(--success)); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 hsl(var(--success) / .5); }
      50%      { box-shadow: 0 0 0 6px hsl(var(--success) / 0); }
    }

    /* Subtle background grid in hero canvas (anti-AI: deliberate, not random) */
    .hero-canvas::before {
      content: "";
      position: absolute;
      inset: -20px;
      background-image:
        linear-gradient(hsl(var(--foreground) / .04) 1px, transparent 1px),
        linear-gradient(90deg, hsl(var(--foreground) / .04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Reduced motion: kill all animations */
    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform: none; }
      .float-card { animation: none !important; }
      .fc-pal-chip { animation: none !important; }
      .fc-badge-dot { animation: none !important; }
    }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>
  <a class="sticky-cta" href="../index.html">Ver exemplos →</a>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ── helpers ──────────────────────────────────────────────
    const getCssVar = (name) => {
      if (typeof window === "undefined") return "";
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    };

    // Hook: aplica classe "in" quando o elemento entra no viewport.
    // Usa IntersectionObserver, fires once (unobserve apos triggerar).
    const useReveal = (options = { threshold: 0.15, rootMargin: "-40px 0px" }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            el.classList.add("in");
            io.unobserve(el);
          }
        }, options);
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return ref;
    };

    // Progress bar global (top of viewport)
    const useScrollProgress = () => {
      React.useEffect(() => {
        const bar = document.getElementById("progressBar");
        if (!bar) return;
        const onScroll = () => {
          const h = document.documentElement;
          const max = (h.scrollHeight - h.clientHeight) || 1;
          const pct = (h.scrollTop / max) * 100;
          bar.style.width = pct + "%";
        };
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
    };

    // Parallax mouse no hero canvas (subtle: max ±10px)
    const useMouseParallax = (ref, intensity = 12) => {
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          const x = ((e.clientX - r.left) / r.width  - 0.5) * 2;
          const y = ((e.clientY - r.top)  / r.height - 0.5) * 2;
          el.querySelectorAll("[data-parallax]").forEach((card) => {
            const depth = parseFloat(card.dataset.parallax) || 1;
            card.style.transform = `translate3d(${x * intensity * depth}px, ${y * intensity * depth}px, 0)`;
          });
        };
        const onLeave = () => {
          el.querySelectorAll("[data-parallax]").forEach((c) => { c.style.transform = ""; });
        };
        el.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
        return () => {
          el.removeEventListener("mousemove", onMove);
          el.removeEventListener("mouseleave", onLeave);
        };
      }, []);
    };

    // ── Hero Section ──────────────────────────────────────────
    const PALETTE_CHIPS = [
      { label: "--primary", name: "Petroleum" },
      { label: "--accent", name: "Terracotta" },
      { label: "--background", name: "Cream" },
      { label: "--sidebar-background", name: "Sidebar" },
      { label: "--success", name: "Success" },
      { label: "--destructive", name: "Error" },
    ];

    const HeroSection = () => {
      const [colors, setColors] = React.useState({});
      const canvasRef = React.useRef(null);
