<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-AI Design System</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <link rel="stylesheet" href="./_token-editor.css" />
  <link rel="stylesheet" href="./_footer.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      margin: 0;
      overflow-x: hidden;
    }

    /* Sticky CTA */
    .sticky-cta {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 16px hsl(var(--accent) / .35);
      transition: transform 150ms, box-shadow 150ms;
    }
    .sticky-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px hsl(var(--accent) / .45);
    }

    /* Layout */
    .section-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px;
    }
    .section-wrap + .section-wrap {
      padding-top: 0;
    }
    section.alt-bg {
      position: relative;
      background: hsl(var(--muted) / .4);
      isolation: isolate;
    }
    /* Animated gradient bg — hue shift sutil em loop (svgator: animated gradient effect) */
    section.alt-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        hsl(var(--accent) / .04) 0%,
        transparent 35%,
        hsl(var(--primary) / .04) 65%,
        transparent 100%);
      background-size: 200% 200%;
      animation: bg-shift 18s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes bg-shift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      section.alt-bg::before { animation: none; }
    }

    /* Typography */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    h1.hero-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 600;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin: 0 0 20px;
      color: hsl(var(--foreground));
    }
    /* ==================================================
       KINETIC TYPOGRAPHY — hero title word-by-word reveal
       Wave 4 P3 · F-MO-010
       Each .hero-word slides up + fades in sequentially.
       Reduced-motion: all words visible immediately (no anim).
       ================================================== */
    .hero-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(0.4em);
      animation: hero-word-in 520ms cubic-bezier(.2,.8,.2,1) forwards;
    }
    @keyframes hero-word-in {
      to { opacity: 1; transform: translateY(0); }
    }
    /* Line break between "Anti-AI" and "Design System" preserved via .hero-title-break */
    .hero-title-break { display: block; }
    @media (prefers-reduced-motion: reduce) {
      .hero-word { animation: none; opacity: 1; transform: none; }
    }
    h2.section-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0 0 8px;
    }
    .section-sub {
      font-size: 15px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0 0 40px;
    }

    /* Hero */
    .hero-sub {
      font-size: 18px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      max-width: 560px;
      margin: 0 0 32px;
    }
    .palette-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    .chip-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      cursor: default;
      transition: border-color 150ms;
    }
    .chip-swatch:hover { border-color: hsl(var(--foreground) / .3); }
    .chip-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }

    /* Anti-padrão split side-by-side */
    .antipatterns-split {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .split-subsection {
      padding: 32px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .split-subsection:last-child { border-bottom: none; }
    .split-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 16px;
    }
    @media (max-width: 700px) {
      .split-cols { grid-template-columns: 1fr; }
    }
    .split-card {
      border-radius: 14px;
      padding: 20px;
      position: relative;
    }
    .split-card.ai-default {
      background: #f4f4f4;
      border: 1px solid #e0e0e0;
    }
    .split-card.anti-ai {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .split-legend {
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .split-legend.bad { color: #888; }
    .split-legend.good { color: hsl(var(--success)); }
    .split-desc {
      font-size: 12.5px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 12px 0 0;
    }
    /* Mockup elements inside split cards */
    .mock-btn-generic {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 6px;
      border: 1px solid #d1d5db; background: #fff;
      font-size: 13px; color: #374151; font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      cursor: default;
    }
    .mock-badge-generic {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 4px;
      background: #e5e7eb; color: #6b7280;
      font-size: 11px; font-family: sans-serif;
    }
    .mock-card-generic {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 14px; margin-top: 10px;
      font-size: 12px; color: #6b7280; font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
    }
    .mock-btn-ds {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: var(--radius-md, 10px);
      border: none; background: hsl(var(--accent));
      font-size: 13px; color: hsl(var(--accent-foreground));
      font-family: var(--font-body); font-weight: 500;
      cursor: default;
    }
    .mock-badge-ds {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      background: hsl(var(--accent) / .12); color: hsl(var(--accent));
      font-size: 11px; font-family: var(--font-mono);
      font-weight: 600; letter-spacing: .04em; border: 1px solid hsl(var(--accent) / .25);
    }
    .mock-card-ds {
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl, 20px);
      padding: 14px; margin-top: 10px;
      font-size: 12px; color: hsl(var(--muted-foreground));
      font-family: var(--font-body);
    }
    .split-subsection-label {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: hsl(var(--foreground));
      margin: 0 0 20px;
    }
    @media (max-width: 700px) {
      .split-subsection { grid-template-columns: 1fr; }
    }

    /* Tokens vivos — grid 2×2 fixo */
    .tokens-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 640px) {
      .tokens-grid { grid-template-columns: 1fr; }
    }
    .token-group h4 {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    .token-swatches { display: flex; flex-direction: column; gap: 6px; }
    .token-swatch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      cursor: pointer;
      position: relative;
      transition: border-color 150ms, background 150ms;
      outline: none;
    }
    .token-swatch-row:hover { border-color: hsl(var(--primary) / .4); background: hsl(var(--muted) / .6); }
    .token-swatch-row:focus-visible { outline: 2px solid hsl(var(--primary)); outline-offset: 2px; }
    /* Click-to-copy tooltip — Wave 4 P3 */
    .token-swatch-row .copy-tip {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: .04em;
      padding: 2px 6px;
      border-radius: 4px;
      background: hsl(var(--success));
      color: hsl(var(--card));
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease;
      white-space: nowrap;
    }
    .token-swatch-row.copied .copy-tip { opacity: 1; }
    .token-swatch-row .copy-icon {
      margin-left: auto;
      opacity: 0;
      color: hsl(var(--muted-foreground));
      transition: opacity 150ms;
      flex-shrink: 0;
    }
    .token-swatch-row:hover .copy-icon,
    .token-swatch-row:focus-visible .copy-icon { opacity: 1; }
    .token-swatch-color {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-label { font-size: 12px; font-weight: 500; }
    .token-swatch-var { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); margin-top: 1px; }

    /* Type scale — amostras grandes no tamanho real */
    .type-scale { display: flex; flex-direction: column; gap: 0; margin-top: 24px; }
    .type-row {
      display: grid;
      grid-template-columns: 140px auto;
      align-items: center;
      gap: 24px;
      padding: 16px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .type-meta-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .type-meta-name { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .06em; }
    .type-meta-size { font-family: var(--font-mono); font-size: 11px; color: hsl(var(--foreground)); font-weight: 500; }
    .type-meta-lh { font-family: var(--font-mono); font-size: 9px; color: hsl(var(--muted-foreground) / .7); }
    .type-meta { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); min-width: 100px; flex-shrink: 0; }
    .radius-demo { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .radius-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .radius-box {
      width: 56px;
      height: 56px;
      background: hsl(var(--primary) / .15);
      border: 2px solid hsl(var(--primary) / .4);
    }
    .radius-label { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); }

    /* Categorias — TOC editorial (lista vertical) */
    .categories-toc {
      display: flex;
      flex-direction: column;
      max-width: 980px;
    }
    .toc-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid hsl(var(--border));
      text-decoration: none;
      color: inherit;
      transition: background 150ms;
      border-radius: 8px;
      cursor: default;
    }
    .toc-row:last-child { border-bottom: none; }
    .toc-row:hover { background: hsl(var(--muted) / .35); padding-left: 12px; padding-right: 12px; margin: 0 -12px; }
    .toc-row:hover .toc-chips .toc-chip { filter: brightness(1.08); }
    /* Wave 6.3 — animação minimal: setinha translateX(6px) */
    .toc-row:hover .toc-cta { transform: translateX(6px); }
    .toc-left {
      flex: 0 0 220px;
      min-width: 0;
    }
    .toc-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: hsl(var(--foreground));
      margin: 0 0 2px;
    }
    .toc-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      letter-spacing: .04em;
    }
    .toc-chips {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .toc-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--muted) / .5);
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      transition: filter 150ms;
    }
    .toc-cta {
      flex: 0 0 auto;
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      color: hsl(var(--accent));
      transition: transform 200ms ease;
      white-space: nowrap;
    }
    @media (max-width: 700px) {
      .toc-left { flex: 0 0 140px; }
      .toc-chips { display: none; }
    }

    /* ==================================================
       Templates Cases — scroll-snap carousel (Wave 6.4)
       ================================================== */
    .templates-section-wrap {
      background: hsl(var(--sidebar-background));
      padding: 80px 0 64px;
    }
    .templates-section-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
    }
    .templates-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--sidebar-foreground) / .6);
      margin: 0 0 10px;
    }
    .templates-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -.02em;
      color: hsl(var(--sidebar-foreground));
      margin: 0 0 8px;
    }
    .templates-sub {
      font-size: 15px;
      color: hsl(var(--sidebar-foreground) / .6);
      line-height: 1.6;
      margin: 0 0 32px;
    }
    .templates-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      gap: 24px;
      padding: 8px 0 24px;
      -webkit-overflow-scrolling: touch;
    }
    .templates-carousel::-webkit-scrollbar { height: 6px; }
    .templates-carousel::-webkit-scrollbar-thumb { background: hsl(var(--border) / .3); border-radius: 3px; }
    .templates-carousel::-webkit-scrollbar-track { background: transparent; }
    .templates-slide {
      flex: 0 0 100%;
      min-width: 100%;
      scroll-snap-align: center;
    }
    .templates-slide-card {
      max-width: 1180px;
      width: 100%;
      background: hsl(var(--sidebar-background));
      border: 1px solid hsl(var(--sidebar-foreground) / .1);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px -16px hsl(0 0% 0% / .35);
    }
    .slide-text {
      padding: 32px 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .slide-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--accent));
      margin: 0 0 14px;
    }
    .slide-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 2.5vw, 36px);
      font-weight: 700;
      line-height: 1.15;
      color: hsl(var(--sidebar-foreground));
      margin: 0 0 14px;
    }
    .slide-body {
      font-size: 14px;
      line-height: 1.6;
      color: hsl(var(--sidebar-foreground) / .7);
      margin: 0 0 28px;
    }
    .slide-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .slide-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: var(--radius-md, 10px);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 150ms;
      border: none;
      cursor: pointer;
    }
    .slide-btn-primary:hover { background: hsl(var(--accent) / .88); }
    .slide-btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: transparent;
      color: hsl(var(--sidebar-foreground) / .75);
      border-radius: var(--radius-md, 10px);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid hsl(var(--sidebar-foreground) / .2);
      cursor: pointer;
      transition: background 150ms, border-color 150ms;
    }
    .slide-btn-ghost:hover { background: hsl(var(--sidebar-foreground) / .08); border-color: hsl(var(--sidebar-foreground) / .35); }
    .slide-visual {
      display: flex;
      align-items: stretch;
      padding: 0 20px 20px;
      overflow: hidden;
      height: 620px;
    }
    .slide-mockup {
      flex: 1;
      background: hsl(var(--background));
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid hsl(var(--border));
      box-shadow: 0 8px 24px -8px hsl(0 0% 0% / .2);
      position: relative;
    }
    .slide-mockup iframe {
      display: block;
      flex: 1 1 0;
      min-height: 0;
      transform: scale(0.65);
      transform-origin: top left;
      width: 153.85%;
      height: 153.85%;
      border: 0;
    }
    /* Mini app mockups */
    .mockup-topbar {
      height: 32px;
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      flex-shrink: 0;
    }
    .mockup-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mockup-main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .mockup-sidebar-mini {
      width: 56px;
      background: hsl(var(--sidebar-background));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      flex-shrink: 0;
    }
    .mockup-sidebar-brand {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: hsl(var(--accent));
      margin-bottom: 8px;
    }
    .mockup-sidebar-item {
      width: 32px;
      height: 5px;
      border-radius: 3px;
      background: hsl(var(--sidebar-foreground) / .25);
    }
    .mockup-sidebar-item.active {
      background: hsl(var(--sidebar-indicator));
    }
    .mockup-content {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }
    .mockup-kpi-row { display: flex; gap: 5px; }
    .mockup-kpi {
      flex: 1;
      height: 30px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 7px;
      gap: 5px;
      overflow: hidden;
    }
    .mockup-kpi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .mockup-kpi-bar { height: 4px; border-radius: 2px; background: hsl(var(--accent) / .3); flex: 1; }
    .mockup-table {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
    }
    .mockup-table-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-bottom: 1px solid hsl(var(--border));
      font-size: 9px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
    }
    .mockup-table-row:last-child { border-bottom: none; }
    .mockup-table-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    /* CRM pipeline mockup */
    .mockup-pipeline { display: flex; gap: 5px; flex: 1; overflow: hidden; }
    .mockup-pipeline-col {
      flex: 1;
      background: hsl(var(--muted) / .4);
      border-radius: 6px;
      padding: 5px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .mockup-pipeline-header {
      font-family: var(--font-mono);
      font-size: 8px;

    /* ==================================================
       SCROLLYTELLING — sections fade-up + stagger children
       ================================================== */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    /* Stagger children (.reveal-stagger > *) */
    .reveal-stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1); }
    .reveal-stagger.in > *  { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1)  { transition-delay:   0ms; }
    .reveal-stagger.in > *:nth-child(2)  { transition-delay:  80ms; }
    .reveal-stagger.in > *:nth-child(3)  { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4)  { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5)  { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6)  { transition-delay: 400ms; }
    .reveal-stagger.in > *:nth-child(7)  { transition-delay: 480ms; }
    .reveal-stagger.in > *:nth-child(8)  { transition-delay: 560ms; }
    .reveal-stagger.in > *:nth-child(9)  { transition-delay: 640ms; }
    .reveal-stagger.in > *:nth-child(10) { transition-delay: 720ms; }

    /* ==================================================
       HERO ENTRY — F-MO-013
       Text block + floating cards animate in on page load.
       Cards stagger 80ms apart. Reduced-motion: covered by
       global block (opacity/transform skipped).
       ================================================== */
    @keyframes hero-fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes hero-card-in {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .hero-entry-text {
      animation: hero-fade-up var(--duration-normal, 500ms) cubic-bezier(.2,.8,.2,1) both;
      animation-delay: 80ms;
    }
    .hero-entry-card {
      animation: hero-card-in var(--duration-normal, 500ms) cubic-bezier(.2,.8,.2,1) both;
    }
    .hero-entry-card:nth-of-type(1) { animation-delay: 200ms; }
    .hero-entry-card:nth-of-type(2) { animation-delay: 280ms; }
    .hero-entry-card:nth-of-type(3) { animation-delay: 360ms; }
    .hero-entry-card:nth-of-type(4) { animation-delay: 440ms; }
    @media (prefers-reduced-motion: reduce) {
      .hero-entry-text,
      .hero-entry-card { animation: none; opacity: 1; transform: none; }
    }

    /* Section progress bar (top of viewport) */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 200;
      transition: width 80ms linear;
      pointer-events: none;
    }

    /* ==================================================
       HERO CANVAS — floating component cards + parallax
       ================================================== */
    .hero-canvas-wrap {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
      min-height: 520px;
    }
    @media (min-width: 960px) {
      .hero-canvas-wrap { grid-template-columns: 1.1fr 1fr; }
    }
    .hero-canvas {
      position: relative;
      height: 480px;
      perspective: 1200px;
      pointer-events: none;
    }
    .float-card {
      position: absolute;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 20px 50px -20px hsl(var(--foreground) / .18), 0 4px 12px -4px hsl(var(--foreground) / .08);
      transition: transform 200ms cubic-bezier(.2,.8,.2,1), box-shadow 200ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
      pointer-events: auto;
      cursor: default;
    }
    /* F-UX-006 / F-MO-005: hover lift — pausa float-anim e eleva o card */
    .float-card:hover {
      box-shadow: 0 28px 60px -16px hsl(var(--foreground) / .28), 0 8px 20px -6px hsl(var(--foreground) / .14);
      animation-play-state: paused;
    }
    /* Pulse sutil no valor KPI — simula "dado real-time" (F-MO-005) */
    @keyframes kpi-pulse {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: .6; }
    }
    .float-card.fc-stat   { top: 8%;  left: 0;  width: 220px; animation: float-a 6s ease-in-out infinite; }
    .float-card.fc-side   { top: 26%; right: 4%; width: 200px; animation: float-b 7s ease-in-out infinite; padding: 0; overflow: hidden; }
    .float-card.fc-pal    { bottom: 14%; left: 8%; width: 240px; animation: float-c 8s ease-in-out infinite; }
    .float-card.fc-badge  { bottom: 6%; right: 10%; width: auto; animation: float-d 5.5s ease-in-out infinite; padding: 8px 14px; border-radius: 999px; }

    @keyframes float-a { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(-1deg); } }
    @keyframes float-b { 0%,100% { transform: translateY(0) rotate(1deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
    @keyframes float-c { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
    @keyframes float-d { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    /* Hero card content */
    .fc-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .fc-stat-icon { width: 32px; height: 32px; border-radius: 8px; background: hsl(var(--accent) / .15); display: grid; place-items: center; color: hsl(var(--accent)); font-size: 16px; }
    .fc-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase; }
    .fc-stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; animation: kpi-pulse 8s ease-in-out infinite; }
    .fc-stat-trend { font-size: 11px; color: hsl(var(--success)); margin-top: 4px; font-family: var(--font-mono); }

    .fc-side-mini { background: hsl(var(--sidebar-background)); padding: 12px 10px; }
    .fc-side-brand { font-family: var(--font-display); font-size: 13px; color: hsl(var(--sidebar-foreground)); font-weight: 600; margin-bottom: 10px; padding-left: 6px; }
    .fc-side-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 11px; color: hsl(var(--sidebar-foreground) / .8); }
    .fc-side-row.active { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); position: relative; }
    .fc-side-row.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 14px; background: hsl(var(--sidebar-indicator)); border-radius: 2px; }
    .fc-side-dot { width: 10px; height: 10px; border-radius: 3px; background: currentColor; opacity: .7; }

    .fc-pal-title { font-size: 11px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .fc-pal-row { display: flex; gap: 6px; }
    .fc-pal-chip {
      flex: 1;
      height: 32px;
      border-radius: 6px;
      animation: pal-morph 8s ease-in-out infinite;
    }
    .fc-pal-chip:nth-child(1) { background: hsl(var(--primary)); animation-delay: 0s; }
    .fc-pal-chip:nth-child(2) { background: hsl(var(--accent)); animation-delay: .8s; }
    .fc-pal-chip:nth-child(3) { background: hsl(var(--success)); animation-delay: 1.6s; }
    .fc-pal-chip:nth-child(4) { background: hsl(var(--info)); animation-delay: 2.4s; }
    .fc-pal-chip:nth-child(5) { background: hsl(var(--destructive)); animation-delay: 3.2s; }
    @keyframes pal-morph {
      0%, 100% { filter: hue-rotate(0deg) saturate(1); }
      50%      { filter: hue-rotate(20deg) saturate(1.15); }
    }

    .fc-badge-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .fc-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: hsl(var(--success)); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 hsl(var(--success) / .5); }
      50%      { box-shadow: 0 0 0 6px hsl(var(--success) / 0); }
    }

    /* Subtle background grid in hero canvas (anti-AI: deliberate, not random) */
    .hero-canvas::before {
      content: "";
      position: absolute;
      inset: -20px;
      background-image:
        linear-gradient(hsl(var(--foreground) / .04) 1px, transparent 1px),
        linear-gradient(90deg, hsl(var(--foreground) / .04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

  <script type="text/babel">
    // ── helpers ──────────────────────────────────────────────
    const getCssVar = (name) => {
      if (typeof window === "undefined") return "";
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    };

    // Hook: aplica classe "in" quando o elemento entra no viewport.
    // Usa IntersectionObserver, fires once (unobserve apos triggerar).
    const useReveal = (options = { threshold: 0.15, rootMargin: "-40px 0px" }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            el.classList.add("in");
            io.unobserve(el);
          }
        }, options);
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return ref;
    };

    // Progress bar global (top of viewport)
    const useScrollProgress = () => {
      React.useEffect(() => {
        const bar = document.getElementById("progressBar");
        if (!bar) return;
        const onScroll = () => {
          const h = document.documentElement;
          const max = (h.scrollHeight - h.clientHeight) || 1;
          const pct = (h.scrollTop / max) * 100;
          bar.style.width = pct + "%";
        };
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
    };

    // Parallax mouse no hero canvas (subtle: max ±10px)
    // Respeita _paralaxPaused quando card está em tilt individual
    const useMouseParallax = (ref, intensity = 12) => {
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          const x = ((e.clientX - r.left) / r.width  - 0.5) * 2;
          const y = ((e.clientY - r.top)  / r.height - 0.5) * 2;
          el.querySelectorAll("[data-parallax]").forEach((card) => {
            if (card._paralaxPaused) return;
            const depth = parseFloat(card.dataset.parallax) || 1;
            card.style.transform = `translate3d(${x * intensity * depth}px, ${y * intensity * depth}px, 0)`;
          });
        };
        const onLeave = () => {
          el.querySelectorAll("[data-parallax]").forEach((c) => {
            if (c._paralaxPaused) return;
            c.style.transform = "";
          });
        };
        el.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
        return () => {
          el.removeEventListener("mousemove", onMove);
          el.removeEventListener("mouseleave", onLeave);
        };
      }, []);
    };

    // Hook: 3D tilt individual em cada float-card no hero
    const useFloatCardTilt = (canvasRef) => {
      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) return;
        const cards = canvas.querySelectorAll(".float-card");
        const handlers = [];
        cards.forEach((card) => {
          const onEnter = () => {
            card.classList.add("is-hovered");
            // pause parallax on this card while hovered
            card._paralaxPaused = true;
          };
          const onMove = (e) => {
            const r = card.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width;
            const y = (e.clientY - r.top) / r.height;
            const rx = (0.5 - y) * 16;
            const ry = (x - 0.5) * 16;
            card.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.10)`;
          };
          const onLeave = () => {
            card.classList.remove("is-hovered");
            card._paralaxPaused = false;
            card.style.transform = "";
          };
          card.addEventListener("mouseenter", onEnter);
          card.addEventListener("mousemove", onMove);
          card.addEventListener("mouseleave", onLeave);
          handlers.push([card, onEnter, onMove, onLeave]);
        });
        return () => handlers.forEach(([c, en, mv, lv]) => {
          c.removeEventListener("mouseenter", en);
          c.removeEventListener("mousemove", mv);
          c.removeEventListener("mouseleave", lv);
        });
      }, []);
    };

    // Hook: glow trail em cada card (usa CSS var --glow-x/y)
    const useGlowTrail = (ref) => {
      React.useEffect(() => {
        const root = ref.current;
        if (!root) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) return;
        const cards = root.querySelectorAll("[data-glow]");
        const handlers = [];
        cards.forEach((card) => {
          const onMove = (e) => {
            const r = card.getBoundingClientRect();
            card.style.setProperty("--glow-x", `${e.clientX - r.left}px`);
            card.style.setProperty("--glow-y", `${e.clientY - r.top}px`);
          };
          card.addEventListener("mousemove", onMove);
          handlers.push([card, onMove]);
        });
        return () => handlers.forEach(([c, fn]) => c.removeEventListener("mousemove", fn));
      }, []);
    };


    // Hook: counter rolling animation (0 → N) quando entra viewport
    const useCounterRoll = (ref, target, duration = 600) => {
      const [count, setCount] = React.useState(0);
      const hasRun = React.useRef(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) { setCount(target); return; }
        const io = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !hasRun.current) {
            hasRun.current = true;
            const start = performance.now();
            const tick = (now) => {
              const elapsed = now - start;
              const progress = Math.min(elapsed / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.round(eased * target));
              if (progress < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
            io.unobserve(el);
          }
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, [target, duration]);
      return count;
    };

    const TokenSwatchRow = ({ name, label, colorVal }) => {
      const [copied, setCopied] = React.useState(false);
      const copyToken = () => {
        const text = colorVal ? `hsl(${colorVal})` : `var(${name})`;
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }).catch(() => {
          // Fallback para browsers sem clipboard API
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.cssText = "position:fixed;top:-9999px;left:-9999px";
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          try { document.execCommand("copy"); } catch(e) {}
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };
      return (
        <div
          className={`token-swatch-row${copied ? " copied" : ""}`}
          onClick={copyToken}
          onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); copyToken(); } }}

      const scrollTo = (idx) => {
        const carousel = carouselRef.current;
        if (!carousel) return;
        const slide = carousel.children[idx];
        if (slide) slide.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        setActive(idx);
      };

      // Sync dot com scroll
      React.useEffect(() => {
        const carousel = carouselRef.current;
        if (!carousel) return;
        const onScroll = () => {
          const w = carousel.offsetWidth;
          const idx = Math.round(carousel.scrollLeft / w);
          setActive(Math.max(0, Math.min(idx, TEMPLATE_SLIDES.length - 1)));
        };
        carousel.addEventListener("scroll", onScroll, { passive: true });
        return () => carousel.removeEventListener("scroll", onScroll);
      }, []);

      // Keyboard navigation on carousel
      const handleCarouselKey = (e) => {
        if (e.key === "ArrowLeft") { e.preventDefault(); scrollTo(Math.max(0, active - 1)); }

    const ComoUsarSection = () => {

    // Constellation SVG animada no footer

    // ── Token Editor (Wave 5.2) ───────────────────────────────
    // Helpers chroma.js
    const hexToHsl = (hex) => {
      try {
        const [h, s, l] = chroma(hex).hsl();
        const hDeg = isNaN(h) ? 0 : Math.round(h);
        const sPct = Math.round((isNaN(s) ? 0 : s) * 100);
        const lPct = Math.round((isNaN(l) ? 0 : l) * 100);
        return `${hDeg} ${sPct}% ${lPct}%`;
      } catch { return "0 0% 50%"; }
    };

    const hslVarToHex = (hslStr) => {
      try {
        const parts = hslStr.trim().split(/\s+/);
        if (parts.length < 3) return "#888888";
        const h = parseFloat(parts[0]);
        const s = parseFloat(parts[1]) / 100;
        const l = parseFloat(parts[2]) / 100;
        return chroma.hsl(h, s, l).hex();
      } catch { return "#888888"; }
    };

    const getWcagBadge = (ratio) => {
      if (ratio >= 7)   return { cls: "aaa",    label: "AAA" };
      if (ratio >= 4.5) return { cls: "aa",     label: "AA" };
      if (ratio >= 3)   return { cls: "aa-low", label: "AA-" };
      return               { cls: "fail",   label: "FAIL" };
    };

    const computeWcagPairs = (tokens) => {
      const pairs = [
        { label: "Text / BG",      fg: tokens["--foreground"],  bg: tokens["--background"] },
        { label: "Accent / BG",    fg: tokens["--accent"],      bg: tokens["--background"] },
        { label: "Primary / BG",   fg: tokens["--primary"],     bg: tokens["--background"] },
        { label: "Text / Card",    fg: tokens["--foreground"],  bg: tokens["--card"] },
      ];
      return pairs.map(p => {
        try {
          const fgHex = hslVarToHex(p.fg || "0 0% 10%");
          const bgHex = hslVarToHex(p.bg || "0 0% 99%");
          const ratio = chroma.contrast(fgHex, bgHex);
          return { ...p, ratio: ratio.toFixed(1), badge: getWcagBadge(ratio) };
        } catch {
          return { ...p, ratio: "?", badge: { cls: "fail", label: "ERR" } };
        }
      });
    };

    // Tokens editáveis no modo Avançado
    const ADVANCED_TOKENS = [
      { group: "Marca",     tokens: ["--primary","--accent","--ring"] },
      { group: "Status",    tokens: ["--success","--warning","--info","--destructive"] },
      { group: "Sidebar",   tokens: ["--sidebar-background","--sidebar-accent","--sidebar-indicator"] },
      { group: "Superfícies", tokens: ["--background","--card","--muted","--border"] },
    ];
    const ALL_ADVANCED_TOKENS = ADVANCED_TOKENS.flatMap(g => g.tokens);

    // Lê todos os tokens atuais do :root
    const readCurrentTokens = () => {
      const result = {};
      ALL_ADVANCED_TOKENS.concat(["--foreground","--primary-foreground","--accent-foreground"]).forEach(t => {
        result[t] = getCssVar(t);
      });
      return result;
    };

    // Aplica tokens no :root via style
    const applyToken = (name, hslVal) => {
      document.documentElement.style.setProperty(name, hslVal);
    };

    const resetAllTokens = () => {
      ALL_ADVANCED_TOKENS.concat(["--foreground","--primary-foreground","--accent-foreground"]).forEach(t => {
        document.documentElement.style.removeProperty(t);
      });
    };

    const exportCss = (tokens) => {
      const lines = Object.entries(tokens)
        .filter(([k]) => ALL_ADVANCED_TOKENS.includes(k))
        .map(([k, v]) => `  ${k}: ${v};`)
        .join("\n");
      const css = `:root {\n${lines}\n}\n`;
      const blob = new Blob([css], { type: "text/css" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "anti-ai-theme.css"; a.click();
      URL.revokeObjectURL(url);
    };

    const LS_KEY = "anti-ai-theme";

    const TokenEditorSection = () => {
      const [mode, setMode] = React.useState("basic");
      const [accentHex, setAccentHex] = React.useState("#c0845a");
      const [derived, setDerived] = React.useState({});
      const [advTokens, setAdvTokens] = React.useState({});
      const [wcagPairs, setWcagPairs] = React.useState([]);

      // Inicializa com valores atuais do CSS
      React.useEffect(() => {
        const cur = readCurrentTokens();
        const accentHslStr = cur["--accent"] || "20 50% 55%";
        try {
          setAccentHex(hslVarToHex(accentHslStr));
        } catch {}
        setAdvTokens(cur);
        setWcagPairs(computeWcagPairs(cur));
        // Carregar tema salvo
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            Object.entries(parsed).forEach(([k, v]) => applyToken(k, v));
            const reread = readCurrentTokens();
            setAdvTokens(reread);
            setWcagPairs(computeWcagPairs(reread));
          }
        } catch {}
      }, []);

      // Básico: deriva paleta a partir do accent escolhido
      const deriveFromAccent = (hex) => {
        try {
          const accent = chroma(hex);
          const primary = accent.set("hsl.h", `+${180}`).darken(0.5);
          const ring = primary;
          const accentDecorative = accent.brighten(0.2);
          const hslOf = (c) => {
            const [h, s, l] = c.hsl();
            return `${Math.round(isNaN(h) ? 0 : h)} ${Math.round((isNaN(s)?0:s)*100)}% ${Math.round((isNaN(l)?0:l)*100)}%`;
          };
          const d = {
            "--accent":            hslOf(accent),
            "--primary":           hslOf(primary),
            "--ring":              hslOf(ring),
            "--accent-decorative": hslOf(accentDecorative),
          };
          // Aplica live
          Object.entries(d).forEach(([k, v]) => applyToken(k, v));
          const cur = readCurrentTokens();
          setWcagPairs(computeWcagPairs({ ...cur, ...d }));
          return d;
        } catch { return {}; }
      };

      const handleAccentChange = (hex) => {
        setAccentHex(hex);
        const d = deriveFromAccent(hex);
        setDerived(d);
      };

      // Avançado: edita token individual
      const handleAdvancedChange = (tokenName, hex) => {
        const hslVal = hexToHsl(hex);
        applyToken(tokenName, hslVal);
        setAdvTokens(prev => {
          const next = { ...prev, [tokenName]: hslVal };
          setWcagPairs(computeWcagPairs(next));
          return next;
        });
      };

      const handleReset = () => {
        resetAllTokens();
        const cur = readCurrentTokens();
        setAccentHex(hslVarToHex(cur["--accent"] || "20 50% 55%"));
        setAdvTokens(cur);
        setDerived({});
        setWcagPairs(computeWcagPairs(cur));
        localStorage.removeItem(LS_KEY);
      };

      const handleSave = () => {
        const cur = readCurrentTokens();
        localStorage.setItem(LS_KEY, JSON.stringify(cur));
      };

      const handleExport = () => {
        exportCss(advTokens);
      };

      const derivedEntries = [
        { var: "--accent",            label: "Accent",       hex: derived["--accent"] ? hslVarToHex(derived["--accent"]) : accentHex },
        { var: "--primary",           label: "Primary",      hex: derived["--primary"] ? hslVarToHex(derived["--primary"]) : "#1a3a3a" },
        { var: "--ring",              label: "Ring/Foco",    hex: derived["--ring"] ? hslVarToHex(derived["--ring"]) : "#1a3a3a" },
        { var: "--accent-decorative", label: "Decorativo",   hex: derived["--accent-decorative"] ? hslVarToHex(derived["--accent-decorative"]) : "#c8966e" },
      ];

      return (
        <div className="token-editor-wrap">
          <div className="token-editor-header">
            <h3 className="token-editor-title">Token Editor</h3>
            <div className="token-editor-tabs">
              <button
                className={`token-editor-tab${mode === "basic" ? " active" : ""}`}
                onClick={() => setMode("basic")}
              >Básico</button>
              <button
                className={`token-editor-tab${mode === "advanced" ? " active" : ""}`}
                onClick={() => setMode("advanced")}
              >Avançado</button>
            </div>
          </div>

          <div className="token-editor-body">
            {mode === "basic" && (
              <div>
                <p style={{ fontSize: 13, color: "hsl(var(--muted-foreground))", margin: "0 0 16px", lineHeight: 1.5 }}>
                  Escolha um accent — o sistema deriva primary, ring e decorativo automaticamente.
                </p>
                <div className="editor-basic-row">
                  <div className="editor-color-input-wrap">
                    <input
                      type="color"
                      className="editor-color-input"
                      value={accentHex}
                      onChange={e => handleAccentChange(e.target.value)}
                    />
                    <input
                      type="text"
                      className="editor-color-hex"
                      value={accentHex}
                      onChange={e => { if (/^#[0-9a-fA-F]{0,6}$/.test(e.target.value)) { setAccentHex(e.target.value); if (e.target.value.length === 7) handleAccentChange(e.target.value); } }}
                    />
                  </div>
                  <span style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>→ Accent principal</span>
                </div>
                <div className="editor-derived-grid">
                  {derivedEntries.map(entry => (
                    <div key={entry.var} className="editor-derived-item">
                      <div className="editor-derived-swatch" style={{ background: entry.hex }} />
                      <div className="editor-derived-info">
                        <div className="editor-derived-name">{entry.label}</div>
                        <div className="editor-derived-var">{entry.var}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {mode === "advanced" && (
              <div>
                <p style={{ fontSize: 13, color: "hsl(var(--muted-foreground))", margin: "0 0 16px", lineHeight: 1.5 }}>
                  Edite cada token individualmente. Preview ao vivo na página inteira.
                </p>
                {ADVANCED_TOKENS.map(group => (
                  <div key={group.group} style={{ marginBottom: 20 }}>
                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, textTransform: "uppercase", letterSpacing: ".08em", color: "hsl(var(--muted-foreground))", marginBottom: 8 }}>{group.group}</div>
                    <div className="editor-advanced-grid">
                      {group.tokens.map(tokenName => {
                        const hslStr = advTokens[tokenName] || "0 0% 50%";
                        const hex = hslVarToHex(hslStr);
                        return (
                          <div key={tokenName} className="editor-advanced-item">
                            <div className="editor-advanced-swatch" style={{ background: hex }} />
                            <div className="editor-advanced-info">
                              <div className="editor-advanced-name">{tokenName.replace("--", "")}</div>
                              <div className="editor-advanced-var">{hslStr.substring(0, 16)}{hslStr.length > 16 ? "…" : ""}</div>
                            </div>
                            <input
                              type="color"
                              className="editor-advanced-input"
                              value={hex}
                              onChange={e => handleAdvancedChange(tokenName, e.target.value)}
                              title={tokenName}
                            />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* WCAG panel — sempre visível */}
            <div className="wcag-panel">
              <div className="wcag-panel-label">Contraste WCAG</div>
              {wcagPairs.map(p => (
                <div key={p.label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 12, color: "hsl(var(--muted-foreground))" }}>{p.label}</span>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "hsl(var(--foreground))" }}>{p.ratio}:1</span>
                  <span className={`wcag-badge ${p.badge.cls}`}>{p.badge.label}</span>
                </div>
              ))}
            </div>

            <div className="editor-actions">
              <button className="editor-btn" onClick={handleReset}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                Reset
              </button>
              <button className="editor-btn" onClick={handleSave}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Salvar tema
              </button>
              <button className="editor-btn primary" onClick={handleExport}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Exportar CSS
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ── App ───────────────────────────────────────────────────
    const App = () => {
      useScrollProgress();
      return (
        <>
          <HeroSection />
          <TemplatesSection />
          <FilosofiaSection />
          <TokensVivosSection />
          <CategoriasSection />
          <ComoUsarSection />
          <FooterShowcase />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader mode="home" />);
  </script>

  <script>
    /* Wave 9.3 — Categorias dropdown (unified) */
    (function () {
      var dd  = document.querySelector('.fh-dropdown');
      if (!dd) return;
      var btn  = dd.querySelector(".fh-dropdown-btn");
      var menu = dd.querySelector(".fh-dropdown-menu");
      function openDD()  { dd.setAttribute("data-open","true");  btn.setAttribute("aria-expanded","true"); }
      function closeDD() { dd.removeAttribute("data-open");       btn.setAttribute("aria-expanded","false"); }
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        dd.hasAttribute("data-open") ? closeDD() : openDD();
      });
      document.addEventListener("click", function (e) { if (!dd.contains(e.target)) closeDD(); });
      document.addEventListener("keydown", function (e) { if (e.key === "Escape") { closeDD(); btn.focus(); } });
      menu.addEventListener("keydown", function (e) {
        var items = Array.from(menu.querySelectorAll("a"));
        var idx   = items.indexOf(document.activeElement);
        if (e.key === "ArrowDown") { e.preventDefault(); var n = items[(idx + 1) % items.length]; if (n) n.focus(); }
        if (e.key === "ArrowUp")   { e.preventDefault(); var p = items[(idx - 1 + items.length) % items.length]; if (p) p.focus(); }
        if (e.key === "Escape")    { closeDD(); btn.focus(); }
        if (e.key === "Tab" && !e.shiftKey && idx === items.length - 1) closeDD();
      });
    })();
  </script>
</body>
</html>
