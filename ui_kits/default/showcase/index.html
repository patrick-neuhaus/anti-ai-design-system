<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-AI Design System</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      margin: 0;
      overflow-x: hidden;
    }

    /* Sticky CTA */
    .sticky-cta {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 16px hsl(var(--accent) / .35);
      transition: transform 150ms, box-shadow 150ms;
    }
    .sticky-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px hsl(var(--accent) / .45);
    }

    /* Layout */
    .section-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px;
    }
    .section-wrap + .section-wrap {
      padding-top: 0;
    }
    section.alt-bg {
      background: hsl(var(--muted) / .4);
    }

    /* Typography */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    h1.hero-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 600;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin: 0 0 20px;
      color: hsl(var(--foreground));
    }
    h2.section-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0 0 8px;
    }
    .section-sub {
      font-size: 15px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0 0 40px;
    }

    /* Hero */
    .hero-sub {
      font-size: 18px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      max-width: 560px;
      margin: 0 0 32px;
    }
    .palette-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    .chip-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      cursor: default;
      transition: border-color 150ms;
    }
    .chip-swatch:hover { border-color: hsl(var(--foreground) / .3); }
    .chip-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }

    /* Anti-padrão cards */
    .antipatterns-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .antipattern-card {
      padding: 24px;
      border: 1px solid hsl(var(--border));
      border-radius: 16px;
      background: hsl(var(--card));
    }
    .antipattern-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: hsl(var(--accent) / .12);
      color: hsl(var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
    }
    .antipattern-card h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
    }
    .antipattern-card p {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0;
    }

    /* Tokens vivos */
    .tokens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .token-group h4 {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    .token-swatches { display: flex; flex-direction: column; gap: 6px; }
    .token-swatch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-color {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-label { font-size: 12px; font-weight: 500; }
    .token-swatch-var { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); margin-top: 1px; }

    /* Type scale */
    .type-scale { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    .type-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid hsl(var(--border));
    }
    .type-meta { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); min-width: 100px; flex-shrink: 0; }
    .radius-demo { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .radius-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .radius-box {
      width: 56px;
      height: 56px;
      background: hsl(var(--primary) / .15);
      border: 2px solid hsl(var(--primary) / .4);
    }
    .radius-label { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); }

    /* Categorias */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .category-card {
      display: block;
      padding: 20px;
      border: 1px solid hsl(var(--border));
      border-radius: 14px;
      background: hsl(var(--card));
      text-decoration: none;
      color: inherit;
      transition: border-color 150ms, box-shadow 150ms, transform 150ms;
    }
    .category-card:hover {
      border-color: hsl(var(--accent) / .5);
      box-shadow: 0 4px 16px hsl(var(--foreground) / .06);
      transform: translateY(-2px);
    }
    .category-card .cat-icon { font-size: 22px; margin-bottom: 10px; }
    .category-card .cat-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .category-card .cat-count { font-size: 12px; color: hsl(var(--muted-foreground)); }
    .category-card .cat-arrow {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 500;
      color: hsl(var(--accent));
    }

    /* Template preview */
    .templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .template-card {
      border: 1px solid hsl(var(--border));
      border-radius: 20px;
      overflow: hidden;
      background: hsl(var(--card));
      transition: box-shadow 150ms, transform 150ms;
    }
    .template-card:hover {
      box-shadow: 0 8px 32px hsl(var(--foreground) / .08);
      transform: translateY(-3px);
    }
    .template-preview {
      height: 180px;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .mini-sidebar {
      width: 60px;
      background: hsl(var(--sidebar-background));
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 6px;
      flex-shrink: 0;
    }
    .mini-brand {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: hsl(var(--accent));
      margin: 0 auto 8px;
    }
    .mini-nav-item {
      height: 6px;
      border-radius: 3px;
      background: hsl(var(--sidebar-foreground) / .3);
    }
    .mini-nav-item.active {
      background: hsl(var(--sidebar-indicator));
      width: 70%;
    }
    .mini-main {
      flex: 1;
      padding: 12px;
      background: hsl(var(--background));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mini-kpi-row { display: flex; gap: 6px; }
    .mini-kpi {
      flex: 1;
      height: 36px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .mini-table {
      flex: 1;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .template-info { padding: 20px; }
    .template-info h4 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
    .template-info p { font-size: 13px; color: hsl(var(--muted-foreground)); margin: 0 0 14px; line-height: 1.5; }
    .template-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 150ms;
    }
    .template-link:hover { background: hsl(var(--primary) / .9); }

    /* Como usar tabs */
    .tabs-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid hsl(var(--border));
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 18px;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: hsl(var(--muted-foreground));
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 150ms;
    }
    .tab-btn.active {
      color: hsl(var(--foreground));
      border-bottom-color: hsl(var(--accent));
    }
    .tab-btn:hover:not(.active) { color: hsl(var(--foreground)); }
    .code-block {
      background: hsl(var(--sidebar-background));
      color: hsl(var(--sidebar-foreground));
      border-radius: 12px;
      padding: 20px 24px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }
    .code-comment { color: hsl(var(--sidebar-foreground) / .5); }
    .code-tag { color: hsl(var(--accent)); }
    .code-attr { color: hsl(var(--sidebar-indicator)); }
    .code-string { color: hsl(174 60% 65%); }

    /* Footer */
    footer {
      border-top: 1px solid hsl(var(--border));
      padding: 40px 32px;
      text-align: center;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    footer a { color: hsl(var(--accent)); text-decoration: none; }

    @media (max-width: 640px) {
      .section-wrap { padding: 48px 20px; }
      .sticky-cta { top: 12px; right: 12px; padding: 8px 14px; font-size: 12px; }
    }
  </style>
</head>
<body class="preset-base">

  <a class="sticky-cta" href="../index.html">Ver exemplos →</a>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ── helpers ──────────────────────────────────────────────
    const getCssVar = (name) => {
      if (typeof window === "undefined") return "";
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    };

    // ── Hero Section ──────────────────────────────────────────
    const PALETTE_CHIPS = [
      { label: "--primary", name: "Petroleum" },
      { label: "--accent", name: "Terracotta" },
      { label: "--background", name: "Cream" },
      { label: "--sidebar-background", name: "Sidebar" },
      { label: "--success", name: "Success" },
      { label: "--destructive", name: "Error" },
    ];

    const HeroSection = () => {
      const [colors, setColors] = React.useState({});
      React.useEffect(() => {
        const c = {};
        PALETTE_CHIPS.forEach(({ label }) => { c[label] = getCssVar(label); });
        setColors(c);
      }, []);

      return (
        <section>
          <div className="section-wrap" style={{ paddingBottom: 64 }}>
            <p className="eyebrow">Design System · Wave 6.5</p>
            <h1 className="hero-title">
              Anti-AI<br />Design System
            </h1>
            <p className="hero-sub">
              Componentes com personalidade. Sem sombras genéricas, sem azul shadcn padrão,
              sem a cara de IA que todo mundo usa. Um sistema que demonstra a si mesmo.
            </p>
            <div className="palette-chips">
              {PALETTE_CHIPS.map(({ label, name }) => (
                <div key={label} className="chip-swatch">
                  <div
                    className="chip-dot"
                    style={{ background: colors[label] ? `hsl(${colors[label]})` : "transparent" }}
                  />
                  <span>{name}</span>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // ── Filosofia Section ─────────────────────────────────────
    const ANTIPATTERNS = [
      {
        icon: "🚫",
        title: "Sem sombras AI-default",
        desc: "box-shadow: 0 4px 6px rgba(0,0,0,.1) é a marca registrada de todo projeto gerado por IA. Aqui, sombras são hue-aware ou não existem.",
      },
      {
        icon: "🎨",
        title: "Neutros com cor",
        desc: "Nenhum neutro é 0 0% L%. Todo foreground e background carrega hue. É a diferença entre editorial e output padrão.",
      },
      {
        icon: "📐",
        title: "Tipografia deliberada",
        desc: "Poppins (body) + Lora (display) + Geist Mono (dados). Nunca Inter sozinha. Font pairing é identidade, não detalhe.",
      },
      {
        icon: "⚡",
        title: "Tokens vivos, não hardcoded",
        desc: "Toda cor passa por hsl(var(--token)). Um override no :root muda o app inteiro. Sem hex bakeado nos componentes.",
      },
    ];

    const FilosofiaSection = () => (
      <section className="alt-bg">
        <div className="section-wrap">
          <p className="eyebrow">Por que existe</p>
          <h2 className="section-title">4 anti-padrões que combatemos</h2>
          <p className="section-sub">
            Cada decisão aqui é uma resposta direta ao que todo AI coding tool gera por padrão.
          </p>
          <div className="antipatterns-grid">
            {ANTIPATTERNS.map((ap) => (
              <div key={ap.title} className="antipattern-card">
                <div className="antipattern-icon">{ap.icon}</div>
                <h4>{ap.title}</h4>
                <p>{ap.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    // ── Tokens Vivos Section ──────────────────────────────────
    const TOKEN_GROUPS = [
      {
        label: "Superfícies",
        tokens: [
          { name: "--background", label: "Background" },
          { name: "--card", label: "Card" },
          { name: "--muted", label: "Muted" },
          { name: "--border", label: "Border" },
        ],
      },
      {
        label: "Marca",
        tokens: [
          { name: "--primary", label: "Primary" },
          { name: "--accent", label: "Accent" },
          { name: "--ring", label: "Ring / Foco" },
        ],
      },
      {
        label: "Sidebar",
        tokens: [
          { name: "--sidebar-background", label: "Sidebar BG" },
          { name: "--sidebar-accent", label: "Sidebar Accent" },
          { name: "--sidebar-indicator", label: "Indicator" },
        ],
      },
      {
        label: "Status",
        tokens: [
          { name: "--success", label: "Success" },
          { name: "--warning", label: "Warning" },
          { name: "--destructive", label: "Destructive" },
          { name: "--info", label: "Info" },
        ],
      },
    ];

    const TYPE_SCALE = [
      { meta: "display / 600", size: 36, family: "var(--font-display)", sample: "Lora Display" },
      { meta: "h2 / 600", size: 24, family: "var(--font-display)", sample: "Seção principal" },
      { meta: "body / 500", size: 15, family: "var(--font-body)", sample: "Texto corrido do app" },
      { meta: "caption / 400", size: 12, family: "var(--font-body)", sample: "Metadados e labels" },
      { meta: "mono / 400", size: 12, family: "var(--font-mono)", sample: "2024-05-01 · token-id" },
    ];

    const RADIUS_SCALE = [
      { label: "--radius-sm", value: "6px" },
      { label: "--radius-md", value: "10px" },
      { label: "--radius-lg", value: "14px" },
      { label: "--radius-xl", value: "20px" },
      { label: "--radius-2xl", value: "24px" },
    ];

    const TokensVivosSection = () => {
      const [colors, setColors] = React.useState({});
      React.useEffect(() => {
        const c = {};
        TOKEN_GROUPS.forEach(g => g.tokens.forEach(t => { c[t.name] = getCssVar(t.name); }));
        setColors(c);
      }, []);

      return (
        <section>
          <div className="section-wrap">
            <p className="eyebrow">Fundação</p>
            <h2 className="section-title">Tokens em vivo</h2>
            <p className="section-sub">
              Todos os blocos abaixo consomem as CSS vars diretamente. Editar um token no
              SettingsScreen muda esta página instantaneamente.
            </p>

            <div className="tokens-grid">
              {TOKEN_GROUPS.map((grp) => (
                <div key={grp.label} className="token-group">
                  <h4>{grp.label}</h4>
                  <div className="token-swatches">
                    {grp.tokens.map((t) => (
                      <div key={t.name} className="token-swatch-row">
                        <div
                          className="token-swatch-color"
                          style={{ background: colors[t.name] ? `hsl(${colors[t.name]})` : "transparent" }}
                        />
                        <div>
                          <div className="token-swatch-label">{t.label}</div>
                          <div className="token-swatch-var">{t.name}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Typography */}
            <div style={{ marginTop: 48 }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, margin: "0 0 4px" }}>Escala tipográfica</h3>
              <p style={{ fontSize: 13, color: "hsl(var(--muted-foreground))", margin: "0 0 20px" }}>
                Poppins + Lora + Geist Mono — nunca Inter sozinha.
              </p>
              <div className="type-scale">
                {TYPE_SCALE.map((t) => (
                  <div key={t.meta} className="type-row">
                    <div className="type-meta">{t.meta}</div>
                    <div style={{ fontSize: t.size, fontFamily: t.family, lineHeight: 1.2 }}>{t.sample}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Radius */}
            <div style={{ marginTop: 40 }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, margin: "0 0 4px" }}>Radius scale</h3>
              <p style={{ fontSize: 13, color: "hsl(var(--muted-foreground))", margin: "0 0 20px" }}>
                Nunca border-radius arbitrário. Sempre via var(--radius-*).
              </p>
              <div className="radius-demo">
                {RADIUS_SCALE.map((r) => (
                  <div key={r.label} className="radius-swatch">
                    <div className="radius-box" style={{ borderRadius: r.value }} />
                    <div className="radius-label">{r.value}</div>
                    <div className="radius-label" style={{ fontSize: 9, marginTop: -4 }}>{r.label.replace("--radius-", "")}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    };

    // ── Categorias Section ────────────────────────────────────
    const CATEGORIES = [
      { key: "base", icon: "⬜", name: "Base", count: "7 componentes", desc: "Button, Input, Textarea, Select, Checkbox, Radio, Switch" },
      { key: "surfaces", icon: "🃏", name: "Surfaces", count: "2 componentes", desc: "Card, Surface" },
      { key: "display", icon: "💎", name: "Display", count: "14 componentes", desc: "Badge, Avatar, Alert, Dialog, Toast, Tooltip e mais" },
      { key: "layout", icon: "📐", name: "Layout", count: "4 componentes", desc: "PageHeader, Section, PageShell, AppLayout" },
      { key: "forms", icon: "📝", name: "Forms", count: "7 componentes", desc: "FormField, FileUpload, Combobox, Slider, Stepper" },
      { key: "navigation", icon: "🧭", name: "Navigation", count: "5 componentes", desc: "Tabs, Breadcrumb, Pagination, NavLink, Sidebar" },
      { key: "data", icon: "📊", name: "Data", count: "3 componentes", desc: "Table, AppTable, ListItem" },
      { key: "dashboard", icon: "📈", name: "Dashboard", count: "3 componentes", desc: "StatCard, KpiGrid, MetricCard" },
      { key: "auth", icon: "🔐", name: "Auth", count: "4 telas", desc: "Login, Register, ForgotPassword, ConfirmEmail" },
      { key: "screens", icon: "🖥️", name: "Screens", count: "5 telas", desc: "Dashboard, Profile, Settings, Romaneios, EmptyDashboard" },
    ];

    const CategoriasSection = () => (
      <section className="alt-bg">
        <div className="section-wrap">
          <p className="eyebrow">Catálogo técnico</p>
          <h2 className="section-title">Categorias de componentes</h2>
          <p className="section-sub">
            56+ componentes e telas organizados por função. Cada categoria tem showcase técnico próprio.
          </p>
          <div className="categories-grid">
            {CATEGORIES.map((cat) => (
              <a key={cat.key} href={`./${cat.key}.html`} className="category-card">
                <div className="cat-icon">{cat.icon}</div>
                <div className="cat-name">{cat.name}</div>
                <div className="cat-count">{cat.count}</div>
                <div className="cat-arrow">Ver catálogo →</div>
              </a>
            ))}
          </div>
        </div>
      </section>
    );

    // ── Templates Preview Section ─────────────────────────────
    const MiniAppPreview = ({ accentColor }) => (
      <div className="template-preview">
        <div className="mini-sidebar">
          <div className="mini-brand" style={{ background: accentColor || "hsl(var(--accent))" }} />
          {[true, false, false, false, false].map((active, i) => (
            <div key={i} className="mini-nav-item" style={{ width: active ? "70%" : `${50 + i * 10}%`, opacity: active ? 1 : 0.5 }} />
          ))}
        </div>
        <div className="mini-main">
          <div className="mini-kpi-row">
            {[0, 1, 2, 3].map((i) => <div key={i} className="mini-kpi" />)}
          </div>
          <div className="mini-table" />
        </div>
      </div>
    );

    const TEMPLATES = [
      {
        key: "ops",
        title: "Ops Template",
        desc: "Gestão operacional: romaneios, entregas, dashboard de pedidos. Para logística e operação.",
        accentColor: "hsl(var(--accent))",
      },
      {
        key: "crm",
        title: "CRM Template",
        desc: "Pipeline de vendas, contatos, análise de conversão. Para times comerciais.",
        accentColor: "hsl(var(--primary))",
      },
      {
        key: "wiki",
        title: "Wiki Template",
        desc: "Base de conhecimento, artigos, editor. Para documentação interna.",
        accentColor: "hsl(var(--success))",
      },
    ];

    const TemplatesSection = () => (
      <section>
        <div className="section-wrap">
          <p className="eyebrow">Exemplos completos</p>
          <h2 className="section-title">Templates interativos</h2>
          <p className="section-sub">
            3 produtos completos construídos sobre o DS. Login, sidebar, dashboard, perfil e settings — todos funcionando.
          </p>
          <div className="templates-grid">
            {TEMPLATES.map((t) => (
              <div key={t.key} className="template-card">
                <MiniAppPreview accentColor={t.accentColor} />
                <div className="template-info">
                  <h4>{t.title}</h4>
                  <p>{t.desc}</p>
                  <a href="../index.html" className="template-link">Explorar →</a>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    // ── Como Usar Section ─────────────────────────────────────
    const TABS_CONTENT = {
      lovable: {
        label: "Lovable",
        code: `<span class="code-comment">// No Lovable, adicione ao Project Knowledge:</span>

Design System: Anti-AI DS (anti-ai-design-system repo)
Tokens: hsl(var(--*)) — nunca hex hardcoded
Fonts: Poppins (body) + Lora (display) + Geist Mono
Sidebar: bg-sidebar-background, indicator esquerdo 3px
Cards: border-radius var(--radius-xl), border 1px solid hsl(var(--border))
Botões: border-radius var(--radius-md), font-weight 500

<span class="code-comment">// Prompt de componente:</span>
<span class="code-string">"Cria um StatCard usando hsl(var(--card)) como fundo,
 Lora 26px font-display no valor, Poppins caption no label.
 Border 1px solid hsl(var(--border)), radius var(--radius-xl)."</span>`,
      },
      react: {
        label: "React",
        code: `<span class="code-comment">// 1. Importa o CSS de tokens</span>
<span class="code-tag">import</span> <span class="code-string">"anti-ai-ds/colors_and_type.css"</span>;

<span class="code-comment">// 2. Componente usa tokens via Tailwind ou style inline</span>
<span class="code-tag">export const</span> <span class="code-attr">Card</span> = ({ children }) => (
  <span class="code-tag">&lt;div</span> <span class="code-attr">style</span>=<span class="code-string">{{</span>
    background: <span class="code-string">"hsl(var(--card))"</span>,
    border: <span class="code-string">"1px solid hsl(var(--border))"</span>,
    borderRadius: <span class="code-string">"var(--radius-xl)"</span>,
    padding: <span class="code-string">"var(--space-6)"</span>,
  <span class="code-string">}}</span><span class="code-tag">&gt;</span>
    {children}
  <span class="code-tag">&lt;/div&gt;</span>
);

<span class="code-comment">// 3. Theme override via CSS vars</span>
document.documentElement.style.setProperty(<span class="code-string">"--accent"</span>, <span class="code-string">"220 90% 50%"</span>);`,
      },
      html: {
        label: "HTML standalone",
        code: `<span class="code-tag">&lt;!-- 1. Link stylesheet --&gt;</span>
<span class="code-tag">&lt;link</span> <span class="code-attr">rel</span>=<span class="code-string">"stylesheet"</span> <span class="code-attr">href</span>=<span class="code-string">"colors_and_type.css"</span> <span class="code-tag">/&gt;</span>

<span class="code-tag">&lt;!-- 2. Aplica preset --&gt;</span>
<span class="code-tag">&lt;body</span> <span class="code-attr">class</span>=<span class="code-string">"preset-base"</span><span class="code-tag">&gt;</span>

<span class="code-tag">&lt;!-- 3. Usa CSS vars em qualquer elemento --&gt;</span>
<span class="code-tag">&lt;div</span> <span class="code-attr">style</span>=<span class="code-string">"
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  font-family: var(--font-body);
  color: hsl(var(--foreground));
"</span><span class="code-tag">&gt;</span>
  Pronto. Sem config.
<span class="code-tag">&lt;/div&gt;</span>`,
      },
    };

    const ComoUsarSection = () => {
      const [activeTab, setActiveTab] = React.useState("lovable");
      const tab = TABS_CONTENT[activeTab];
      return (
        <section className="alt-bg">
          <div className="section-wrap">
            <p className="eyebrow">Integração</p>
            <h2 className="section-title">Como usar</h2>
            <p className="section-sub">
              3 formas de integrar — Lovable via Knowledge, React via import, ou HTML puro sem bundler.
            </p>
            <div className="tabs-bar">
              {Object.entries(TABS_CONTENT).map(([key, { label }]) => (
                <button
                  key={key}
                  className={`tab-btn${activeTab === key ? " active" : ""}`}
                  onClick={() => setActiveTab(key)}
                >{label}</button>
              ))}
            </div>
            <div className="code-block" dangerouslySetInnerHTML={{ __html: tab.code }} />
          </div>
        </section>
      );
    };

    // ── Footer ────────────────────────────────────────────────
    const Footer = () => (
      <footer>
        <p style={{ margin: "0 0 6px" }}>
          Anti-AI Design System · Wave 6.5 · Artemis Studio
        </p>
        <p style={{ margin: 0 }}>
          <a href="../index.html">Ver exemplos interativos →</a>
          {" · "}
          <a href="./base.html">Catálogo técnico</a>
        </p>
      </footer>
    );

    // ── App ───────────────────────────────────────────────────
    const App = () => (
      <>
        <HeroSection />
        <FilosofiaSection />
        <TokensVivosSection />
        <CategoriasSection />
        <TemplatesSection />
        <ComoUsarSection />
        <Footer />
      </>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
