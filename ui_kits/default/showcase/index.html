<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-AI Design System · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    .showcase-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .showcase-grid { display: grid; gap: 16px; }
    .showcase-meta { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 6px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
  </style>
</head>
<body class="preset-base">
  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[
          ["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],
          ["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],
          ["dashboard","Dashboard"],["auth","Auth"],
        ].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );

    const Section = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const App = () => (
      <>
        <Nav current="index" />
        <h1>Anti-AI Design System · Showcase</h1>
        <p className="lead">
          Componentes Wave 6.5 da default kit. Use a navegação acima pra visitar cada categoria.
        </p>

        <Section title="Estrutura">
          <ul style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, listStyle: "none", padding: 0, margin: 0 }}>
            {[
              ["base", "7 componentes — Button, Input, Textarea, Select, Checkbox, Radio, Switch"],
              ["surfaces", "2 componentes — Card, Surface"],
              ["display", "9 componentes — Badge, Tag, Avatar, Alert, EmptyState, StatusBadge, Skeleton, Spinner, Toast"],
              ["layout", "4 componentes — PageHeader, Section, PageShell, AppLayout"],
              ["forms", "4 componentes — FormField, NumberField, DateField, FileUpload"],
              ["navigation", "5 componentes — Tabs, Breadcrumb, Pagination, NavLink, Sidebar"],
              ["data", "3 componentes — Table, AppTable, ListItem"],
              ["dashboard", "3 componentes — StatCard, KpiGrid, MetricCard"],
              ["auth", "4 telas — Login, Register, ForgotPassword, ConfirmEmail"],
            ].map(([key, desc]) => (
              <li key={key} style={{ padding: 16, border: "1px solid hsl(var(--border))", borderRadius: 10 }}>
                <a href={`./${key}.html`} style={{ fontSize: 14, fontWeight: 600, color: "hsl(var(--accent))", textDecoration: "none" }}>{key} →</a>
                <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", marginTop: 4 }}>{desc}</div>
              </li>
            ))}
          </ul>
        </Section>

        <Section title="Convenções"
          meta="Tokens: hsl(var(--*)) com alpha opcional. Sem hex bakeado. Brand-agnostic.">
          <ul style={{ fontSize: 13, lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
            <li>Cor sempre via <code>hsl(var(--token))</code>, nunca <code>var(--token)</code> direto.</li>
            <li>Variantes via prop, não fork de componente.</li>
            <li>Composição por slots (children, leading, trailing, actions) ao invés de mega-prop.</li>
            <li>Brand chega via props no consumidor, não hardcoded em componentes.</li>
          </ul>
        </Section>
      </>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
