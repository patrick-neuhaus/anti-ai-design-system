<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-AI Design System</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      margin: 0;
      overflow-x: hidden;
    }

    /* Sticky CTA */
    .sticky-cta {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 16px hsl(var(--accent) / .35);
      transition: transform 150ms, box-shadow 150ms;
    }
    .sticky-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px hsl(var(--accent) / .45);
    }

    /* Layout */
    .section-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px;
    }
    .section-wrap + .section-wrap {
      padding-top: 0;
    }
    section.alt-bg {
      position: relative;
      background: hsl(var(--muted) / .4);
      isolation: isolate;
    }
    /* Animated gradient bg — hue shift sutil em loop (svgator: animated gradient effect) */
    section.alt-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        hsl(var(--accent) / .04) 0%,
        transparent 35%,
        hsl(var(--primary) / .04) 65%,
        transparent 100%);
      background-size: 200% 200%;
      animation: bg-shift 18s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes bg-shift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      section.alt-bg::before { animation: none; }
    }

    /* Typography */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    h1.hero-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 600;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin: 0 0 20px;
      color: hsl(var(--foreground));
    }
    h2.section-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0 0 8px;
    }
    .section-sub {
      font-size: 15px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 0 0 40px;
    }

    /* Hero */
    .hero-sub {
      font-size: 18px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      max-width: 560px;
      margin: 0 0 32px;
    }
    .palette-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    .chip-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      cursor: default;
      transition: border-color 150ms;
    }
    .chip-swatch:hover { border-color: hsl(var(--foreground) / .3); }
    .chip-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }

    /* Anti-padrão split side-by-side */
    .antipatterns-split {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .split-subsection {
      padding: 32px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .split-subsection:last-child { border-bottom: none; }
    .split-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 16px;
    }
    @media (max-width: 700px) {
      .split-cols { grid-template-columns: 1fr; }
    }
    .split-card {
      border-radius: 14px;
      padding: 20px;
      position: relative;
    }
    .split-card.ai-default {
      background: #f4f4f4;
      border: 1px solid #e0e0e0;
    }
    .split-card.anti-ai {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .split-legend {
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .split-legend.bad { color: #888; }
    .split-legend.good { color: hsl(var(--success)); }
    .split-desc {
      font-size: 12.5px;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin: 12px 0 0;
    }
    /* Mockup elements inside split cards */
    .mock-btn-generic {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 6px;
      border: 1px solid #d1d5db; background: #fff;
      font-size: 13px; color: #374151; font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      cursor: default;
    }
    .mock-badge-generic {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 4px;
      background: #e5e7eb; color: #6b7280;
      font-size: 11px; font-family: sans-serif;
    }
    .mock-card-generic {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 14px; margin-top: 10px;
      font-size: 12px; color: #6b7280; font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
    }
    .mock-btn-ds {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: var(--radius-md, 10px);
      border: none; background: hsl(var(--accent));
      font-size: 13px; color: hsl(var(--accent-foreground));
      font-family: var(--font-body); font-weight: 500;
      cursor: default;
    }
    .mock-badge-ds {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      background: hsl(var(--accent) / .12); color: hsl(var(--accent));
      font-size: 11px; font-family: var(--font-mono);
      font-weight: 600; letter-spacing: .04em; border: 1px solid hsl(var(--accent) / .25);
    }
    .mock-card-ds {
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl, 20px);
      padding: 14px; margin-top: 10px;
      font-size: 12px; color: hsl(var(--muted-foreground));
      font-family: var(--font-body);
    }
    .split-subsection-label {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: hsl(var(--foreground));
      margin: 0 0 20px;
    }
    @media (max-width: 700px) {
      .split-subsection { grid-template-columns: 1fr; }
    }

    /* Tokens vivos — grid 2×2 fixo */
    .tokens-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 640px) {
      .tokens-grid { grid-template-columns: 1fr; }
    }
    .token-group h4 {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      margin: 0 0 10px;
    }
    .token-swatches { display: flex; flex-direction: column; gap: 6px; }
    .token-swatch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-color {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid hsl(var(--border));
    }
    .token-swatch-label { font-size: 12px; font-weight: 500; }
    .token-swatch-var { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); margin-top: 1px; }

    /* Type scale — amostras grandes no tamanho real */
    .type-scale { display: flex; flex-direction: column; gap: 0; margin-top: 24px; }
    .type-row {
      display: grid;
      grid-template-columns: 140px auto;
      align-items: center;
      gap: 24px;
      padding: 16px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .type-meta-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .type-meta-name { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .06em; }
    .type-meta-size { font-family: var(--font-mono); font-size: 11px; color: hsl(var(--foreground)); font-weight: 500; }
    .type-meta-lh { font-family: var(--font-mono); font-size: 9px; color: hsl(var(--muted-foreground) / .7); }
    .type-meta { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); min-width: 100px; flex-shrink: 0; }
    .radius-demo { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .radius-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .radius-box {
      width: 56px;
      height: 56px;
      background: hsl(var(--primary) / .15);
      border: 2px solid hsl(var(--primary) / .4);
    }
    .radius-label { font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); }

    /* Categorias — TOC editorial (lista vertical) */
    .categories-toc {
      display: flex;
      flex-direction: column;
      max-width: 980px;
    }
    .toc-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid hsl(var(--border));
      text-decoration: none;
      color: inherit;
      transition: background 150ms;
      border-radius: 8px;
      cursor: default;
    }
    .toc-row:last-child { border-bottom: none; }
    .toc-row:hover { background: hsl(var(--muted) / .35); padding-left: 12px; padding-right: 12px; margin: 0 -12px; }
    .toc-row:hover .toc-chips .toc-chip { filter: brightness(1.08); }
    .toc-row:hover .toc-cta { transform: translateX(4px); }
    .toc-left {
      flex: 0 0 220px;
      min-width: 0;
    }
    .toc-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: hsl(var(--foreground));
      margin: 0 0 2px;
    }
    .toc-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      letter-spacing: .04em;
    }
    .toc-chips {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .toc-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--muted) / .5);
      font-size: 11px;
      font-family: var(--font-mono);
      color: hsl(var(--muted-foreground));
      transition: filter 150ms;
    }
    .toc-cta {
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 500;
      color: hsl(var(--accent));
      transition: transform 200ms;
      white-space: nowrap;
    }
    @media (max-width: 700px) {
      .toc-left { flex: 0 0 140px; }
      .toc-chips { display: none; }
    }

    /* Template preview */
    .templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .template-card {
      border: 1px solid hsl(var(--border));
      border-radius: 20px;
      overflow: hidden;
      background: hsl(var(--card));
      transition: box-shadow 150ms, transform 150ms;
    }
    .template-card:hover {
      box-shadow: 0 8px 32px hsl(var(--foreground) / .08);
      transform: translateY(-3px);
    }
    .template-preview {
      height: 180px;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .mini-sidebar {
      width: 60px;
      background: hsl(var(--sidebar-background));
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 6px;
      flex-shrink: 0;
    }
    .mini-brand {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: hsl(var(--accent));
      margin: 0 auto 8px;
    }
    .mini-nav-item {
      height: 6px;
      border-radius: 3px;
      background: hsl(var(--sidebar-foreground) / .3);
    }
    .mini-nav-item.active {
      background: hsl(var(--sidebar-indicator));
      width: 70%;
    }
    .mini-main {
      flex: 1;
      padding: 12px;
      background: hsl(var(--background));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mini-kpi-row { display: flex; gap: 6px; }
    .mini-kpi {
      flex: 1;
      height: 36px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .mini-table {
      flex: 1;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
    }
    .template-info { padding: 20px; }
    .template-info h4 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
    .template-info p { font-size: 13px; color: hsl(var(--muted-foreground)); margin: 0 0 14px; line-height: 1.5; }
    .template-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 150ms;
    }
    .template-link:hover { background: hsl(var(--primary) / .9); }

    /* Como usar tabs */
    .tabs-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid hsl(var(--border));
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 18px;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: hsl(var(--muted-foreground));
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 150ms;
    }
    .tab-btn.active {
      color: hsl(var(--foreground));
      border-bottom-color: hsl(var(--accent));
    }
    .tab-btn:hover:not(.active) { color: hsl(var(--foreground)); }
    .code-block {
      background: hsl(var(--sidebar-background));
      color: hsl(var(--sidebar-foreground));
      border-radius: 12px;
      padding: 20px 24px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }
    .code-comment { color: hsl(var(--sidebar-foreground) / .5); }
    /* 2.6: amarelo claro sobre verde escuro — ratio >= 4.5:1 AA */
    .code-tag { color: hsl(45 95% 75%); }
    .code-attr { color: hsl(var(--sidebar-indicator)); }
    .code-string { color: hsl(174 60% 65%); }

    /* Footer 3-col funcional */
    footer {
      position: relative;
      overflow: hidden;
      background: hsl(var(--muted) / .3);
    }
    .footer-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 48px;
    }
    .footer-col h4 {
      font-size: 12px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: .1em;
      color: hsl(var(--foreground));
      font-weight: 600;
      margin: 0 0 16px;
    }
    .footer-col ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-col ul li a {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      text-decoration: none;
      transition: color 150ms;
    }
    .footer-col ul li a:hover { color: hsl(var(--foreground)); }
    .footer-status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    .footer-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: hsl(var(--success));
      flex-shrink: 0;
    }
    .footer-bottom {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 32px;
      border-top: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-bottom-brand {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      font-family: var(--font-mono);
    }
    .footer-bottom-links {
      display: flex;
      gap: 16px;
    }
    .footer-bottom-links a {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      text-decoration: none;
      transition: color 150ms;
    }
    .footer-bottom-links a:hover { color: hsl(var(--foreground)); }
    @media (max-width: 700px) {
      .footer-body { grid-template-columns: 1fr; gap: 32px; padding: 40px 20px 32px; }
      .footer-bottom { flex-direction: column; align-items: flex-start; padding: 16px 20px; }
    }

    @media (max-width: 640px) {
      .section-wrap { padding: 48px 20px; }
      .sticky-cta { top: 12px; right: 12px; padding: 8px 14px; font-size: 12px; }
    }

    /* ==================================================
       SCROLLYTELLING — sections fade-up + stagger children
       ================================================== */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    /* Stagger children (.reveal-stagger > *) */
    .reveal-stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1); }
    .reveal-stagger.in > *  { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
    .reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
    .reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }

    /* Section progress bar (top of viewport) */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 200;
      transition: width 80ms linear;
      pointer-events: none;
    }

    /* ==================================================
       HERO CANVAS — floating component cards + parallax
       ================================================== */
    .hero-canvas-wrap {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
      min-height: 520px;
    }
    @media (min-width: 960px) {
      .hero-canvas-wrap { grid-template-columns: 1.1fr 1fr; }
    }
    .hero-canvas {
      position: relative;
      height: 480px;
      perspective: 1200px;
      pointer-events: none;
    }
    .float-card {
      position: absolute;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 20px 50px -20px hsl(var(--foreground) / .18), 0 4px 12px -4px hsl(var(--foreground) / .08);
      transition: transform 200ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
      pointer-events: auto;
    }
    .float-card.fc-stat   { top: 8%;  left: 0;  width: 220px; animation: float-a 6s ease-in-out infinite; }
    .float-card.fc-side   { top: 26%; right: 4%; width: 200px; animation: float-b 7s ease-in-out infinite; padding: 0; overflow: hidden; }
    .float-card.fc-pal    { bottom: 14%; left: 8%; width: 240px; animation: float-c 8s ease-in-out infinite; }
    .float-card.fc-badge  { bottom: 6%; right: 10%; width: auto; animation: float-d 5.5s ease-in-out infinite; padding: 8px 14px; border-radius: 999px; }

    @keyframes float-a { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(-1deg); } }
    @keyframes float-b { 0%,100% { transform: translateY(0) rotate(1deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
    @keyframes float-c { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
    @keyframes float-d { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    /* Hero card content */
    .fc-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .fc-stat-icon { width: 32px; height: 32px; border-radius: 8px; background: hsl(var(--accent) / .15); display: grid; place-items: center; color: hsl(var(--accent)); font-size: 16px; }
    .fc-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase; }
    .fc-stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; }
    .fc-stat-trend { font-size: 11px; color: hsl(var(--success)); margin-top: 4px; font-family: var(--font-mono); }

    .fc-side-mini { background: hsl(var(--sidebar-background)); padding: 12px 10px; }
    .fc-side-brand { font-family: var(--font-display); font-size: 13px; color: hsl(var(--sidebar-foreground)); font-weight: 600; margin-bottom: 10px; padding-left: 6px; }
    .fc-side-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 11px; color: hsl(var(--sidebar-foreground) / .8); }
    .fc-side-row.active { background: hsl(var(--sidebar-accent)); color: hsl(var(--sidebar-accent-foreground)); position: relative; }
    .fc-side-row.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 14px; background: hsl(var(--sidebar-indicator)); border-radius: 2px; }
    .fc-side-dot { width: 10px; height: 10px; border-radius: 3px; background: currentColor; opacity: .7; }

    .fc-pal-title { font-size: 11px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .fc-pal-row { display: flex; gap: 6px; }
    .fc-pal-chip {
      flex: 1;
      height: 32px;
      border-radius: 6px;
      animation: pal-morph 8s ease-in-out infinite;
    }
    .fc-pal-chip:nth-child(1) { background: hsl(var(--primary)); animation-delay: 0s; }
    .fc-pal-chip:nth-child(2) { background: hsl(var(--accent)); animation-delay: .8s; }
    .fc-pal-chip:nth-child(3) { background: hsl(var(--success)); animation-delay: 1.6s; }
    .fc-pal-chip:nth-child(4) { background: hsl(var(--info)); animation-delay: 2.4s; }
    .fc-pal-chip:nth-child(5) { background: hsl(var(--destructive)); animation-delay: 3.2s; }
    @keyframes pal-morph {
      0%, 100% { filter: hue-rotate(0deg) saturate(1); }
      50%      { filter: hue-rotate(20deg) saturate(1.15); }
    }

    .fc-badge-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .fc-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: hsl(var(--success)); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 hsl(var(--success) / .5); }
      50%      { box-shadow: 0 0 0 6px hsl(var(--success) / 0); }

    /* Subtle background grid in hero canvas (anti-AI: deliberate, not random) */
    .hero-canvas::before {
      content: "";
      position: absolute;
      inset: -20px;
      background-image:
        linear-gradient(hsl(var(--foreground) / .04) 1px, transparent 1px),

      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);

    /* ==================================================
       FLOATING HEADER — glass blur sticky top
       ================================================== */
    .nav-header {
      position: fixed;
      top: 16px;

    /* Hide redundant old sticky-cta when new header present */

    /* Wave 4.3 — scroll-margin pra compensar nav-header fixed (68px + folga) */
    section[id] { scroll-margin-top: 80px; }


    /* ==================================================
       3D TILT cards (Filosofia)
       ================================================== */
    .antipattern-card {
      transform-style: preserve-3d;

    /* ==================================================

    .token-swatch-color {

    .token-swatch-color::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;

      transition: opacity 400ms, transform 400ms cubic-bezier(.2,.8,.2,1);

    .reveal-stagger.in .token-swatch-color::after {
      opacity: .8;
      transform: scale(1);
      animation: stroke-fade 1200ms 600ms forwards;
    }
    @keyframes stroke-fade {
      to { opacity: 0; transform: scale(0.95); }

    /* ==================================================
       Categorias — TOC row hover sweep
       ================================================== */
    /* toc-row hover handled above */

    /* ==================================================
       Templates preview — mock cursor auto-clicking
       ================================================== */
    .template-card { position: relative; }
    .mock-cursor {
      position: absolute;
      pointer-events: none;
      width: 18px;
      height: 18px;

    .mock-cursor svg { width: 100%; height: 100%; }
    @keyframes cursor-tour {
      0%   { top: 28px; left: 22px; opacity: 0; }
      8%   { opacity: 1; }
      20%  { top: 64px; left: 32px; }
      30%  { top: 64px; left: 32px; transform: scale(.85); }
      35%  { transform: scale(1); }
      55%  { top: 110px; left: 130px; }
      75%  { top: 142px; left: 220px; }

    .mock-cursor.click-pulse::after {
      content: "";
      position: absolute;
      inset: -6px;

    }
    @keyframes click-ring {
      0%, 28%   { opacity: 0; transform: scale(.5); }
      32%       { opacity: 1; transform: scale(1); }
      36%       { opacity: 0; transform: scale(1.6); }
      82%       { opacity: 0; transform: scale(.5); }
      86%       { opacity: 1; transform: scale(1); }
      90%       { opacity: 0; transform: scale(1.6); }
      100%      { opacity: 0; }

    /* ==================================================
       Como Usar — code typing reveal + tab morph
       ================================================== */
    .code-block {
      position: relative;
      overflow: hidden;

    .code-block::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;

    /* ==================================================
       Footer — liquid wave SVG topo
       ================================================== */
    .footer-wave {
      display: block;
      width: 100%;
      height: 60px;
      margin-bottom: -1px;
    }
    .footer-wave path {
      animation: wave 8s ease-in-out infinite alternate;
    }
    @keyframes wave {
      0%   { d: path("M0 30 Q 250 0 500 30 T 1000 30 V 60 H 0 Z"); }
      100% { d: path("M0 30 Q 250 60 500 30 T 1000 30 V 60 H 0 Z"); }
    }

    /* ==================================================
       Float cards — sem hover interaction (2.1: static float anim)
       ================================================== */
    .float-card {
      transition: none;
      cursor: default;
      opacity: 0.85;
    }

    /* ==================================================
       Filosofia — glow cursor trail inside card
       ================================================== */
    .antipattern-card {
      --glow-x: 50%;
      --glow-y: 50%;
    }
    .antipattern-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(160px circle at var(--glow-x) var(--glow-y), hsl(var(--accent) / .18), transparent 70%);

      pointer-events: none;
      z-index: 0;

    .antipattern-card:hover::before { opacity: 1; }
    .antipattern-card > * { position: relative; z-index: 1; }

    /* Wave 5.1 — token swatch: sutil hover border highlight sem label duplicado */
    .token-swatch-row {
      transition: border-color 150ms, background 150ms;
      cursor: default;
    }
    .token-swatch-row:hover {
      border-color: hsl(var(--foreground) / .2);

    /* ==================================================
       Categorias — counter rolling
       ================================================== */

      display: inline-block;

    }

    /* ==================================================
       Templates — hover parallax depth
       ================================================== */
    .template-card {
      transition: box-shadow 300ms, transform 300ms cubic-bezier(.2,.8,.2,1);
      transform-style: preserve-3d;
      perspective: 800px;
    }
    .template-card:hover {
      box-shadow: 0 24px 56px -12px hsl(var(--foreground) / .18), 0 8px 20px -4px hsl(var(--foreground) / .1) !important;
      transform: translateY(-6px) scale(1.02) !important;
    }

    /* ==================================================
       ComoUsar — cursor blink + tab morph
       ================================================== */
    .code-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: hsl(var(--accent));
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: cursor-blink 1s step-end infinite;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .code-block-wrap {
      position: relative;
      overflow: hidden;
    }
    .code-block-inner {
      transition: opacity 200ms, transform 200ms cubic-bezier(.2,.8,.2,1);
    }
    .code-block-inner.exiting {
      opacity: 0;
      transform: scaleX(0.96) translateX(-8px);
      transform-origin: left center;
    }
    .code-block-inner.entering {
      opacity: 0;
      transform: scaleX(0.96) translateX(8px);
      transform-origin: left center;
    }
    .code-block-inner.visible {

      transform: scaleX(1) translateX(0);
    }

    /* ==================================================
       Footer — constellation
       ================================================== */
    .footer-constellation {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    @keyframes constellation-draw {

      from { opacity: 0; transform: scale(0); }

    /* Reduced motion: kill all animations */
    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform: none; }

      .fc-pal-chip { animation: none !important; }
      .fc-badge-dot { animation: none !important; }
      .code-cursor { animation: none !important; opacity: 1; }
      .code-block-inner { transition: none !important; }
      .antipattern-card::before { display: none; }
      .template-card:hover { transform: translateY(-3px) !important; }
    }
  </style>

<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ── helpers ──────────────────────────────────────────────
    const getCssVar = (name) => {
      if (typeof window === "undefined") return "";
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    };

    // Hook: aplica classe "in" quando o elemento entra no viewport.
    // Usa IntersectionObserver, fires once (unobserve apos triggerar).
    const useReveal = (options = { threshold: 0.15, rootMargin: "-40px 0px" }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            el.classList.add("in");
            io.unobserve(el);
          }
        }, options);
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return ref;
    };

    // Progress bar global (top of viewport)
    const useScrollProgress = () => {
      React.useEffect(() => {
        const bar = document.getElementById("progressBar");
        if (!bar) return;
        const onScroll = () => {
          const h = document.documentElement;
          const max = (h.scrollHeight - h.clientHeight) || 1;
          const pct = (h.scrollTop / max) * 100;
          bar.style.width = pct + "%";
        };
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
    };

    // Parallax mouse no hero canvas (subtle: max ±10px)
    // Respeita _paralaxPaused quando card está em tilt individual
    const useMouseParallax = (ref, intensity = 12) => {
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          const x = ((e.clientX - r.left) / r.width  - 0.5) * 2;
          const y = ((e.clientY - r.top)  / r.height - 0.5) * 2;
          el.querySelectorAll("[data-parallax]").forEach((card) => {
            if (card._paralaxPaused) return;
            const depth = parseFloat(card.dataset.parallax) || 1;
            card.style.transform = `translate3d(${x * intensity * depth}px, ${y * intensity * depth}px, 0)`;
          });
        };
        const onLeave = () => {
          el.querySelectorAll("[data-parallax]").forEach((c) => {
            if (c._paralaxPaused) return;
            c.style.transform = "";
          });
        };
        el.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
        return () => {
          el.removeEventListener("mousemove", onMove);
          el.removeEventListener("mouseleave", onLeave);
        };
      }, []);
    };

    // Hook: 3D tilt individual em cada float-card no hero
    const useFloatCardTilt = (canvasRef) => {
      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) return;
        const cards = canvas.querySelectorAll(".float-card");
        const handlers = [];
        cards.forEach((card) => {
          const onEnter = () => {
            card.classList.add("is-hovered");
            // pause parallax on this card while hovered
            card._paralaxPaused = true;
          };
          const onMove = (e) => {
            const r = card.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width;
            const y = (e.clientY - r.top) / r.height;
            const rx = (0.5 - y) * 16;
            const ry = (x - 0.5) * 16;
            card.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.10)`;
          };
          const onLeave = () => {
            card.classList.remove("is-hovered");
            card._paralaxPaused = false;
            card.style.transform = "";
          };
          card.addEventListener("mouseenter", onEnter);
          card.addEventListener("mousemove", onMove);
          card.addEventListener("mouseleave", onLeave);
          handlers.push([card, onEnter, onMove, onLeave]);
        });
        return () => handlers.forEach(([c, en, mv, lv]) => {
          c.removeEventListener("mouseenter", en);
          c.removeEventListener("mousemove", mv);
          c.removeEventListener("mouseleave", lv);
        });
      }, []);
    };

    // Hook: glow trail em cada card (usa CSS var --glow-x/y)
    const useGlowTrail = (ref) => {
      React.useEffect(() => {
        const root = ref.current;
        if (!root) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) return;
        const cards = root.querySelectorAll("[data-glow]");
        const handlers = [];
        cards.forEach((card) => {
          const onMove = (e) => {
            const r = card.getBoundingClientRect();
            card.style.setProperty("--glow-x", `${e.clientX - r.left}px`);
            card.style.setProperty("--glow-y", `${e.clientY - r.top}px`);
          };
          card.addEventListener("mousemove", onMove);
          handlers.push([card, onMove]);
        });
        return () => handlers.forEach(([c, fn]) => c.removeEventListener("mousemove", fn));
      }, []);
    };


    // Hook: counter rolling animation (0 → N) quando entra viewport
    const useCounterRoll = (ref, target, duration = 600) => {
      const [count, setCount] = React.useState(0);
      const hasRun = React.useRef(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) { setCount(target); return; }
        const io = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !hasRun.current) {
            hasRun.current = true;
            const start = performance.now();
            const tick = (now) => {
              const elapsed = now - start;
              const progress = Math.min(elapsed / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.round(eased * target));
              if (progress < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
            io.unobserve(el);
          }
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, [target, duration]);
      return count;
    };

    // ── Hero Section ──────────────────────────────────────────
    const PALETTE_CHIPS = [
      { label: "--primary", name: "Petroleum" },
      { label: "--accent", name: "Terracotta" },
      { label: "--background", name: "Cream" },
      { label: "--sidebar-background", name: "Sidebar" },
      { label: "--success", name: "Success" },
      { label: "--destructive", name: "Error" },
    ];

    const HeroSection = () => {
      const [colors, setColors] = React.useState({});
      const canvasRef = React.useRef(null);
      // 2.1: sem useMouseParallax nem useFloatCardTilt — float anim puro via CSS keyframes
      React.useEffect(() => {
        const c = {};
        PALETTE_CHIPS.forEach(({ label }) => { c[label] = getCssVar(label); });
        setColors(c);
      }, []);

      return (
        <section>
          <div className="section-wrap" style={{ paddingBottom: 64 }}>
            <div className="hero-canvas-wrap">
              {/* Texto */}
              <div>
                <p className="eyebrow">Sistema editorial · 56+ componentes</p>
                <h1 className="hero-title">
                  Anti-AI<br />Design System
                </h1>
                <p className="hero-sub">
                  Componentes com personalidade. Sem sombras genéricas, sem azul shadcn padrão,
                  sem a cara de IA que todo mundo usa. Um sistema que demonstra a si mesmo.
                </p>
                <div className="palette-chips">
                  {PALETTE_CHIPS.map(({ label, name }) => (
                    <div key={label} className="chip-swatch">
                      <div
                        className="chip-dot"
                        style={{ background: colors[label] ? `hsl(${colors[label]})` : "transparent" }}
                      />
                      <span>{name}</span>
                    </div>
                  ))}
                </div>

      { cx: "45%", cy: "20%" },
      { cx: "68%", cy: "55%" },
      { cx: "88%", cy: "35%" },
    ];
    // linhas entre dots adjacentes
    const CONSTELLATION_LINES = [
      [0, 1], [1, 2], [2, 3], [3, 4], [0, 2],
    ];

    const ConstellationSvg = () => {
      const prefersReduced = typeof window !== "undefined" && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      return (
        <svg
          className="footer-constellation"
          viewBox="0 0 100 100"
          preserveAspectRatio="none"
          aria-hidden="true"
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none" }}
        >
          {CONSTELLATION_LINES.map(([a, b], i) => {
            const da = CONSTELLATION_DOTS[a];
            const db = CONSTELLATION_DOTS[b];
            return (
              <line
                key={i}
                x1={da.cx} y1={da.cy}
                x2={db.cx} y2={db.cy}
                stroke="hsl(var(--foreground))"
                strokeOpacity="0.06"
                strokeWidth="0.3"
                style={prefersReduced ? {} : {
                  strokeDasharray: 30,
                  strokeDashoffset: 30,
                  animation: `constellation-draw 2s ${i * 0.3}s ease forwards`,
                }}
              />
            );
          })}
          {CONSTELLATION_DOTS.map((d, i) => (
            <circle
              key={i}
              cx={d.cx} cy={d.cy} r="0.7"
              fill="hsl(var(--foreground))"
              fillOpacity="0.12"
              style={prefersReduced ? {} : {
                animation: `constellation-pop 0.4s ${i * 0.25}s ease both`,
              }}
            />
          ))}
        </svg>
      );
    };

    // ── Footer 3-col funcional (2.7) ─────────────────────────
    const Footer = () => (
      <footer>
        <ConstellationSvg />
        <svg className="footer-wave" viewBox="0 0 1000 60" preserveAspectRatio="none" aria-hidden="true">
          <path d="M0 30 Q 250 0 500 30 T 1000 30 V 60 H 0 Z" fill="hsl(var(--muted) / .5)" />
        </svg>
        <div className="footer-body">
          <div className="footer-col">
            <h4>Recursos</h4>
            <ul>
              <li><a href="./base.html">Showcase técnico</a></li>
              <li><a href="../index.html">Templates demo</a></li>
              <li><a href="#tokens">Tokens</a></li>
              <li><a href="#como-usar">Como usar</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>Repositório</h4>
            <ul>
              <li><a href="https://github.com/patrick-neuhaus/anti-ai-design-system" target="_blank" rel="noopener">GitHub</a></li>
              <li><a href="https://github.com/patrick-neuhaus/anti-ai-design-system/blob/main/LICENSE" target="_blank" rel="noopener">License MIT</a></li>
              <li><a href="https://github.com/patrick-neuhaus/anti-ai-design-system/issues" target="_blank" rel="noopener">Issues</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>Status</h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div className="footer-status-item">
                <div className="footer-status-dot" />
                <span>v6.5 · stable</span>
              </div>
              <div className="footer-status-item" style={{ gap: 0, flexDirection: "column", alignItems: "flex-start" }}>
                <span style={{ fontSize: 12, color: "hsl(var(--muted-foreground))" }}>Último update</span>
                <span style={{ fontSize: 13, fontFamily: "var(--font-mono)", color: "hsl(var(--foreground))" }}>2026-05-01</span>
              </div>
              <div className="footer-status-item" style={{ gap: 0, flexDirection: "column", alignItems: "flex-start" }}>
                <span style={{ fontSize: 12, color: "hsl(var(--muted-foreground))" }}>Build</span>
                <span style={{ fontSize: 13, color: "hsl(var(--success))", fontWeight: 500 }}>✓ stable</span>
              </div>
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <span className="footer-bottom-brand">Anti-AI Design System · v6.5 · MIT · Artemis Studio</span>
          <div className="footer-bottom-links">
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Uso</a>
          </div>
        </div>
      </footer>
    );

    // ── App ───────────────────────────────────────────────────
    const App = () => {
      useScrollProgress();
      return (
        <>
          <HeroSection />
          <TemplatesSection />
          <FilosofiaSection />
          <TokensVivosSection />
          <CategoriasSection />
          <ComoUsarSection />
          <Footer />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
