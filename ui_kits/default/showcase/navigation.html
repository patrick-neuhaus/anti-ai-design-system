<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navigation · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }
  
    /* Wave 9.4 — CTA responsive */
    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/display/Badge.jsx"></script>
  <script type="text/babel" src="../components/navigation/Tabs.jsx"></script>
  <script type="text/babel" src="../components/navigation/Breadcrumb.jsx"></script>
  <script type="text/babel" src="../components/navigation/Pagination.jsx"></script>
  <script type="text/babel" src="../components/navigation/NavLink.jsx"></script>
  <script type="text/babel" src="../components/navigation/UserMenu.jsx"></script>
  <script type="text/babel" src="../components/navigation/Sidebar.jsx"></script>
  <script type="text/babel" src="../components/display/StatusBadge.jsx"></script>
  <script type="text/babel" src="../components/dashboard/StatCard.jsx"></script>
  <script type="text/babel" src="../components/dashboard/KpiGrid.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const TAB_CONTENT = {
      over: <div style={{ padding: "12px 0", fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Overview: métricas gerais, gráficos e KPIs de alto nível.</div>,
      act:  <div style={{ padding: "12px 0", fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Activity: histórico de ações, logs e eventos recentes.</div>,
      set:  <div style={{ padding: "12px 0", fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Settings: configurações de preferências, notificações e integrações.</div>,
    };

    const App = () => {
      const [tab, setTab] = React.useState("over");
      const [tabPill, setTabPill] = React.useState("over");
      const [page, setPage] = React.useState(3);
      const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
      const [sidebarActive, setSidebarActive] = React.useState("dashboard");
      return (
        <>
          <h1>Navigation</h1>
          <p className="lead">Tabs, breadcrumb, pagination, nav-link. Sidebar tem preview à parte.</p>

          <ShowcaseSection title="Tabs — underline (single tablist com conteúdo)">
            <div style={{ display: "flex", flexDirection: "column" }}>
              <Tabs
                value={tab} onChange={setTab}
                items={[{value:"over",label:"Overview",count:12},{value:"act",label:"Activity"},{value:"set",label:"Settings",icon:Icon.Settings}]}
              />
              {TAB_CONTENT[tab]}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Tabs — pill variant">
            <div style={{ display: "flex", flexDirection: "column" }}>
              <Tabs
                value={tabPill} onChange={setTabPill} variant="pill"
                items={[{value:"over",label:"Overview"},{value:"act",label:"Activity"},{value:"set",label:"Settings"}]}
              />
              {TAB_CONTENT[tabPill]}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Breadcrumb">
            <Breadcrumb items={[
              { label: "Home", icon: Icon.Home, href: "#" },
              { label: "Settings", href: "#" },
              { label: "Team", href: "#" },
              { label: "Roles" },
            ]}/>
          </ShowcaseSection>

          <ShowcaseSection title="Pagination">
            <Pagination page={page} totalPages={20} onChange={setPage} />
          </ShowcaseSection>

          <ShowcaseSection title="NavLink — hover em todos os items"
            meta="Primitivo pra link de rota. Hover state em todos (não só active).">
            <div style={{ width: 240, display: "flex", flexDirection: "column", gap: 2 }}>
              <NavLink active leading={<Icon.LayoutDashboard size={16} />}>Dashboard</NavLink>
              <NavLink leading={<Icon.Package size={16} />} trailing={<Badge intent="primary">12</Badge>}>Deliveries</NavLink>
              <NavLink leading={<Icon.FileText size={16} />}>Romaneios</NavLink>
              <NavLink leading={<Icon.Settings size={16} />}>Configurações</NavLink>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Sidebar — collapse toggle funcional" meta="Clique no botão divisória pra colapsar/expandir.">
            <div style={{ height: 420, border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden", display: "flex", position: "relative" }}>
              <Sidebar
                active={sidebarActive}
                onNavigate={setSidebarActive}
                collapsed={sidebarCollapsed}
                onToggleCollapse={() => setSidebarCollapsed(c => !c)}
                onLogout={() => {}}
                brand={{ logo: "../../../assets/placeholder-logo.svg", mark: "../../../assets/placeholder-mark.svg", name: "App" }}
                user={{ name: "Nome Sobrenome", email: "email@exemplo.com" }}
              />
              <div style={{ flex: 1, padding: 16, overflow: "auto", background: "hsl(var(--background))" }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: "hsl(var(--foreground))" }}>Dashboard</div>
                <KpiGrid columns={3} gap={10}>
                  <StatCard icon={Icon.Package} value="48" label="Total Hoje" sublabel="Volumes expedidos" trend="+8%" />
                  <StatCard icon={Icon.Truck} value="12" label="Em Trânsito" sublabel="Aguardando entrega" />
                  <StatCard icon={Icon.CheckCircle} value="36" label="Concluídos" sublabel="Finalizados hoje" trend="+12%" />
                </KpiGrid>
                <div style={{ marginTop: 12, background: "hsl(var(--card))", border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ padding: "10px 14px", fontSize: 12, fontWeight: 600, borderBottom: "1px solid hsl(var(--border))", color: "hsl(var(--foreground))" }}>Romaneios recentes</div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "hsl(var(--muted) / .4)" }}>
                        <th style={{ padding: "6px 12px", textAlign: "left", fontWeight: 500, color: "hsl(var(--muted-foreground))" }}>ID</th>
                        <th style={{ padding: "6px 12px", textAlign: "left", fontWeight: 500, color: "hsl(var(--muted-foreground))" }}>Motorista</th>
                        <th style={{ padding: "6px 12px", textAlign: "left", fontWeight: 500, color: "hsl(var(--muted-foreground))" }}>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { id: "RM-001847", motorista: "Carlos Andrade", status: "conferido" },
                        { id: "RM-001846", motorista: "Marcos Silva", status: "pendente" },
                        { id: "RM-001845", motorista: "Pedro Lima", status: "em_conferencia" },
                      ].map((r) => (
                        <tr key={r.id} style={{ borderTop: "1px solid hsl(var(--border))" }}>
                          <td style={{ padding: "7px 12px", fontFamily: "var(--font-mono, monospace)", color: "hsl(var(--muted-foreground))" }}>{r.id}</td>
                          <td style={{ padding: "7px 12px" }}>{r.motorista}</td>
                          <td style={{ padding: "7px 12px" }}><StatusBadge value={r.status} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="navigation" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
