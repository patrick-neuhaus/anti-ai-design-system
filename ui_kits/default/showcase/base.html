<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Base · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }
  
    /* Wave 9.4 — CTA responsive */
    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/base/Input.jsx"></script>
  <script type="text/babel" src="../components/base/Textarea.jsx"></script>
  <script type="text/babel" src="../components/base/Select.jsx"></script>
  <script type="text/babel" src="../components/base/Checkbox.jsx"></script>
  <script type="text/babel" src="../components/base/Radio.jsx"></script>
  <script type="text/babel" src="../components/base/Switch.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const App = () => {
      const [text, setText] = React.useState("");
      const [chk, setChk] = React.useState(true);
      const [rd, setRd] = React.useState("a");
      const [sw, setSw] = React.useState(false);
      const [sel, setSel] = React.useState("");
      return (
        <>
          <h1>Base</h1>
          <p className="lead">Primitivos de input e ação. Compõem todo o resto.</p>

          <ShowcaseSection title="Button">
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              <div>
                <div style={{ fontFamily: "var(--font-mono, monospace)", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "hsl(var(--muted-foreground))", marginBottom: 10 }}>Variants</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <Button>Primary</Button>
                  <Button variant="secondary">Secondary</Button>
                  <Button variant="outline">Outline</Button>
                  <Button variant="ghost">Ghost</Button>
                  <Button variant="destructive">Destructive</Button>
                </div>
              </div>
              <div style={{ borderTop: "1px solid hsl(var(--border) / .5)", paddingTop: 20 }}>
                <div style={{ fontFamily: "var(--font-mono, monospace)", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "hsl(var(--muted-foreground))", marginBottom: 10 }}>Sizes</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <Button size="sm">Small</Button>
                  <Button size="md">Medium</Button>
                  <Button size="lg">Large</Button>
                </div>
              </div>
              <div style={{ borderTop: "1px solid hsl(var(--border) / .5)", paddingTop: 20 }}>
                <div style={{ fontFamily: "var(--font-mono, monospace)", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "hsl(var(--muted-foreground))", marginBottom: 10 }}>With Icons</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <Button iconLeft={Icon.Plus}>Icon Left</Button>
                  <Button iconRight={Icon.ArrowRight}>Icon Right</Button>
                  <Button iconOnly aria-label="Search" iconLeft={Icon.Search} />
                </div>
              </div>
              <div style={{ borderTop: "1px solid hsl(var(--border) / .5)", paddingTop: 20 }}>
                <div style={{ fontFamily: "var(--font-mono, monospace)", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "hsl(var(--muted-foreground))", marginBottom: 10 }}>States</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <Button disabled>Disabled</Button>
                  <Button variant="outline" disabled>Disabled Outline</Button>
                </div>
              </div>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Input + adornments">
            <div className="showcase-grid" style={{ gridTemplateColumns: "repeat(2, 1fr)" }}>
              <Input placeholder="Sem ícone" value={text} onChange={(e) => setText(e.target.value)} />
              <Input placeholder="Buscar…" iconLeft={Icon.Search} />
              <Input placeholder="Inválido" invalid />
              <Input placeholder="Disabled" disabled />
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Textarea, Select">
            <div className="showcase-grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 12, alignItems: "start" }}>
              <Textarea placeholder="Escreva algo…" rows={3} />
              <Select
                value={sel}
                onChange={(e) => setSel(e.target.value)}
                placeholder="Escolha…"
                options={[
                  { value: "a", label: "Opção A" },
                  { value: "b", label: "Opção B" },
                  { value: "c", label: "Opção C" },
                ]}
              />
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Checkbox, Radio, Switch">
            <div className="showcase-row" style={{ gap: 24 }}>
              <Checkbox checked={chk} onChange={(e) => setChk(e.target.checked)} label="Ativar opção" />
              <RadioGroup direction="horizontal">
                <Radio name="g" value="a" checked={rd === "a"} onChange={(e) => setRd(e.target.value)} label="A" />
                <Radio name="g" value="b" checked={rd === "b"} onChange={(e) => setRd(e.target.value)} label="B" />
                <Radio name="g" value="c" checked={rd === "c"} onChange={(e) => setRd(e.target.value)} label="C" />
              </RadioGroup>
              <Switch checked={sw} onChange={(e) => setSw(e.target.checked)} label="Modo escuro" />
            </div>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="base" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
