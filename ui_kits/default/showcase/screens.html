<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screens · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }

    /* ── Floating glass header ────────────────────────────── */
    .float-header {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 200;
      display: flex; align-items: center; gap: 0;
      max-width: 720px; width: calc(100% - 48px);
      background: hsl(var(--card) / .75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid hsl(var(--border) / .5);
      border-radius: 999px;
      padding: 8px 8px 8px 20px;
      box-shadow: 0 4px 24px hsl(var(--foreground) / .06);
    }
    .float-header-logo {
      font-family: var(--font-display); font-size: 14px; font-weight: 600;
      color: hsl(var(--foreground)); letter-spacing: -.01em; white-space: nowrap;
      text-decoration: none;
    }
    .float-header-nav {
      display: flex; align-items: center; gap: 2px;
      margin-left: 16px; flex: 1;
    }
    .float-header-nav a {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 5px 10px; border-radius: 999px;
      white-space: nowrap; transition: color 150ms, background 150ms;
    }
    .float-header-nav a:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .float-header-cta {
      margin-left: 8px; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 999px;
      background: hsl(var(--accent)); color: hsl(var(--accent-foreground));
      font-size: 12px; font-weight: 600; text-decoration: none;
      transition: background 150ms;
    }
    .float-header-cta:hover { background: hsl(var(--accent) / .85); }
    @media (max-width: 640px) {
      .float-header-nav { display: none; }
      .float-header { padding: 8px 8px 8px 16px; }
    }

    /* ── Scrollytelling — reveal on scroll ────────────────── */
    .reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-stagger > * {
      opacity: 0; transform: translateY(20px);
      transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1);
    }
    .reveal-stagger.in > * { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
    .reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
    .reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }
    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform: none; }
    }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 48px; padding-bottom: 8px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
    .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 16px; }
    .preview-frame { border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 24px; background: hsl(var(--background)); min-height: 480px; }

    /* ── Categories dropdown in float-header ─────────────────── */
    .fh-dropdown { position: relative; }
    .fh-dropdown-btn {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 5px 10px; border-radius: 999px;
      white-space: nowrap; transition: color 150ms, background 150ms;
      background: none; border: none; cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .fh-dropdown-btn:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .fh-dropdown-menu {
      display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: hsl(var(--card)); border: 1px solid hsl(var(--border) / .6);
      border-radius: 12px; padding: 6px;
      box-shadow: 0 8px 32px hsl(var(--foreground) / .10);
      min-width: 200px; z-index: 300;
      flex-direction: column; gap: 2px;
    }
    .fh-dropdown[data-open="true"] .fh-dropdown-menu { display: flex; }
    .fh-dropdown-btn .fh-arrow { display: inline-block; transition: transform 200ms ease; }
    .fh-dropdown[data-open="true"] .fh-dropdown-btn .fh-arrow { transform: rotate(180deg); }
    .fh-dropdown-menu a {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 6px 10px; border-radius: 8px;
      white-space: nowrap; transition: color 150ms, background 150ms;
    }
    .fh-dropdown-menu a:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .fh-dropdown-menu a.fh-active { color: hsl(var(--accent)); background: hsl(var(--accent-decorative, var(--accent)) / .10); font-weight: 500; }
  
    /* Mobile overflow fix Wave 1.3 */
    @media (max-width: 480px) {
      .showcase-shell { padding: 80px 16px 60px; }
      table { display: block; max-width: 100%; overflow-x: auto; }
      .preview-frame, .showcase-block, .demo-frame { max-width: 100%; overflow-x: hidden; }
      pre, code { max-width: 100%; overflow-x: auto; word-wrap: break-word; }
      .showcase-section > * { min-width: 0; }
      .showcase-block > * { min-width: 0; }
      .float-header { left: 8px; right: 8px; max-width: calc(100vw - 16px); }
      .float-header-nav { gap: 8px; flex-wrap: wrap; }
    }
  </style>
</head>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"],["screens","Screens"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}

    );

    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    // Presets visuais do Design System
    const PRESETS = [
      {
        name: "Ops Default",
        desc: "Industrial, alta densidade. Para sistemas operacionais.",
        accent: "#2563eb",
        bg: "#ffffff",
        card: "#f8fafc",
        muted: "#f1f5f9",
        text: "#0f172a",

        name: "CRM Dark",
        desc: "Dark mode denso. Para CRMs e painéis analíticos.",
        accent: "#6366f1",
        bg: "#0f172a",
        card: "#1e293b",
        muted: "#334155",
        text: "#f1f5f9",
      },

        name: "Wiki Sage",
        desc: "Verde-neutro, leve. Para wikis e bases de conhecimento.",
        accent: "#16a34a",
        bg: "#f9fafb",
        card: "#ffffff",
        muted: "#f0fdf4",
        text: "#111827",
      },
    ];

    const PresetCard = ({ preset, active, onClick }) => (
      <div
        onClick={onClick}
        style={{
          cursor: "pointer",
          border: `2px solid ${active ? preset.accent : "hsl(var(--border))"}`,
          borderRadius: 12,
          overflow: "hidden",
          transition: "border-color 200ms, box-shadow 200ms",
          boxShadow: active ? `0 0 0 3px ${preset.accent}33` : "none",
        }}
      >
        {/* Mini preview */}
        <div style={{ background: preset.bg, padding: 12, display: "flex", gap: 8 }}>
          {/* Sidebar mini */}
          <div style={{ width: 32, background: preset.card, borderRadius: 6, border: `1px solid ${preset.muted}`, display: "flex", flexDirection: "column", alignItems: "center", padding: "6px 4px", gap: 4 }}>
            <div style={{ width: 16, height: 4, borderRadius: 2, background: preset.accent }} />
            {[0,1,2].map(i => <div key={i} style={{ width: 16, height: 3, borderRadius: 2, background: preset.muted }} />)}
          </div>
          {/* Content mini */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
            <div style={{ height: 10, borderRadius: 3, background: preset.text, opacity: 0.8, width: "60%" }} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
              <div style={{ height: 28, borderRadius: 6, background: preset.card, border: `1px solid ${preset.muted}` }} />
              <div style={{ height: 28, borderRadius: 6, background: preset.card, border: `1px solid ${preset.muted}` }} />
            </div>
            <div style={{ height: 6, borderRadius: 3, background: preset.accent, width: "40%" }} />
          </div>
        </div>
        {/* Label */}
        <div style={{ padding: "10px 12px", background: "hsl(var(--card))", borderTop: "1px solid hsl(var(--border))" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "hsl(var(--foreground))" }}>{preset.name}</div>
          <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", marginTop: 2 }}>{preset.desc}</div>
          <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
            {[preset.accent, preset.bg, preset.card, preset.muted].map((c, i) => (
              <div key={i} style={{ width: 14, height: 14, borderRadius: "50%", background: c, border: "1px solid hsl(var(--border))" }} />
            ))}
          </div>
        </div>
      </div>
    );

    const DesignSystemTab = () => {
      const [activePreset, setActivePreset] = React.useState(0);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>3 Presets visuais</div>
            <div style={{ fontSize: 13, color: "hsl(var(--muted-foreground))", marginBottom: 16 }}>
              Selecione um preset pra ver o preview. O SettingsScreen (admin) permite editar tokens com live swap.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {PRESETS.map((p, i) => (
                <PresetCard key={p.name} preset={p} active={activePreset === i} onClick={() => setActivePreset(i)} />
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Token Editor (SettingsScreen)</div>
            <div style={{ border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden", minHeight: 400 }}>
              <SettingsScreen onSave={(o) => console.log("save", o)} />

    };

    const App = () => {
      const [picked, setPicked] = React.useState("design-system");
      return (
        <>
          <h1>Screens</h1>
          <p className="lead">Telas inteiras compostas dos componentes do design system. Use como referência pra montar telas reais.</p>

          <ShowcaseSection title="Picker">
            <Tabs
              value={picked} onChange={setPicked}
              items={[
                {value:"design-system",label:"Design System"},
                {value:"profile",label:"Profile"},
                {value:"dashboard",label:"Dashboard"},
                {value:"romaneios",label:"Romaneios"},
                {value:"empty",label:"Empty Dashboard"},
              ]}
            />
          </ShowcaseSection>

          <ShowcaseSection title="Preview">
            <div className="preview-frame">
              {picked === "design-system" && <DesignSystemTab />}
              {picked === "profile"    && <ProfileScreen
                user={{ name: "Patrick Neuhaus", email: "patrick@studioartemis.com", role: "Admin", since: "Mar/2024" }}
                onSave={(d) => console.log("save", d)}
                onChangePassword={() => alert("Reset password flow")}
                onDeleteAccount={() => alert("Delete account flow")}
                onUploadAvatar={() => alert("Upload avatar")}
              />}
              {picked === "dashboard"  && <DashboardScreen onOpenRomaneios={() => setPicked("romaneios")} />}
              {picked === "romaneios"  && <RomaneiosScreen />}
              {picked === "empty"      && <EmptyDashboardScreen onCreate={() => alert("Create flow")} />}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Notas">
            <ul style={{ fontSize: 13, lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
              <li><strong>Design System</strong> — 3 presets visuais (Ops Default, CRM Dark, Wiki Sage) + SettingsScreen com live token editor.</li>
              <li><strong>ProfileScreen</strong> — perfil próprio com edit inline + delete account + change password + upload avatar.</li>
              <li><strong>DashboardScreen / RomaneiosScreen</strong> — DEMO CONTENT (TransLog/Choco). Substitua data via props pra reuso.</li>
              <li><strong>EmptyDashboardScreen</strong> — fallback pra primeiro acesso (sem dados).</li>
            </ul>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* Dropdown click-to-open */
    (function () {
      var dd = document.querySelector('.fh-dropdown');
      var btn = document.querySelector('.fh-dropdown-btn');
      var menu = document.querySelector('.fh-dropdown-menu');
      if (!dd || !btn || !menu) return;
      btn.innerHTML = btn.innerHTML.replace(/&#9660;|▾|▼/, '<span class="fh-arrow">▾</span>');
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-haspopup', 'true');
      function openDD() { dd.setAttribute('data-open', 'true'); btn.setAttribute('aria-expanded', 'true'); }
      function closeDD() { dd.removeAttribute('data-open'); btn.setAttribute('aria-expanded', 'false'); }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        dd.hasAttribute('data-open') ? closeDD() : openDD();
      });
      document.addEventListener('click', function (e) {
        if (!dd.contains(e.target)) closeDD();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeDD(); btn.focus(); }
      });
      menu.addEventListener('keydown', function (e) {
        var items = Array.from(menu.querySelectorAll('a'));
        var idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); var next = items[(idx + 1) % items.length]; if (next) next.focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); var prev = items[(idx - 1 + items.length) % items.length]; if (prev) prev.focus(); }
        if (e.key === 'Escape')    { closeDD(); btn.focus(); }
        if (e.key === 'Tab' && !e.shiftKey && idx === items.length - 1) { closeDD(); }
      });
    })();
  </script>
