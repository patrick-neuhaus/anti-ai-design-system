<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screens · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <link rel="stylesheet" href="./_token-editor.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }
  
    /* Wave 9.4 — CTA responsive */
    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/base/Input.jsx"></script>
  <script type="text/babel" src="../components/base/Checkbox.jsx"></script>
  <script type="text/babel" src="../components/base/Switch.jsx"></script>
  <script type="text/babel" src="../components/base/Radio.jsx"></script>
  <script type="text/babel" src="../components/forms/FormField.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Card.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Surface.jsx"></script>
  <script type="text/babel" src="../components/display/Avatar.jsx"></script>
  <script type="text/babel" src="../components/display/Badge.jsx"></script>
  <script type="text/babel" src="../components/display/StatusBadge.jsx"></script>
  <script type="text/babel" src="../components/display/Alert.jsx"></script>
  <script type="text/babel" src="../components/display/EmptyState.jsx"></script>
  <script type="text/babel" src="../components/display/Dialog.jsx"></script>
  <script type="text/babel" src="../components/data/ListItem.jsx"></script>
  <script type="text/babel" src="../components/dashboard/StatCard.jsx"></script>
  <script type="text/babel" src="../components/dashboard/KpiGrid.jsx"></script>
  <script type="text/babel" src="../components/dashboard/MetricCard.jsx"></script>
  <script type="text/babel" src="../components/layout/PageHeader.jsx"></script>
  <script type="text/babel" src="../components/navigation/Tabs.jsx"></script>
  <script type="text/babel" src="../components/screens/SettingsScreen.jsx"></script>
  <script type="text/babel" src="../components/screens/ProfileScreen.jsx"></script>
  <script type="text/babel" src="../components/screens/EmptyDashboardScreen.jsx"></script>
  <script type="text/babel" src="../components/screens/DashboardScreen.jsx"></script>
  <script type="text/babel" src="../components/screens/RomaneiosScreen.jsx"></script>
  <script type="text/babel" src="../components/showcase/TokenEditorPreview.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    // Presets visuais do Design System — scoped (não altera :root)
    const PRESETS = [
      {
        name: "Ops Default",
        desc: "Industrial, alta densidade. Para sistemas operacionais.",
        accent: "#2563eb",
        bg: "#ffffff",
        card: "#f8fafc",
        muted: "#f1f5f9",
        border: "#e2e8f0",
        text: "#0f172a",
        textMuted: "#64748b",
      },
      {
        name: "CRM Dark",
        desc: "Dark mode denso. Para CRMs e painéis analíticos.",
        accent: "#818cf8",
        bg: "#1a2236",
        card: "#243049",
        muted: "#2d3c56",
        border: "#374c6e",
        text: "#f1f5f9",
        textMuted: "#94a3b8",
      },
      {
        name: "Wiki Sage",
        desc: "Verde-neutro, leve. Para wikis e bases de conhecimento.",
        accent: "#16a34a",
        bg: "#f9fafb",
        card: "#ffffff",
        muted: "#f0fdf4",
        border: "#dcfce7",
        text: "#111827",
        textMuted: "#6b7280",
      },
    ];

    const PresetCard = ({ preset, active, onClick }) => (
      <div
        onClick={onClick}
        style={{
          cursor: "pointer",
          border: `2px solid ${active ? preset.accent : "hsl(var(--border))"}`,
          borderRadius: 12,
          overflow: "hidden",
          transition: "border-color 200ms, box-shadow 200ms",
          boxShadow: active ? `0 0 0 3px ${preset.accent}33` : "none",
        }}
      >
        {/* Mini preview — scoped com cores do preset */}
        <div style={{ background: preset.bg, padding: 12, display: "flex", gap: 8 }}>
          <div style={{ width: 32, background: preset.card, borderRadius: 6, border: `1px solid ${preset.border}`, display: "flex", flexDirection: "column", alignItems: "center", padding: "6px 4px", gap: 4 }}>
            <div style={{ width: 16, height: 4, borderRadius: 2, background: preset.accent }} />
            {[0,1,2].map(i => <div key={i} style={{ width: 16, height: 3, borderRadius: 2, background: preset.muted }} />)}
          </div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
            <div style={{ height: 10, borderRadius: 3, background: preset.text, opacity: 0.8, width: "60%" }} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
              <div style={{ height: 28, borderRadius: 6, background: preset.card, border: `1px solid ${preset.border}` }} />
              <div style={{ height: 28, borderRadius: 6, background: preset.card, border: `1px solid ${preset.border}` }} />
            </div>
            <div style={{ height: 6, borderRadius: 3, background: preset.accent, width: "40%" }} />
          </div>
        </div>
        {/* Label */}
        <div style={{ padding: "10px 12px", background: "hsl(var(--card))", borderTop: "1px solid hsl(var(--border))" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "hsl(var(--foreground))" }}>{preset.name}</div>
          <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", marginTop: 2 }}>{preset.desc}</div>
          <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
            {[preset.accent, preset.bg, preset.card, preset.muted].map((c, i) => (
              <div key={i} style={{ width: 14, height: 14, borderRadius: "50%", background: c, border: "1px solid hsl(var(--border))" }} />
            ))}
          </div>
        </div>
      </div>
    );

    // Mockup interno que aplica preset via inline style vars — scoped, não afeta :root
    const PresetMockup = ({ preset }) => (
      <div style={{
        background: preset.bg,
        borderRadius: 10,
        border: `1px solid ${preset.border}`,
        overflow: "hidden",
        marginTop: 16,
        display: "flex",
        minHeight: 220,
      }}>
        {/* Sidebar mini */}
        <div style={{ width: 140, background: preset.card, borderRight: `1px solid ${preset.border}`, padding: "12px 8px", display: "flex", flexDirection: "column", gap: 4 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: preset.accent, padding: "4px 8px", marginBottom: 4 }}>Anti-AI DS</div>
          {["Dashboard","Romaneios","Config. Sistema"].map((l, i) => (
            <div key={l} style={{
              padding: "6px 8px", borderRadius: 6, fontSize: 12,
              background: i === 0 ? preset.accent + "22" : "transparent",
              color: i === 0 ? preset.accent : preset.textMuted,
              fontWeight: i === 0 ? 600 : 400,
              borderLeft: i === 0 ? `3px solid ${preset.accent}` : "3px solid transparent",
            }}>{l}</div>
          ))}
        </div>
        {/* Content area */}
        <div style={{ flex: 1, padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: preset.text }}>Dashboard</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
            {[["48","Total Hoje"],["12","Em Trânsito"],["36","Concluídos"]].map(([v,l]) => (
              <div key={l} style={{ background: preset.card, border: `1px solid ${preset.border}`, borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontSize: 20, fontWeight: 600, color: preset.text }}>{v}</div>
                <div style={{ fontSize: 11, color: preset.textMuted, marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ background: preset.card, border: `1px solid ${preset.border}`, borderRadius: 8, padding: "8px 12px" }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: preset.text, marginBottom: 6 }}>Romaneios recentes</div>
            {[["RM-001847","Carlos Andrade"],["RM-001846","Marcos Silva"]].map(([id,m]) => (
              <div key={id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: preset.textMuted, padding: "4px 0", borderTop: `1px solid ${preset.border}` }}>
                <span style={{ fontFamily: "monospace" }}>{id}</span>
                <span>{m}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    // DesignSystemTab — Wave 6.2: usa TokenEditorPreview unificado (compact mode)
    const DesignSystemTab = () => (
      <TokenEditorPreview compact={true} />
    );

    const App = () => {
      const [picked, setPicked] = React.useState("design-system");
      return (
        <>
          <h1>Screens</h1>
          <p className="lead">Telas inteiras compostas dos componentes do design system. Use como referência pra montar telas reais.</p>

          <ShowcaseSection title="Picker">
            <Tabs
              value={picked} onChange={setPicked}
              items={[
                {value:"design-system",label:"Design System"},
                {value:"profile",label:"Profile"},
                {value:"dashboard",label:"Dashboard"},
                {value:"romaneios",label:"Romaneios"},
                {value:"empty",label:"Empty Dashboard"},
              ]}
            />
          </ShowcaseSection>

          <ShowcaseSection title="Preview">
            <div className="preview-frame" style={picked === "design-system" ? { border: 0, padding: 0, background: "transparent" } : {}}>
              {picked === "design-system" && <DesignSystemTab />}
              {picked === "profile"    && <ProfileScreen
                user={{ name: "Patrick Neuhaus", email: "patrick@studioartemis.com", role: "Admin", since: "Mar/2024" }}
                onSave={(d) => console.log("save", d)}
                onChangePassword={() => alert("Reset password flow")}
                onDeleteAccount={() => alert("Delete account flow")}
                onUploadAvatar={() => alert("Upload avatar")}
              />}
              {picked === "dashboard"  && <DashboardScreen onOpenRomaneios={() => setPicked("romaneios")} />}
              {picked === "romaneios"  && <RomaneiosScreen />}
              {picked === "empty"      && <EmptyDashboardScreen onCreate={() => alert("Create flow")} />}
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="Notas">
            <ul style={{ fontSize: 13, lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
              <li><strong>Design System</strong> — 3 presets visuais (Ops Default, CRM Dark, Wiki Sage) + SettingsScreen com live token editor.</li>
              <li><strong>ProfileScreen</strong> — perfil próprio com edit inline + delete account + change password + upload avatar.</li>
              <li><strong>DashboardScreen / RomaneiosScreen</strong> — DEMO CONTENT (TransLog/Choco). Substitua data via props pra reuso.</li>
              <li><strong>EmptyDashboardScreen</strong> — fallback pra primeiro acesso (sem dados).</li>
            </ul>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="screens" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
