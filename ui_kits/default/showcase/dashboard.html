<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
    .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
  </style>
</head>
<body class="preset-base">
  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/dashboard/StatCard.jsx"></script>
  <script type="text/babel" src="../components/dashboard/KpiGrid.jsx"></script>
  <script type="text/babel" src="../components/dashboard/MetricCard.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const App = () => (
      <>
        <Nav current="dashboard" />
        <h1>Dashboard</h1>
        <p className="lead">KPIs e tiles. StatCard pra contagem; MetricCard pra delta com contexto.</p>

        <ShowcaseSection title="KpiGrid + StatCard">
          <KpiGrid columns={4}>
            <StatCard icon={Icon.Package}        value="1.247" label="Total Deliveries" sublabel="Cadastradas no sistema" trend="+12%" />
            <StatCard icon={Icon.FileText}       value="183"   label="Romaneios" sublabel="Gerados este mês" trend="+5%" />
            <StatCard icon={Icon.ScanBarcode}    value="42"    label="Em Conferência" sublabel="Aguardando bipagem" />
            <StatCard icon={Icon.ClipboardCheck} value="29"    label="Carregamentos" sublabel="Concluídos hoje" trend="+18%" />
          </KpiGrid>
        </ShowcaseSection>

        <ShowcaseSection title="MetricCard — comparison + delta">
          <KpiGrid columns={3}>
            <MetricCard label="Receita" value="R$ 47,2" unit="k" delta={12.4} comparison="vs. semana anterior" />
            <MetricCard label="Conversão" value="3,8" unit="%" delta={-1.2} comparison="vs. mês anterior" />
            <MetricCard label="Tempo médio" value="42" unit="min" delta={0} deltaSuffix=" min" comparison="estável" />
          </KpiGrid>
        </ShowcaseSection>
      </>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
