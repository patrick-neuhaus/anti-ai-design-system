<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forms · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
  </style>
</head>
<body class="preset-base">
  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Input.jsx"></script>
  <script type="text/babel" src="../components/forms/FormField.jsx"></script>
  <script type="text/babel" src="../components/forms/NumberField.jsx"></script>
  <script type="text/babel" src="../components/forms/DateField.jsx"></script>
  <script type="text/babel" src="../components/forms/FileUpload.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const App = () => {
      const [n, setN] = React.useState(1);
      const [d, setD] = React.useState("");
      return (
        <>
          <Nav current="forms" />
          <h1>Forms</h1>
          <p className="lead">Wrappers de label/erro + inputs especializados. FormField envolve qualquer control.</p>

          <ShowcaseSection title="FormField — label, helper, error">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
              <FormField label="Nome" required helper="Como aparece pros outros">
                <Input placeholder="Seu nome" />
              </FormField>
              <FormField label="Email" required error="Email inválido">
                <Input type="email" placeholder="seu@email.com" invalid />
              </FormField>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="NumberField, DateField">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
              <FormField label="Quantidade">
                <NumberField value={n} onChange={(_, v) => setN(v)} min={0} max={99} unit="un" />
              </FormField>
              <FormField label="Valor">
                <NumberField value={n} onChange={(_, v) => setN(v)} prefix="R$" step={0.5} />
              </FormField>
              <FormField label="Data" required>
                <DateField value={d} onChange={(e) => setD(e.target.value)} />
              </FormField>
            </div>
          </ShowcaseSection>

          <ShowcaseSection title="FileUpload">
            <FileUpload accept=".csv,.xlsx" hint="CSV ou Excel" maxSizeMB={10} />
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
