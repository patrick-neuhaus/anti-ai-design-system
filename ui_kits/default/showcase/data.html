<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="../components/base/_aa-input.css" />
  <link rel="stylesheet" href="../components/surfaces/_aa-card.css" />
  <link rel="stylesheet" href="../components/navigation/_aa-sidebar.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* V5/V6: .progress-bar movido pra _nav.css (era duplicado em 12 HTMLs). */

    /* Wave 9.4 — CTA responsive */
    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/display/Badge.jsx"></script>
  <script type="text/babel" src="../components/display/StatusBadge.jsx"></script>
  <script type="text/babel" src="../components/display/Avatar.jsx"></script>
  <script type="text/babel" src="../components/display/Toast.jsx"></script>
  <script type="text/babel" src="../components/display/Accordion.jsx"></script>
  <script type="text/babel" src="../components/display/Separator.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/base/ToggleGroup.jsx"></script>
  <script type="text/babel" src="../components/data/Table.jsx"></script>
  <script type="text/babel" src="../components/data/AppTable.jsx"></script>
  <script type="text/babel" src="../components/data/ListItem.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const ROWS = [
      { id: "RM-001847", trans: "TransLog Brasil",   placa: "ABC1D23", status: "conferido" },
      { id: "RM-001846", trans: "Expresso Mineiro",  placa: "DEF2E45", status: "pendente" },
      { id: "RM-001845", trans: "Rodovia Sul",       placa: "GHI3F67", status: "em_conferencia" },
      { id: "RM-001844", trans: "TransLog Brasil",   placa: "JKL4G89", status: "divergente" },
    ];

    const ACCORDION_ITEMS = [
      {
        id: "tokens",
        header: "O que são design tokens?",
        content: "Tokens são variáveis CSS que representam decisões de design — cores, espaçamentos, tipografia, motion. Em vez de hardcodar `#2D6A4F`, você usa `hsl(var(--accent))`. O resultado: trocas de tema sem tocar em componentes."
      },
      {
        id: "antiAI",
        header: "Por que Anti-AI Design System?",
        content: "Ferramentas de IA geram interfaces genéricas: neutros `0 0% L%`, grid de 3 colunas simétricas, nada de editorial. O Anti-AI DS quebra isso com neutrals hue-aware (todo foreground carrega hue), tipografia editorial (Lora + Poppins) e grid assimétrico quando faz sentido."
      },
      {
        id: "usage",
        header: "Como usar os componentes?",
        content: "Cada componente é um arquivo .jsx standalone — sem build step. Inclua via <script type=\"text/babel\" src=\"...\">. Todos consomem tokens CSS do colors_and_type.css. Customização: sobrescreva tokens no :root ou em um seletor pai."
      },
    ];

    const App = () => {
      const [tgSingle, setTgSingle] = React.useState("grid");
      const [tgMulti, setTgMulti] = React.useState(["bold"]);

      return (
      <>
        <h1>Data</h1>
        <p className="lead">Tabelas, listas, accordion, separadores e toggle groups.</p>

        <ShowcaseSection title="Table — primitivo">
          <Table>
            <thead><tr><Th>ID</Th><Th>Transportadora</Th><Th>Placa</Th><Th>Status</Th></tr></thead>
            <tbody>
              {ROWS.map((r) => (
                <Tr key={r.id}>
                  <Td mono>{r.id}</Td>
                  <Td>{r.trans}</Td>
                  <Td mono>{r.placa}</Td>
                  <Td><StatusBadge value={r.status} /></Td>
                </Tr>
              ))}
            </tbody>
          </Table>
        </ShowcaseSection>

        <ShowcaseSection title="AppTable — sortable asc/desc/off + clickable">
          <AppTable
            columns={[
              { key: "id", header: "ID", mono: true, sortable: true },
              { key: "trans", header: "Transportadora", sortable: true },
              { key: "placa", header: "Placa", mono: true },
              { key: "status", header: "Status", render: (v) => <StatusBadge value={v} /> },
            ]}
            data={ROWS}
            onRowClick={(r) => window.toast?.(`Abriu ${r.id}`)}
          />
          <p style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", margin: "8px 0 0" }}>
            Clique nos headers ID/Transportadora: 1º clique = asc (▲), 2º = desc (▼), 3º = off (▼▲ semitransparente).
          </p>
        </ShowcaseSection>

        <ShowcaseSection title="ListItem">
          <div style={{ background: "hsl(var(--card))", border: "1px solid hsl(var(--border))", borderRadius: 12, overflow: "hidden" }}>
            <ListItem leading={<Avatar name="Carlos Andrade" size={32} />} title="Carlos Andrade" subtitle="Conferiu RM-001847" trailing={<Badge intent="success" dot>2 min</Badge>} onClick={() => {}} />
            <ListItem leading={<Avatar name="Ana Souza" size={32} intent="accent" />} title="Ana Souza" subtitle="Criou romaneio" trailing={<Badge>5 min</Badge>} onClick={() => {}} />
            <ListItem leading={<Avatar name="Pedro Lima" size={32} intent="neutral" />} title="Pedro Lima" subtitle="Atualizou cadastro" trailing={<Badge>1h</Badge>} divider={false} onClick={() => {}} />
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="Accordion — collapse expandable (single)">
          <Accordion items={ACCORDION_ITEMS} multiple={false} defaultOpen={["tokens"]} />
          <p style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", margin: "8px 0 0" }}>
            single: abre um item por vez. Use <code>multiple</code> pra abrir vários simultaneamente.
          </p>
        </ShowcaseSection>

        <ShowcaseSection title="Accordion — multiple">
          <Accordion items={ACCORDION_ITEMS} multiple={true} defaultOpen={["tokens", "usage"]} />
        </ShowcaseSection>

        <ShowcaseSection title="Separator — horizontal, vertical e com label">
          <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
            <span style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Conteúdo acima</span>
            <Separator decorative={false} />
            <span style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Conteúdo abaixo</span>
          </div>
          <Separator label="ou" decorative={true} />
          <div style={{ display: "flex", alignItems: "center", height: 40 }}>
            <span style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Esquerda</span>
            <Separator orientation="vertical" decorative={false} />
            <span style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>Direita</span>
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="ToggleGroup — single (view mode)">
          <ToggleGroup
            aria-label="Modo de visualização"
            type="single"
            value={tgSingle}
            onChange={setTgSingle}
            items={[
              { value: "grid", label: "Grid" },
              { value: "list", label: "Lista" },
              { value: "compact", label: "Compacto" },
            ]}
          />
          <p style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", margin: "8px 0 0" }}>
            Selecionado: <strong>{tgSingle ?? "—"}</strong>
          </p>
        </ShowcaseSection>

        <ShowcaseSection title="ToggleGroup — multiple (text formatting)">
          <ToggleGroup
            aria-label="Formatação de texto"
            type="multiple"
            variant="outline"
            value={tgMulti}
            onChange={setTgMulti}
            items={[
              { value: "bold",      label: "B" },
              { value: "italic",    label: "I" },
              { value: "underline", label: "U" },
              { value: "mono",      label: "M" },
            ]}
          />
          <p style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", margin: "8px 0 0" }}>
            Ativos: <strong>{tgMulti.join(", ") || "—"}</strong> · variant outline
          </p>
        </ShowcaseSection>

        <ToastHost />
      </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="data" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
