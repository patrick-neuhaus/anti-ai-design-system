<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }
  
    /* Wave 9.4 — CTA responsive */
    .nav-cta-mini .nav-cta-text { display: inline; }
    .nav-cta-mini .nav-cta-icon { display: none; }
    @media (max-width: 768px) {
      .nav-cta-mini {
        width: 36px; height: 36px; padding: 0;
        border-radius: 50%; display: inline-flex;
        align-items: center; justify-content: center;
      }
      .nav-cta-mini .nav-cta-text { display: none; }
      .nav-cta-mini .nav-cta-icon { display: inline; font-size: 16px; }
    }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/display/Badge.jsx"></script>
  <script type="text/babel" src="../components/display/StatusBadge.jsx"></script>
  <script type="text/babel" src="../components/display/Avatar.jsx"></script>
  <script type="text/babel" src="../components/display/Toast.jsx"></script>
  <script type="text/babel" src="../components/data/Table.jsx"></script>
  <script type="text/babel" src="../components/data/AppTable.jsx"></script>
  <script type="text/babel" src="../components/data/ListItem.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"],["screens","Screens"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const ROWS = [
      { id: "RM-001847", trans: "TransLog Brasil",   placa: "ABC1D23", status: "conferido" },
      { id: "RM-001846", trans: "Expresso Mineiro",  placa: "DEF2E45", status: "pendente" },
      { id: "RM-001845", trans: "Rodovia Sul",       placa: "GHI3F67", status: "em_conferencia" },
      { id: "RM-001844", trans: "TransLog Brasil",   placa: "JKL4G89", status: "divergente" },
    ];

    const App = () => (
      <>
        <h1>Data</h1>
        <p className="lead">Tabelas e listas. Table = primitivo, AppTable = sortable, ListItem = vertical heterogêneo.</p>

        <ShowcaseSection title="Table — primitivo">
          <Table>
            <thead><tr><Th>ID</Th><Th>Transportadora</Th><Th>Placa</Th><Th>Status</Th></tr></thead>
            <tbody>
              {ROWS.map((r) => (
                <Tr key={r.id}>
                  <Td mono>{r.id}</Td>
                  <Td>{r.trans}</Td>
                  <Td mono>{r.placa}</Td>
                  <Td><StatusBadge value={r.status} /></Td>
                </Tr>
              ))}
            </tbody>
          </Table>
        </ShowcaseSection>

        <ShowcaseSection title="AppTable — sortable asc/desc/off + clickable">
          <AppTable
            columns={[
              { key: "id", header: "ID", mono: true, sortable: true },
              { key: "trans", header: "Transportadora", sortable: true },
              { key: "placa", header: "Placa", mono: true },
              { key: "status", header: "Status", render: (v) => <StatusBadge value={v} /> },
            ]}
            data={ROWS}
            onRowClick={(r) => window.toast?.(`Abriu ${r.id}`)}
          />
          <p style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", margin: "8px 0 0" }}>
            Clique nos headers ID/Transportadora: 1º clique = asc (▲), 2º = desc (▼), 3º = off (▼▲ semitransparente).
          </p>
        </ShowcaseSection>

        <ShowcaseSection title="ListItem">
          <div style={{ background: "hsl(var(--card))", border: "1px solid hsl(var(--border))", borderRadius: 12, overflow: "hidden" }}>
            <ListItem leading={<Avatar name="Carlos Andrade" size={32} />} title="Carlos Andrade" subtitle="Conferiu RM-001847" trailing={<Badge intent="success" dot>2 min</Badge>} onClick={() => {}} />
            <ListItem leading={<Avatar name="Ana Souza" size={32} color="primary" />} title="Ana Souza" subtitle="Criou romaneio" trailing={<Badge>5 min</Badge>} onClick={() => {}} />
            <ListItem leading={<Avatar name="Pedro Lima" size={32} color="muted" />} title="Pedro Lima" subtitle="Atualizou cadastro" trailing={<Badge>1h</Badge>} divider={false} onClick={() => {}} />
          </div>
        </ShowcaseSection>

        <ToastHost />
      </>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="data" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* Dropdown click-to-open */
    (function () {
      var dd = document.querySelector('.fh-dropdown');
      var btn = document.querySelector('.fh-dropdown-btn');
      var menu = document.querySelector('.fh-dropdown-menu');
      if (!dd || !btn || !menu) return;
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-haspopup', 'true');
      function openDD() { dd.setAttribute('data-open', 'true'); btn.setAttribute('aria-expanded', 'true'); }
      function closeDD() { dd.removeAttribute('data-open'); btn.setAttribute('aria-expanded', 'false'); }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        dd.hasAttribute('data-open') ? closeDD() : openDD();
      });
      document.addEventListener('click', function (e) {
        if (!dd.contains(e.target)) closeDD();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeDD(); btn.focus(); }
      });
      menu.addEventListener('keydown', function (e) {
        var items = Array.from(menu.querySelectorAll('a'));
        var idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); var next = items[(idx + 1) % items.length]; if (next) next.focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); var prev = items[(idx - 1 + items.length) % items.length]; if (prev) prev.focus(); }
        if (e.key === 'Escape')    { closeDD(); btn.focus(); }
        if (e.key === 'Tab' && !e.shiftKey && idx === items.length - 1) { closeDD(); }
      });
    })();
  </script>
</body>
</html>
