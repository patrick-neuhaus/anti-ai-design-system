<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="../components/base/_aa-input.css" />
  <link rel="stylesheet" href="../components/surfaces/_aa-card.css" />
  <link rel="stylesheet" href="../components/navigation/_aa-sidebar.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* V5/V6: .progress-bar movido pra _nav.css (era duplicado em 12 HTMLs). */

    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */

    /* W1.4/W1.5 — Auth preview frame: fade entre variantes empilhadas no mesmo frame fixo.
       Inativas: opacity 0 + pointer-events none + inert (DOM acessivel limpo via inert no JSX). */
    .auth-frame {
      position: relative;
      width: 100%;
      height: 640px;
      border: 1px solid hsl(var(--border));
      border-radius: 16px;
      overflow: hidden;
      background: hsl(var(--background));
      box-shadow: var(--shadow-md);
    }
    .auth-variant {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast, 150ms) var(--ease-standard, cubic-bezier(.4,0,.2,1));
      /* W5.1: forca shrink em mobile (flex children default min-content == 500px+) */
      overflow: hidden;
    }
    .auth-variant > div,
    .auth-variant > div > div {
      min-width: 0;
    }
    @media (max-width: 600px) {
      /* W5.1: telas pequenas — esconde brand panel pra form caber sem overflow */
      .auth-variant > div { flex-direction: column; }
      .auth-variant > div > div:first-child { display: none; }
      .auth-frame { height: auto; min-height: 100%; }
    }
    .auth-variant.active {
      opacity: 1;
      pointer-events: auto;
    }
    @media (prefers-reduced-motion: reduce) {
      .auth-variant { transition: none; }
    }
    @media (max-width: 768px) {
      .auth-frame { height: 720px; }
    }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/base/Input.jsx"></script>
  <script type="text/babel" src="../components/base/Checkbox.jsx"></script>
  <script type="text/babel" src="../components/forms/FormField.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Card.jsx"></script>
  <script type="text/babel" src="../components/display/Alert.jsx"></script>
  <script type="text/babel" src="../components/navigation/Tabs.jsx"></script>
  <script type="text/babel" src="../components/auth/LoginScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/RegisterScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ForgotPasswordScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ResetPasswordScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ConfirmEmailScreen.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const App = () => {
      const [picked, setPicked] = React.useState("login");
      return (
        <>
          <h1>Auth</h1>
          <p className="lead">Telas full-bleed split-panel. Brand chega via prop.</p>

          <ShowcaseSection title="Picker">
            <Tabs
              value={picked} onChange={setPicked}
              items={[
                {value:"login",label:"Login"},
                {value:"register",label:"Register"},
                {value:"forgot",label:"Forgot password"},
                {value:"reset",label:"Reset password"},
                {value:"confirm",label:"Confirm email"},
              ]}
            />
          </ShowcaseSection>

          <ShowcaseSection title="Preview — frame fixo + fade 150ms">
            {/* W1.4 / F-INT-013: variantes inativas recebem aria-hidden + inert pra
                sair do tab order e nao serem lidas por leitor de tela. Mantemos
                no DOM pro fade-150ms continuar funcionando. */}
            <div className="auth-frame">
              <div className={"auth-variant" + (picked === "login" ? " active" : "")} aria-hidden={picked !== "login"} inert={picked !== "login" ? "" : undefined}>
                <LoginScreen onLogin={() => {}} onForgot={() => setPicked("forgot")} onGoRegister={() => setPicked("register")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" showGoogle />
              </div>
              <div className={"auth-variant" + (picked === "register" ? " active" : "")} aria-hidden={picked !== "register"} inert={picked !== "register" ? "" : undefined}>
                <RegisterScreen onRegister={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />
              </div>
              <div className={"auth-variant" + (picked === "forgot" ? " active" : "")} aria-hidden={picked !== "forgot"} inert={picked !== "forgot" ? "" : undefined}>
                <ForgotPasswordScreen onSubmit={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />
              </div>
              <div className={"auth-variant" + (picked === "reset" ? " active" : "")} aria-hidden={picked !== "reset"} inert={picked !== "reset" ? "" : undefined}>
                <ResetPasswordScreen onSubmit={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />
              </div>
              <div className={"auth-variant" + (picked === "confirm" ? " active" : "")} aria-hidden={picked !== "confirm"} inert={picked !== "confirm" ? "" : undefined}>
                <ConfirmEmailScreen status="success" email="user@example.com" onContinue={() => {}} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />
              </div>
            </div>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="auth" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
