<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }

    /* ── Floating glass header ────────────────────────────── */
    .float-header {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 200;
      display: flex; align-items: center; gap: 0;
      max-width: 720px; width: calc(100% - 48px);
      background: hsl(var(--card) / .75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid hsl(var(--border) / .5);
      border-radius: 999px;
      padding: 8px 8px 8px 20px;
      box-shadow: 0 4px 24px hsl(var(--foreground) / .06);
    }
    .float-header-logo {
      font-family: var(--font-display); font-size: 14px; font-weight: 600;
      color: hsl(var(--foreground)); letter-spacing: -.01em; white-space: nowrap;
      text-decoration: none;
    }
    .float-header-nav {
      display: flex; align-items: center; gap: 2px;
      margin-left: 16px; flex: 1;
    }
    .float-header-nav a {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 5px 10px; border-radius: 999px;
      white-space: nowrap; transition: color 150ms, background 150ms;
    }
    .float-header-nav a:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .float-header-cta {
      margin-left: 8px; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 999px;
      background: hsl(var(--accent)); color: hsl(var(--accent-foreground));
      font-size: 12px; font-weight: 600; text-decoration: none;
      transition: background 150ms;
    }
    .float-header-cta:hover { background: hsl(var(--accent) / .85); }
    @media (max-width: 640px) {
      .float-header-nav { display: none; }
      .float-header { padding: 8px 8px 8px 16px; }
    }

    /* ── Scrollytelling — reveal on scroll ────────────────── */
    .reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-stagger > * {
      opacity: 0; transform: translateY(20px);
      transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1);
    }
    .reveal-stagger.in > * { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
    .reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
    .reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }
    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform: none; }
    }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
    .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    .field { display: block; width: 100%; padding: 8px 12px; border: 1px solid hsl(var(--border)); border-radius: 8px; font: inherit; background: hsl(var(--card)); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; }
    .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <header class="float-header">
    <a class="float-header-logo" href="../index.html">Anti-AI</a>
    <nav class="float-header-nav">
      <a href="./index.html#filosofia">Filosofia</a>
      <a href="./index.html#tokens">Tokens</a>
      <a href="./index.html#categorias">Categorias</a>
      <a href="./index.html#templates">Templates</a>
      <a href="./index.html#como-usar">Como Usar</a>
    </nav>
    <a class="float-header-cta" href="../index.html">Ver exemplos →</a>
  </header>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/base/Input.jsx"></script>
  <script type="text/babel" src="../components/base/Checkbox.jsx"></script>
  <script type="text/babel" src="../components/forms/FormField.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Card.jsx"></script>
  <script type="text/babel" src="../components/display/Alert.jsx"></script>
  <script type="text/babel" src="../components/navigation/Tabs.jsx"></script>
  <script type="text/babel" src="../components/auth/LoginScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/RegisterScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ForgotPasswordScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ResetPasswordScreen.jsx"></script>
  <script type="text/babel" src="../components/auth/ConfirmEmailScreen.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"],["screens","Screens"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
      </section>
    );

    const App = () => {
      const [picked, setPicked] = React.useState("login");
      return (
        <>
          <Nav current="auth" />
          <h1>Auth</h1>
          <p className="lead">Telas full-bleed split-panel. Brand chega via prop.</p>

          <ShowcaseSection title="Picker">
            <Tabs
              value={picked} onChange={setPicked}
              items={[
                {value:"login",label:"Login"},
                {value:"register",label:"Register"},
                {value:"forgot",label:"Forgot password"},
                {value:"reset",label:"Reset password"},
                {value:"confirm",label:"Confirm email"},
              ]}
            />
          </ShowcaseSection>

          <ShowcaseSection title="Preview — full size">
            <div style={{ height: 560, border: "1px solid hsl(var(--border))", borderRadius: 12, overflow: "hidden" }}>
              {picked === "login"    && <LoginScreen onLogin={() => {}} onForgot={() => setPicked("forgot")} onGoRegister={() => setPicked("register")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" showGoogle />}
              {picked === "register" && <RegisterScreen onRegister={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />}
              {picked === "forgot"   && <ForgotPasswordScreen onSubmit={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />}
              {picked === "reset"    && <ResetPasswordScreen onSubmit={() => {}} onGoLogin={() => setPicked("login")} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} appName="App Name" tagline="Tagline" />}
              {picked === "confirm"  && <ConfirmEmailScreen status="success" email="user@example.com" onContinue={() => {}} brand={{ logo: "../../../assets/placeholder-logo.svg", name: "App" }} />}
            </div>
          </ShowcaseSection>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();
  </script>
</body>
</html>
