<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* ── Progress bar ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, hsl(var(--accent)), hsl(var(--primary)));
      z-index: 300; transition: width 80ms linear; pointer-events: none;
    }

    /* ── Nav header (unified Wave 4) ────────────────────── */
    @keyframes nav-pulse {
      0%, 100% { box-shadow: 0 0 0 0 hsl(var(--accent) / .5); }
      50%      { box-shadow: 0 0 0 6px hsl(var(--accent) / 0); }
    }
    .nav-header {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 6px 6px 18px;
      background: hsl(var(--card) / .72);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid hsl(var(--border) / .6);
      border-radius: 999px;
      box-shadow: 0 8px 32px -8px hsl(var(--foreground) / .12);
      max-width: calc(100vw - 24px);
    }
    .nav-brand {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -.01em;
      color: hsl(var(--foreground));
      padding-right: 14px;
      border-right: 1px solid hsl(var(--border) / .5);
      margin-right: 6px;
      flex-shrink: 0;
      text-decoration: none;
    }
    .nav-brand-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: hsl(var(--accent));
      margin-right: 6px;
      vertical-align: middle;
      animation: nav-pulse 1.6s ease-in-out infinite;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .nav-link {
      font-size: 12.5px;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 999px;
      transition: color 150ms, background 150ms;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: hsl(var(--foreground));
      background: hsl(var(--muted) / .6);
    }
    .nav-cta-mini {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      margin-left: 8px;
      transition: transform 150ms, box-shadow 150ms;
    }
    .nav-cta-mini:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px hsl(var(--accent) / .4);
    }
    @media (max-width: 760px) {
      .nav-links { display: none; }
      .nav-header { padding: 6px 6px 6px 14px; }
      .nav-brand { padding-right: 8px; margin-right: 0; border-right: none; font-size: 13px; }
    }

    /* ── Scrollytelling — reveal on scroll ────────────────── */
    .reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
      will-change: opacity, transform;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-stagger > * {
      opacity: 0; transform: translateY(20px);
      transition: opacity 600ms ease, transform 600ms cubic-bezier(.2,.8,.2,1);
    }
    .reveal-stagger.in > * { opacity: 1; transform: translateY(0); }
    .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
    .reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
    .reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
    .reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
    .reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
    .reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }
    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform: none; }
    }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 48px; padding-bottom: 8px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    .showcase-meta { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 6px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }

    /* ── Categories dropdown ──────────────────────────────────── */
    .fh-dropdown { position: relative; }
    .fh-dropdown-btn {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 5px 10px; border-radius: 999px;
      white-space: nowrap; transition: color 150ms, background 150ms;
      background: none; border: none; cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .fh-dropdown-btn:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .fh-dropdown-menu {
      display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: hsl(var(--card)); border: 1px solid hsl(var(--border) / .6);
      border-radius: 12px; padding: 6px;
      box-shadow: 0 8px 32px hsl(var(--foreground) / .10);
      min-width: 200px; z-index: 300;
      flex-direction: column; gap: 2px;
    }
    .fh-dropdown[data-open="true"] .fh-dropdown-menu { display: flex; }
    .fh-dropdown-btn .fh-arrow { display: inline-block; transition: transform 200ms ease; }
    .fh-dropdown[data-open="true"] .fh-dropdown-btn .fh-arrow { transform: rotate(180deg); }
    .fh-dropdown-menu a {
      font-size: 12.5px; color: hsl(var(--muted-foreground));
      text-decoration: none; padding: 6px 10px; border-radius: 8px;
      white-space: nowrap; transition: color 150ms, background 150ms;
    }
    .fh-dropdown-menu a:hover { color: hsl(var(--foreground)); background: hsl(var(--muted) / .5); }
    .fh-dropdown-menu a.fh-active { color: hsl(var(--accent)); background: hsl(var(--accent-decorative, var(--accent)) / .10); font-weight: 500; }
  
    /* Mobile overflow fix Wave 1.3 */
    @media (max-width: 480px) {
      .showcase-shell { padding: 80px 16px 60px; }
      table { display: block; max-width: 100%; overflow-x: auto; }
      .preview-frame, .showcase-block, .demo-frame { max-width: 100%; overflow-x: hidden; }
      pre, code { max-width: 100%; overflow-x: auto; word-wrap: break-word; }
      .showcase-section > * { min-width: 0; }
      .showcase-block > * { min-width: 0; }
      .nav-header { left: 8px; right: 8px; max-width: calc(100vw - 16px); }
      .nav-links { gap: 8px; flex-wrap: wrap; }
    }
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <nav class="nav-header" aria-label="Navegacao principal">
    <a class="nav-brand" href="../index.html"><span class="nav-brand-dot"></span>Anti-AI</a>
    <div class="nav-links">
      <a class="nav-link" href="./index.html#templates">Templates</a>
      <a class="nav-link" href="./index.html#filosofia">Filosofia</a>
      <a class="nav-link" href="./index.html#tokens">Tokens</a>
      <div class="fh-dropdown">
        <button class="fh-dropdown-btn">Categorias <span class="fh-arrow">&#9662;</span></button>
        <div class="fh-dropdown-menu">
        <a href="./index.html">Visao geral</a>
        <a href="./auth.html">Auth</a>
        <a href="./base.html">Base</a>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./data.html">Data</a>
        <a href="./display.html">Display</a>
        <a href="./forms.html">Forms</a>
        <a href="./layout.html" class="fh-active">Layout</a>
        <a href="./navigation.html">Navigation</a>
        <a href="./screens.html">Screens</a>
        <a href="./surfaces.html">Surfaces</a>
        </div>
      </div>
      <a class="nav-link" href="./index.html#como-usar">Como Usar</a>
    </div>
    <a class="nav-cta-mini" href="../index.html">Ver exemplos &#8594;</a>
  </nav>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Surface.jsx"></script>
  <script type="text/babel" src="../components/layout/PageHeader.jsx"></script>
  <script type="text/babel" src="../components/layout/Section.jsx"></script>
  <script type="text/babel" src="../components/layout/PageShell.jsx"></script>
  <script type="text/babel" src="../components/layout/AppLayout.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"],["screens","Screens"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const NAV_PAGES = {
      home:    { title: "Home",          subtitle: "Visão geral da operação" },
      cliente: { title: "Clientes",      subtitle: "Cadastro e histórico de clientes" },
      config:  { title: "Configurações", subtitle: "Ajustes do sistema" },
    };

    const App = () => {
      const [page, setPage] = React.useState("home");
      const pg = NAV_PAGES[page];
      return (
      <>
        <h1>Layout</h1>
        <p className="lead">Estruturas de página. PageHeader + PageShell pra screens; Section pra marketing.</p>

        <ShowcaseSection title="PageHeader — com e sem actions">
          <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: 16, background: "hsl(var(--background))", borderRadius: 8 }}>
            <PageHeader title="Romaneios" subtitle="Lista das últimas 72h" />
            <PageHeader
              title="Dashboard"
              subtitle="Visão geral"
              actions={<><Button variant="outline" size="sm" iconLeft={Icon.Calendar}>26/04 – 28/04</Button><Button size="sm" iconLeft={Icon.Plus}>Novo</Button></>}
            />
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="Section — marketing block">
          <div style={{ border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden" }}>
            <Section eyebrow="Recurso" title="Tudo num lugar só" subtitle="Operação, cadastros e administração no mesmo painel." tone="muted">
              <Button>Saber mais</Button>
            </Section>
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="PageShell · AppLayout — links clicáveis"
          meta="AppLayout = sidebar + main; PageShell = padding wrapper interno. Links mudam conteúdo via state.">
          <div style={{ height: 480, overflow: "hidden", border: "1px solid hsl(var(--border))", borderRadius: 8, display: "flex", background: "hsl(var(--background))" }}>
            {/* Mock sidebar */}
            <div style={{ width: 200, background: "hsl(var(--card))", borderRight: "1px solid hsl(var(--border))", padding: "16px 12px", display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "hsl(var(--foreground))", marginBottom: 8, paddingLeft: 8 }}>App</div>
              {[["home","Home"],["cliente","Clientes"],["config","Configurações"]].map(([key, label]) => (
                <button key={key} onClick={() => setPage(key)} style={{
                  fontSize: 13, padding: "6px 8px", borderRadius: 6, border: 0, cursor: "pointer", textAlign: "left",
                  background: page === key ? "hsl(var(--accent) / .12)" : "transparent",
                  color: page === key ? "hsl(var(--accent))" : "hsl(var(--muted-foreground))",
                  transition: "background 150ms, color 150ms",
                }}
                  onMouseEnter={e => { if (page !== key) e.currentTarget.style.background = "hsl(var(--muted))"; }}
                  onMouseLeave={e => { if (page !== key) e.currentTarget.style.background = "transparent"; }}
                >{label}</button>
              ))}
            </div>
            {/* Main via AppLayout+PageShell pattern */}
            <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <PageShell>
                <PageHeader
                  title={pg.title}
                  subtitle={pg.subtitle}
                  actions={<Button size="sm" iconLeft={Icon.Plus}>Novo</Button>}
                />
                <div style={{ padding: "4px 0", display: "flex", flexDirection: "column", gap: 8 }}>
                  {page === "home" && (
                    <>
                      <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                        <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", marginBottom: 6 }}>TOTAL HOJE</div>
                        <div style={{ fontSize: 24, fontWeight: 600 }}>48 volumes</div>
                      </Surface>
                      <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", padding: "8px 0" }}>Última atualização: agora.</div>
                    </>
                  )}
                  {page === "cliente" && (
                    <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Lista de Clientes</div>
                      {["TransLog Brasil","Expresso Mineiro","Rodovia Sul"].map(c => (
                        <div key={c} style={{ fontSize: 13, padding: "6px 0", borderBottom: "1px solid hsl(var(--border))", color: "hsl(var(--muted-foreground))" }}>{c}</div>
                      ))}
                    </Surface>
                  )}
                  {page === "config" && (
                    <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Configurações do Sistema</div>
                      <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))" }}>Ajuste tokens, roles e integrações aqui.</div>
                    </Surface>
                  )}
                </div>
              </PageShell>
            </main>
          </div>
        </ShowcaseSection>
      </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* Dropdown click-to-open */
    (function () {
      var dd = document.querySelector('.fh-dropdown');
      var btn = document.querySelector('.fh-dropdown-btn');
      var menu = document.querySelector('.fh-dropdown-menu');
      if (!dd || !btn || !menu) return;
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-haspopup', 'true');
      function openDD() { dd.setAttribute('data-open', 'true'); btn.setAttribute('aria-expanded', 'true'); }
      function closeDD() { dd.removeAttribute('data-open'); btn.setAttribute('aria-expanded', 'false'); }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        dd.hasAttribute('data-open') ? closeDD() : openDD();
      });
      document.addEventListener('click', function (e) {
        if (!dd.contains(e.target)) closeDD();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeDD(); btn.focus(); }
      });
      menu.addEventListener('keydown', function (e) {
        var items = Array.from(menu.querySelectorAll('a'));
        var idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); var next = items[(idx + 1) % items.length]; if (next) next.focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); var prev = items[(idx - 1 + items.length) % items.length]; if (prev) prev.focus(); }
        if (e.key === 'Escape')    { closeDD(); btn.focus(); }
        if (e.key === 'Tab' && !e.shiftKey && idx === items.length - 1) { closeDD(); }
      });
    })();
  </script>
</body>
</html>
