<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .showcase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
    .showcase-nav a { font-size: 13px; padding: 6px 10px; border-radius: 6px; text-decoration: none; color: hsl(var(--muted-foreground)); }
    .showcase-nav a.active { background: hsl(var(--accent-decorative) / .12); color: hsl(var(--accent)); font-weight: 500; }
    .showcase-section { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .showcase-section > h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin: 0; font-weight: 600; }
    .showcase-block { padding: 24px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    .showcase-meta { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 6px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 6px; }
    .lead { font-size: 15px; color: hsl(var(--muted-foreground)); margin: 0 0 24px; }
  </style>
</head>
<body class="preset-base">
  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Surface.jsx"></script>
  <script type="text/babel" src="../components/layout/PageHeader.jsx"></script>
  <script type="text/babel" src="../components/layout/Section.jsx"></script>
  <script type="text/babel" src="../components/layout/PageShell.jsx"></script>
  <script type="text/babel" src="../components/layout/AppLayout.jsx"></script>

  <script type="text/babel">
    const Nav = ({ current }) => (
      <nav className="showcase-nav">
        {[["index","Visão geral"],["base","Base"],["surfaces","Surfaces"],["display","Display"],["layout","Layout"],["forms","Forms"],["navigation","Navigation"],["data","Data"],["dashboard","Dashboard"],["auth","Auth"]].map(([k,l]) => <a key={k} href={`./${k}.html`} className={current === k ? "active" : ""}>{l}</a>)}
      </nav>
    );
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const App = () => (
      <>
        <Nav current="layout" />
        <h1>Layout</h1>
        <p className="lead">Estruturas de página. PageHeader + PageShell pra screens; Section pra marketing.</p>

        <ShowcaseSection title="PageHeader — com e sem actions">
          <div style={{ display: "flex", flexDirection: "column", gap: 16, padding: 16, background: "hsl(var(--background))", borderRadius: 8 }}>
            <PageHeader title="Romaneios" subtitle="Lista das últimas 72h" />
            <PageHeader
              title="Dashboard"
              subtitle="Visão geral"
              actions={<><Button variant="outline" size="sm" iconLeft={Icon.Calendar}>26/04 – 28/04</Button><Button size="sm" iconLeft={Icon.Plus}>Novo</Button></>}
            />
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="Section — marketing block">
          <div style={{ border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden" }}>
            <Section eyebrow="Recurso" title="Tudo num lugar só" subtitle="Operação, cadastros e administração no mesmo painel." tone="muted">
              <Button>Saber mais</Button>
            </Section>
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="PageShell · AppLayout"
          meta="AppLayout = sidebar + main; PageShell = padding wrapper interno.">
          <div style={{ fontSize: 13, color: "hsl(var(--muted-foreground))" }}>
            Composição canônica:<br/>
            <code style={{ fontSize: 12 }}>
              {`<AppLayout sidebar={<Sidebar … />}><PageShell><PageHeader … /><Card>…</Card></PageShell></AppLayout>`}
            </code>
          </div>
        </ShowcaseSection>
      </>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
