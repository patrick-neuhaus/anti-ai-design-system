<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout · Showcase</title>
  <link rel="stylesheet" href="../../../colors_and_type.css" />
  <link rel="stylesheet" href="../components/base/_aa-btn.css" />
  <link rel="stylesheet" href="../components/surfaces/_aa-card.css" />
  <link rel="stylesheet" href="./_nav.css" />
  <style>
    body { font-family: var(--font-body); background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; overflow-x: hidden; max-width: 100vw; }
    .showcase-shell { max-width: 1100px; margin: 0 auto; padding: 96px 24px 80px; }

    /* V5/V6: .progress-bar movido pra _nav.css (era duplicado em 12 HTMLs). */

    /* Wave 9.4 — CTA responsive */
    /* W2.3 / F-INT-011: nav-cta-mini @media block removido (duplicado de _nav.css). */
  </style>
</head>
<body class="preset-base">

  <div class="progress-bar" id="progressBar"></div>

  <div id="nav-root"></div>

  <div id="root" class="showcase-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/Icon.jsx"></script>
  <script type="text/babel" src="../components/base/Button.jsx"></script>
  <script type="text/babel" src="../components/surfaces/Surface.jsx"></script>
  <script type="text/babel" src="../components/layout/PageHeader.jsx"></script>
  <script type="text/babel" src="../components/layout/Section.jsx"></script>
  <script type="text/babel" src="../components/layout/PageShell.jsx"></script>
  <script type="text/babel" src="../components/layout/AppLayout.jsx"></script>
  <script type="text/babel" src="../components/layout/NavHeader.jsx"></script>

  <script type="text/babel">
    /* W2.1 / F-INT-004: const Nav legado removido. NavHeader e a fonte unica. */
    const ShowcaseSection = ({ title, children, meta }) => (
      <section className="showcase-section">
        <h3>{title}</h3>
        <div className="showcase-block">{children}</div>
        {meta && <div className="showcase-meta">{meta}</div>}
      </section>
    );

    const NAV_PAGES = {
      home:    { title: "Home",          subtitle: "Visão geral da operação" },
      cliente: { title: "Clientes",      subtitle: "Cadastro e histórico de clientes" },
      config:  { title: "Configurações", subtitle: "Ajustes do sistema" },
    };

    const App = () => {
      const [page, setPage] = React.useState("home");
      const pg = NAV_PAGES[page];
      return (
      <>
        <h1>Layout</h1>
        <p className="lead">Estruturas de página. PageHeader + PageShell pra screens; Section pra marketing.</p>

        <ShowcaseSection title="PageHeader — com e sem actions">
          {/* F-UX-003 fix: dois exemplos separados em cards independentes */}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ padding: 16, background: "hsl(var(--background))", borderRadius: 8, border: "1px solid hsl(var(--border))" }}>
              <PageHeader title="Romaneios" subtitle="Lista das últimas 72h" />
            </div>
            <div style={{ padding: 16, background: "hsl(var(--background))", borderRadius: 8, border: "1px solid hsl(var(--border))" }}>
              {/* F-UX-004 fix: actions com flexWrap pra evitar overflow do botão "+ Novo" */}
              <PageHeader
                title="Dashboard"
                subtitle="Visão geral"
                actions={<><Button variant="outline" size="sm" iconLeft={Icon.Calendar}>26/04 – 28/04</Button><Button size="sm" iconLeft={Icon.Plus}>Novo</Button></>}
              />
            </div>
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="Section — marketing block">
          <div style={{ border: "1px solid hsl(var(--border))", borderRadius: 8, overflow: "hidden" }}>
            <Section eyebrow="Recurso" title="Tudo num lugar só" subtitle="Operação, cadastros e administração no mesmo painel." tone="muted">
              <Button>Saber mais</Button>
            </Section>
          </div>
        </ShowcaseSection>

        <ShowcaseSection title="PageShell · AppLayout — links clicáveis"
          meta="AppLayout = sidebar + main; PageShell = padding wrapper interno. Links mudam conteúdo via state.">
          <div style={{ height: 480, overflow: "hidden", border: "1px solid hsl(var(--border))", borderRadius: 8, display: "flex", background: "hsl(var(--background))" }}>
            {/* Mock sidebar */}
            <div style={{ width: 200, background: "hsl(var(--card))", borderRight: "1px solid hsl(var(--border))", padding: "16px 12px", display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "hsl(var(--foreground))", marginBottom: 8, paddingLeft: 8 }}>App</div>
              {[["home","Home"],["cliente","Clientes"],["config","Configurações"]].map(([key, label]) => (
                <button key={key} onClick={() => setPage(key)} style={{
                  fontSize: 13, padding: "6px 8px", borderRadius: 6, border: 0, cursor: "pointer", textAlign: "left",
                  background: page === key ? "hsl(var(--accent) / .12)" : "transparent",
                  color: page === key ? "hsl(var(--accent))" : "hsl(var(--muted-foreground))",
                  transition: "background 150ms, color 150ms",
                }}
                  onMouseEnter={e => { if (page !== key) e.currentTarget.style.background = "hsl(var(--muted))"; }}
                  onMouseLeave={e => { if (page !== key) e.currentTarget.style.background = "transparent"; }}
                >{label}</button>
              ))}
            </div>
            {/* Main via AppLayout+PageShell pattern */}
            <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <PageShell>
                <PageHeader
                  title={pg.title}
                  subtitle={pg.subtitle}
                  actions={<Button size="sm" iconLeft={Icon.Plus}>Novo</Button>}
                />
                <div style={{ padding: "4px 0", display: "flex", flexDirection: "column", gap: 8 }}>
                  {page === "home" && (
                    <>
                      <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                        <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", marginBottom: 6 }}>TOTAL HOJE</div>
                        <div style={{ fontSize: 24, fontWeight: 600 }}>48 volumes</div>
                      </Surface>
                      <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))", padding: "8px 0" }}>Última atualização: agora.</div>
                    </>
                  )}
                  {page === "cliente" && (
                    <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Lista de Clientes</div>
                      {["TransLog Brasil","Expresso Mineiro","Rodovia Sul"].map(c => (
                        <div key={c} style={{ fontSize: 13, padding: "6px 0", borderBottom: "1px solid hsl(var(--border))", color: "hsl(var(--muted-foreground))" }}>{c}</div>
                      ))}
                    </Surface>
                  )}
                  {page === "config" && (
                    <Surface tone="card" padding={16} radius={8} style={{ border: "1px solid hsl(var(--border))" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Configurações do Sistema</div>
                      <div style={{ fontSize: 12, color: "hsl(var(--muted-foreground))" }}>Ajuste tokens, roles e integrações aqui.</div>
                    </Surface>
                  )}
                </div>
              </PageShell>
            </main>
          </div>
        </ShowcaseSection>
      </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    ReactDOM.createRoot(document.getElementById("nav-root")).render(<NavHeader currentCategory="layout" mode="category" />);
  </script>

  <script>
    /* Progress bar */
    (function () {
      var bar = document.getElementById("progressBar");
      function update() {
        var h = document.documentElement;
        var max = (h.scrollHeight - h.clientHeight) || 1;
        bar.style.width = ((h.scrollTop / max) * 100) + "%";
      }
      update();
      window.addEventListener("scroll", update, { passive: true });
    })();

    /* Reveal on scroll */
    (function () {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12, rootMargin: "-32px 0px" });
      document.querySelectorAll(".showcase-section").forEach(function (el) {
        el.classList.add("reveal");
        io.observe(el);
      });
    })();

    /* W2.2 / F-INT-004: Dropdown click-to-open removido. NavHeader.jsx ja inicializa em useEffect. */
  </script>
</body>
</html>
