<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anti-AI Design System · Templates</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="./components/base/_aa-btn.css" />
<style>
html,body{margin:0;padding:0;height:100%;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
*{box-sizing:border-box}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:inherit}
a{color:inherit;text-decoration:none}
#root{height:100%}

/* ===== LOGIN ===== */
.login-root{display:grid;grid-template-columns:1fr 1fr;min-height:100dvh}
@media(max-width:768px){.login-root{grid-template-columns:1fr}}
.login-brand{position:relative;background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;gap:32px;overflow:hidden;isolation:isolate}
@media(max-width:768px){.login-brand{display:none}}
.login-brand-logo{height:44px;width:auto;position:relative;z-index:2}
.login-brand-title{position:relative;z-index:2;font-family:var(--font-display);font-size:36px;font-weight:600;letter-spacing:-.02em;line-height:1.15;text-align:center;margin:0}
.login-brand-sub{position:relative;z-index:2;font-size:15px;opacity:.75;text-align:center;max-width:340px;line-height:1.6;margin:0}
.login-brand-badge{position:relative;z-index:2;display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;border:1px solid hsl(var(--sidebar-foreground)/.25);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;opacity:.85;background:hsl(var(--sidebar-foreground)/.04);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

/* Brand panel — animated background orbs (muda hue por template selecionado) */
.login-brand-orbs{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.55}
.login-brand-orbs::before,.login-brand-orbs::after{content:"";position:absolute;border-radius:50%;filter:blur(60px);transition:background 600ms,transform 800ms ease-out}
/* F-MO-002: cap ambient loops — 5 → 2 (orb-a + bf-1 only). orb-b static. */
.login-brand-orbs::before{width:380px;height:380px;background:hsl(var(--sidebar-indicator));top:-120px;left:-100px;animation:orb-float-a 16s ease-in-out infinite}
.login-brand-orbs::after{width:320px;height:320px;background:hsl(var(--accent));bottom:-80px;right:-80px;opacity:.7}
@keyframes orb-float-a{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}}
@keyframes orb-float-b{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-40px) scale(.95)}}
.login-brand-grid{position:absolute;inset:0;z-index:1;opacity:.06;pointer-events:none;background-image:linear-gradient(hsl(var(--sidebar-foreground)) 1px,transparent 1px),linear-gradient(90deg,hsl(var(--sidebar-foreground)) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%)}

/* Floating template glyphs */
.brand-floats{position:absolute;inset:0;z-index:1;pointer-events:none}
.brand-float{position:absolute;color:hsl(var(--sidebar-foreground)/.12);transition:color 400ms,transform 400ms}
.brand-float svg{width:100%;height:100%}
/* F-MO-002: only bf-1 animates; bf-2/3 static to cap simultaneous loops at 2 */
.brand-float.bf-1{top:18%;left:12%;width:46px;height:46px;animation:bf-drift 12s ease-in-out infinite}
.brand-float.bf-2{top:62%;right:14%;width:54px;height:54px;opacity:.7}
.brand-float.bf-3{bottom:20%;left:20%;width:38px;height:38px;opacity:.5}
@keyframes bf-drift{0%,100%{transform:translate(0,0) rotate(0)}33%{transform:translate(8px,-12px) rotate(8deg)}66%{transform:translate(-6px,8px) rotate(-6deg)}}
.login-form-side{display:flex;align-items:center;justify-content:center;padding:32px;background:hsl(var(--background))}
.login-box{width:100%;max-width:420px;display:flex;flex-direction:column;gap:24px}
.login-box h2{font-family:var(--font-display);font-size:26px;font-weight:600;margin:0 0 4px}
.login-box p{font-size:13px;color:hsl(var(--muted-foreground));margin:0}

/* Template cards */
.tpl-cards{display:flex;flex-direction:column;gap:8px}
.tpl-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid hsl(var(--border));cursor:pointer;transition:border-color 150ms,background 150ms}
.tpl-card:hover{border-color:hsl(var(--primary)/.5);background:hsl(var(--muted)/.4)}
.tpl-card.selected{border-color:hsl(var(--primary));background:hsl(var(--primary)/.06)}
.tpl-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tpl-card-info{flex:1;min-width:0}
.tpl-card-name{font-size:13px;font-weight:600}
.tpl-card-desc{font-size:11.5px;color:hsl(var(--muted-foreground));margin-top:2px}
.tpl-cred{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));margin-top:4px;padding:3px 7px;border-radius:5px;background:hsl(var(--muted));width:fit-content}
.tpl-radio{width:18px;height:18px;border-radius:50%;border:2px solid hsl(var(--border));flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color 150ms}
.tpl-card.selected .tpl-radio{border-color:hsl(var(--primary))}
.tpl-radio-dot{width:8px;height:8px;border-radius:50%;background:hsl(var(--primary));opacity:0;transition:opacity 150ms}
.tpl-card.selected .tpl-radio-dot{opacity:1}

/* Form fields */
.field-group{display:flex;flex-direction:column;gap:6px}
.field-group label{font-size:12.5px;font-weight:500;color:hsl(var(--foreground))}
.field-input{padding:10px 14px;border-radius:10px;border:1.5px solid hsl(var(--border));background:hsl(var(--card));outline:none;width:100%;color:hsl(var(--foreground));transition:border-color 150ms,box-shadow 150ms;font-size:13px}
.field-input:focus{border-color:hsl(var(--primary));box-shadow:0 0 0 3px hsl(var(--primary)/.1)}
.forgot-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:-2px}
.forgot-link{font-size:12px;color:hsl(var(--accent));font-weight:500;cursor:pointer}
.forgot-link:hover{opacity:.8}
/* W1.2: .btn-login removida — substituida por aa-btn aa-btn--primary aa-btn--md aa-btn--full (canonical, F-INT-001) */
.err-msg{font-size:12px;color:hsl(var(--destructive));text-align:center;padding:8px 12px;background:hsl(var(--destructive)/.08);border-radius:8px}

/* ===== APP SHELL ===== */
.app-shell{display:grid;grid-template-columns:272px 1fr;height:100dvh;overflow:hidden;transition:grid-template-columns 250ms}
.app-shell.collapsed{grid-template-columns:68px 1fr}

/* ===== SIDEBAR ===== */
/* overflow:visible no root pra toggle bolinha nao ser cortado, scroll interno fica no .sidebar-nav */
.sidebar{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));display:flex;flex-direction:column;padding:18px 14px 14px;gap:2px;position:relative;overflow:visible;min-width:0;height:100dvh}
.sidebar-nav{flex:1 1 auto;display:flex;flex-direction:column;gap:2px;overflow-y:auto;overflow-x:hidden;min-height:0;margin:0 -14px;padding:0 14px;scrollbar-width:thin;scrollbar-color:hsl(var(--sidebar-foreground)/.15) transparent}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:hsl(var(--sidebar-foreground)/.18);border-radius:4px}

/* Toggle bolinha — fica fora do clip da sidebar */
.sidebar-toggle{position:absolute;right:-14px;top:60px;width:28px;height:28px;border-radius:50%;background:hsl(var(--card));border:1.5px solid hsl(var(--border));display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;color:hsl(var(--foreground));transition:background 150ms,box-shadow 150ms,transform 150ms;box-shadow:0 2px 8px hsl(var(--foreground)/.18)}
.sidebar-toggle:hover{background:hsl(var(--muted));box-shadow:0 3px 12px hsl(var(--foreground)/.25);transform:scale(1.08)}

/* Brand logo + label diagonal sobre logo */
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;min-width:0;flex-shrink:0}
.sidebar-logo-wrap{position:relative;flex-shrink:0;display:inline-block}
.sidebar-logo-full{height:30px;width:auto;display:block}
.sidebar-logo-icon{width:30px;height:30px;border-radius:7px;display:block;object-fit:contain}
.sidebar-brand-text{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;white-space:nowrap;color:hsl(var(--sidebar-foreground)/.55);padding:3px 8px;border-radius:4px;background:hsl(var(--sidebar-indicator)/.18);border:1px solid hsl(var(--sidebar-indicator)/.3)}
/* Label diagonal aplicado sobre o logo (collapsed) */
.sidebar-logo-tag{position:absolute;top:-6px;right:-10px;font-family:var(--font-mono);font-size:7.5px;font-weight:700;letter-spacing:.12em;color:hsl(var(--sidebar-indicator));background:hsl(var(--sidebar-background));padding:2px 4px;border-radius:3px;transform:rotate(-12deg);transform-origin:center;border:1px solid hsl(var(--sidebar-indicator)/.5);box-shadow:0 2px 4px hsl(var(--foreground)/.15);pointer-events:none}

/* Nav items */
.nav-section-label{font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--sidebar-foreground)/.45);padding:12px 10px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13px;color:hsl(var(--sidebar-foreground)/.8);position:relative;cursor:pointer;white-space:nowrap;overflow:hidden;min-width:0;transition:background 120ms,color 120ms}
.nav-item:hover{background:hsl(var(--sidebar-accent)/.6);color:hsl(var(--sidebar-foreground))}
.nav-item.active{background:hsl(var(--sidebar-accent));color:hsl(var(--sidebar-foreground));font-weight:500}
/* W1.6 followup / F-INT-019: indicator agora dentro do nav-item (left:0) pra nao ser cortado por overflow-x:hidden da sidebar-nav quando colapsada */
.nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:hsl(var(--sidebar-indicator));border-radius:0 3px 3px 0}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.85}
.nav-item .nav-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:hsl(var(--sidebar-indicator));font-weight:600}
/* Sidebar collapse stagger — Wave 4 P3 F-MO-007
   Labels/badges fade-out + slide left before hiding.
   Each nav item staggers 40ms via nth-child delays.
   Reduced-motion: instant (transition overridden by global block). */
.nav-label,.nav-badge,.nav-section-label,.sidebar-brand-text{
  opacity:1;
  max-width:200px;
  transform:translateX(0);
  transition:opacity 180ms ease,max-width 220ms ease,transform 180ms ease,visibility 0s 0s;
  visibility:visible;
  white-space:nowrap;
  overflow:hidden;
}
.collapsed .nav-label,.collapsed .nav-badge,.collapsed .nav-section-label,.collapsed .sidebar-brand-text{
  opacity:0;
  max-width:0;
  transform:translateX(-8px);
  visibility:hidden;
  transition:opacity 160ms ease,max-width 200ms ease,transform 160ms ease,visibility 0s 200ms;
}
/* Stagger: each nav-item delays its children by 40ms increments */
.sidebar-nav > *:nth-child(1)  .nav-label, .sidebar-nav > *:nth-child(1)  .nav-badge { transition-delay: 0ms,   0ms,   0ms,   200ms; }
.sidebar-nav > *:nth-child(2)  .nav-label, .sidebar-nav > *:nth-child(2)  .nav-badge { transition-delay: 20ms,  20ms,  20ms,  220ms; }
.sidebar-nav > *:nth-child(3)  .nav-label, .sidebar-nav > *:nth-child(3)  .nav-badge { transition-delay: 40ms,  40ms,  40ms,  240ms; }
.sidebar-nav > *:nth-child(4)  .nav-label, .sidebar-nav > *:nth-child(4)  .nav-badge { transition-delay: 60ms,  60ms,  60ms,  260ms; }
.sidebar-nav > *:nth-child(5)  .nav-label, .sidebar-nav > *:nth-child(5)  .nav-badge { transition-delay: 80ms,  80ms,  80ms,  280ms; }
.sidebar-nav > *:nth-child(6)  .nav-label, .sidebar-nav > *:nth-child(6)  .nav-badge { transition-delay: 100ms, 100ms, 100ms, 300ms; }
.sidebar-nav > *:nth-child(7)  .nav-label, .sidebar-nav > *:nth-child(7)  .nav-badge { transition-delay: 120ms, 120ms, 120ms, 320ms; }
.sidebar-nav > *:nth-child(8)  .nav-label, .sidebar-nav > *:nth-child(8)  .nav-badge { transition-delay: 140ms, 140ms, 140ms, 340ms; }
.sidebar-nav > *:nth-child(9)  .nav-label, .sidebar-nav > *:nth-child(9)  .nav-badge { transition-delay: 160ms, 160ms, 160ms, 360ms; }
.sidebar-nav > *:nth-child(10) .nav-label, .sidebar-nav > *:nth-child(10) .nav-badge { transition-delay: 180ms, 180ms, 180ms, 380ms; }
.collapsed .nav-item{justify-content:center;padding:9px}
.collapsed .sidebar-brand{padding:6px 8px 16px;justify-content:center}
.collapsed .sidebar-logo-tag{font-size:7px;top:-4px;right:-6px}

/* User panel — flex-shrink:0 pra nao ser comprimido + cursor pointer no clickable area */
.user-panel{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 12px;margin-top:8px;border-radius:16px;background:hsl(var(--sidebar-accent));border:1px solid hsl(var(--sidebar-border));min-width:0}
.user-panel-clickable{flex:1;display:flex;align-items:center;gap:10px;min-width:0;cursor:pointer;padding:0;background:none;border:none;color:inherit;text-align:left}
.user-panel-clickable:hover .user-name{color:hsl(var(--sidebar-foreground))}
.avatar{width:34px;height:34px;border-radius:50%;background:hsl(var(--accent)/.3);color:hsl(var(--sidebar-foreground));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:12px;border:1px solid hsl(var(--accent)/.5);flex-shrink:0}
.user-info{flex:1;min-width:0;overflow:hidden}
.user-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-actions{display:flex;gap:2px;flex-shrink:0}
.user-action-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:hsl(var(--sidebar-foreground)/.7);transition:background 120ms,color 120ms;cursor:pointer}
.user-action-btn:hover{background:hsl(var(--sidebar-background)/.4);color:hsl(var(--sidebar-foreground))}
.user-info,.user-actions{opacity:1;max-width:200px;transform:translateX(0);transition:opacity 180ms ease,max-width 220ms ease,transform 180ms ease,visibility 0s 0s;visibility:visible;overflow:hidden}
.collapsed .user-info,.collapsed .user-actions{opacity:0;max-width:0;transform:translateX(-8px);visibility:hidden;transition:opacity 160ms ease,max-width 200ms ease,transform 160ms ease,visibility 0s 200ms}
.collapsed .user-panel{justify-content:center;padding:10px}
/* W1.6 followup / F-INT-019: avatar centralizado no estado colapsado (clickable era flex-start por padrao) */
.collapsed .user-panel-clickable{justify-content:center;flex:0 0 auto}

/* ===== MAIN ===== */
.main-area{display:flex;flex-direction:column;min-width:0;background:hsl(var(--background));overflow:auto}
.page-content{padding:28px 32px 40px;display:flex;flex-direction:column;gap:18px;width:100%}

/* ===== COMPONENTS reused inline ===== */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:4px}
.page-header-stack{display:flex;flex-direction:column;gap:4px}
.page-crumb{font-family:var(--font-mono);font-size:11px;color:hsl(var(--muted-foreground));text-transform:lowercase;letter-spacing:.06em}
.page-title{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;margin:0;line-height:1.15}
.page-sub{font-size:12.5px;color:hsl(var(--muted-foreground));margin:4px 0 0;max-width:580px;line-height:1.5}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:20px 22px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
.card-header{margin-bottom:14px}
.card-header h3{font-size:14px;font-weight:600;color:hsl(var(--foreground));margin:0}
.card-header p{font-size:12px;color:hsl(var(--muted-foreground));margin:3px 0 0}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
.kpi-label{font-size:11.5px;color:hsl(var(--muted-foreground));font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi-delta{font-family:var(--font-mono);font-size:11px;display:inline-flex;align-items:center;gap:3px}
.kpi-delta.up{color:hsl(var(--success))}
.kpi-delta.dn{color:hsl(var(--destructive))}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:hsl(var(--muted-foreground));padding:10px 16px;text-align:left;border-bottom:1px solid hsl(var(--border))}
.tbl td{padding:11px 16px;border-bottom:1px solid hsl(var(--border)/.6);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:hsl(var(--muted)/.4)}
.mono{font-family:var(--font-mono);font-size:11.5px}
.muted{color:hsl(var(--muted-foreground))}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:500}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill.ok{background:hsl(var(--success)/.12);color:hsl(var(--success))}
.pill.warn{background:hsl(var(--warning)/.18);color:hsl(35 85% 30%)}
.pill.err{background:hsl(var(--destructive)/.1);color:hsl(0 70% 40%)}
.pill.neutral{background:hsl(var(--muted));color:hsl(var(--muted-foreground))}
.pill.info{background:hsl(var(--info)/.12);color:hsl(var(--info))}

/* W1.2: .btn / .btn-primary / .btn-outline / .btn-sm / .btn-ghost / .btn-destructive removidas — substituidas por aa-btn (canonical, F-INT-001).
   App demo agora consome a mesma camada do showcase (F-INT-003). */

/* Settings color editor */
.token-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid hsl(var(--border));background:hsl(var(--card))}
.color-swatch{width:40px;height:40px;border-radius:8px;border:1px solid hsl(var(--border));cursor:pointer;overflow:hidden;position:relative;flex-shrink:0}
.color-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100%+8px);height:calc(100%+8px)}
.section-label-mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:hsl(var(--muted-foreground));margin:0 0 10px}

/* Profile */
.profile-avatar-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.profile-avatar{width:88px;height:88px;border-radius:50%;background:hsl(var(--primary)/.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:28px;font-weight:700;color:hsl(var(--primary));overflow:hidden;border:2px solid hsl(var(--border))}
.avatar-img{width:100%;height:100%;object-fit:cover}
.avatar-edit-btn{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:hsl(var(--card));border:1.5px solid hsl(var(--border));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px hsl(var(--foreground)/.1);color:hsl(var(--foreground));transition:background 150ms}
.avatar-edit-btn:hover{background:hsl(var(--muted))}
.avatar-upload-input{display:none}

/* Tabs */
.tabs-nav{display:flex;gap:2px;border-bottom:1px solid hsl(var(--border));margin-bottom:20px}
.tab-item{padding:10px 16px;font-size:13px;color:hsl(var(--muted-foreground));border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color 150ms}
.tab-item.active{color:hsl(var(--foreground));border-bottom-color:hsl(var(--ring));font-weight:500}
.tab-item:hover:not(.active){color:hsl(var(--foreground))}

/* Danger zone */
.danger-zone{border-top:1px solid hsl(var(--destructive)/.3);padding-top:20px;margin-top:4px}
/* D2: @keyframes btn-spin removido — login spinner agora usa aa-btn-spin de _aa-btn.css. */
</style>
</head>
<body class="preset-base">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Reduced motion hook (F-RP-012 / WCAG 2.2.2) ─────────────────
const useReducedMotion = () => {
  const [reduced, setReduced] = useState(
    () => window.matchMedia("(prefers-reduced-motion: reduce)").matches
  );
  useEffect(() => {
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    const handler = (e) => setReduced(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return reduced;
};

// ─── Color utils ─────────────────────────────────────────────────
const hexToRgb = (hex) => {
  const h = hex.replace("#", "");
  const n = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  return [parseInt(n.slice(0,2),16), parseInt(n.slice(2,4),16), parseInt(n.slice(4,6),16)];
};
const rgbToHex = (r,g,b) => "#"+[r,g,b].map((v)=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0")).join("");
const rgbToHsl = (r,g,b) => {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0, s=0; const l=(max+min)/2;
  if(max!==min){ const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; case b: h=(r-g)/d+4; break; }
    h*=60; }
  return [Math.round(h),Math.round(s*100),Math.round(l*100)];
};
const hslToRgb = (h,s,l) => {
  s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs(((h/60)%2)-1)), m=l-c/2;
  let [r,g,b]=[0,0,0];
  if(h<60)[r,g,b]=[c,x,0]; else if(h<120)[r,g,b]=[x,c,0]; else if(h<180)[r,g,b]=[0,c,x];
  else if(h<240)[r,g,b]=[0,x,c]; else if(h<300)[r,g,b]=[x,0,c]; else [r,g,b]=[c,0,x];
  return [(r+m)*255,(g+m)*255,(b+m)*255];
};
const hexToHslStr = (hex) => { const [r,g,b]=hexToRgb(hex); const [h,s,l]=rgbToHsl(r,g,b); return `${h} ${s}% ${l}%`; };
const hslStrToHex = (str) => {
  const m=String(str).trim().match(/^(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)%\s+(\d+(?:\.\d+)?)%/);
  if(!m) return "#000000";
  const [r,g,b]=hslToRgb(parseFloat(m[1]),parseFloat(m[2]),parseFloat(m[3]));
  return rgbToHex(r,g,b);
};
const relLum = (r,g,b) => [r,g,b].map(v=>{ v/=255; return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4); }).reduce((s,v,i)=>s+[0.2126,0.7152,0.0722][i]*v, 0);
const contrast = (h1,h2) => { const l1=relLum(...hexToRgb(h1)), l2=relLum(...hexToRgb(h2)); return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05); };
const getCssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

function Breadcrumb({ items }) {

        </React.Fragment>
      ))}

function Pagination({ page, total, perPage, onChange }) {
  const totalPages = Math.ceil(total / perPage);
  return (
    <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-end", marginTop:4 }}>
      <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => onChange(page-1)} disabled={page <= 1}
        style={{ padding:"5px 10px" }}>←</button>
      {Array.from({ length: Math.min(totalPages, 5) }, (_, i) => {
        const p = i + 1;
        return (
          <button key={p} className="aa-btn aa-btn--sm" onClick={() => onChange(p)}
            style={{ padding:"5px 10px", background: page===p ? "hsl(var(--primary))" : "hsl(var(--card))", color: page===p ? "hsl(var(--primary-foreground))" : "hsl(var(--foreground))", border:"1px solid hsl(var(--border))", borderRadius:8 }}>
            {p}
          </button>
        );
      })}
      <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => onChange(page+1)} disabled={page >= totalPages}
        style={{ padding:"5px 10px" }}>→</button>
      <span style={{ fontSize:11, color:"hsl(var(--muted-foreground))", marginLeft:6, fontFamily:"var(--font-mono)" }}>
        {(page-1)*perPage+1}–{Math.min(page*perPage,total)} de {total}
      </span>
    </div>
  );
}

    const matchStatus = !statusFilter || r.status === statusFilter;
    const matchTrans = !transFilter || r.trans === transFilter;
    return matchSearch && matchStatus && matchTrans;
  });

  const pageRows = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const allPageSelected = pageRows.length > 0 && pageRows.every(r => selected.has(r.id));

  const toggleAll = () => {
    const next = new Set(selected);
    if (allPageSelected) pageRows.forEach(r => next.delete(r.id));
    else pageRows.forEach(r => next.add(r.id));
    setSelected(next);
  };

  const toggleRow = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };

  const handleFilterChange = () => { setPage(1); };

  const simulateReload = () => {
    setLoadingRows(true);
    setTimeout(() => setLoadingRows(false), 1200);
  };

  return (
    <div className="page-content">
      <Breadcrumb items={["Ops", "Operação", "Romaneios"]} />

            onChange={e => { setSearch(e.target.value); handleFilterChange(); }}

          <SelectField value={statusFilter} onChange={v => { setStatusFilter(v); handleFilterChange(); }}
            placeholder="Todos os status"
            options={[{value:"ok",label:"Conferido"},{value:"warn",label:"Pendente"},{value:"err",label:"Divergente"},{value:"info",label:"Em conferência"}]} />
          <SelectField value={transFilter} onChange={v => { setTransFilter(v); handleFilterChange(); }}
            placeholder="Todas transportadoras"
            options={transportadoras.map(t => ({ value:t, label:t }))} />
          {(search||statusFilter||transFilter) && (
            <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => { setSearch(""); setStatusFilter(""); setTransFilter(""); setPage(1); }}>
              Limpar filtros
            </button>
          )}
        </div>
      </div>

      {/* Alert: loading skeleton */}
      {loadingRows ? (
        <div className="card" style={{ padding:"20px 18px", display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
            <Skeleton width={120} height={12} />

        </div>
      ) : (
        <div className="card" style={{ padding:0 }}>
          <table className="tbl">
            <thead>
              <tr>
                <th style={{ width:40, padding:"10px 16px" }}>
                  <Checkbox checked={allPageSelected} onChange={toggleAll} />
                </th>
                <th>ID</th><th>Data</th><th>Transportadora</th><th>Itens</th><th>Valor</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {pageRows.map(r => (
                <tr key={r.id} style={{ background: selected.has(r.id) ? "hsl(var(--primary)/.04)" : undefined }}>
                  <td style={{ padding:"11px 16px" }}><Checkbox checked={selected.has(r.id)} onChange={() => toggleRow(r.id)} /></td>
                  <td className="mono">{r.id}</td>

            </tbody>
          </table>
          <div style={{ padding:"12px 18px" }}>
            <Pagination page={page} total={filtered.length} perPage={PER_PAGE} onChange={setPage} />

        </div>

      {/* Drawer detalhe */}
      <Drawer open={!!drawer} onClose={() => setDrawer(null)} title={`Romaneio ${drawer?.id}`}>
        {drawer && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <span className={`pill ${drawer.status}`}><span className="dot"/>{drawer.label}</span>
            </div>
            <div className="card" style={{ padding:"14px 16px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[["Transportadora", drawer.trans], ["Data", drawer.date], ["Itens", drawer.itens], ["Valor total", drawer.valor]].map(([l,v]) => (
                  <div key={l}><div style={{ fontSize:11, color:"hsl(var(--muted-foreground))", marginBottom:2 }}>{l}</div><div style={{ fontSize:13, fontWeight:500 }}>{v}</div></div>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:600, marginBottom:8 }}>Progresso de conferência</div>
              <ProgressBar value={drawer.status==="ok"?100:drawer.status==="info"?60:drawer.status==="warn"?20:0} />
              <div style={{ fontSize:11, color:"hsl(var(--muted-foreground))", marginTop:4 }}>
                {drawer.status==="ok"?"Conferência completa":drawer.status==="info"?"Em andamento":drawer.status==="warn"?"Aguardando início":"Divergência detectada"}
              </div>
            </div>
            <TextareaField label="Observações" placeholder="Adicione uma observação…" value="" onChange={() => {}} />
            <div style={{ display:"flex", gap:8 }}>
              <button className="aa-btn aa-btn--primary aa-btn--sm" style={{ flex:1 }} onClick={() => setDrawer(null)}>Salvar observações</button>
              <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => setDrawer(null)}>Fechar</button>
            </div>
          </div>
        )}
      </Drawer>

      {/* Dialog confirmação exclusão */}
      <Dialog open={confirmDialog} onClose={() => setConfirmDialog(false)} title="Confirmar exclusão">
        <p style={{ fontSize:14, color:"hsl(var(--muted-foreground))", marginBottom:20, lineHeight:1.6 }}>
          Você está prestes a excluir <strong style={{ color:"hsl(var(--foreground))" }}>{selected.size} romaneios</strong>. Esta ação é irreversível.
        </p>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => setConfirmDialog(false)}>Cancelar</button>
          <button className="aa-btn aa-btn--destructive aa-btn--sm" onClick={() => { setSelected(new Set()); setConfirmDialog(false); }}>
            <I.Trash2 size={13}/> Confirmar exclusão
          </button>
        </div>
      </Dialog>
    </div>
  );
}

                <Checkbox key={cat} checked={selectedCats.has(cat)} onChange={() => toggleCat(cat)} label={`${cat} (${ARTICLES_ALL.filter(a=>a.cat===cat).length})`} />
              ))}
            </div>
          </div>
          <div className="card" style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Status</div>
            <RadioGroup name="statusFilter" value={statusFilter||"all"} onChange={v => { setStatusFilter(v==="all"?"":v); setPage(1); }}
              options={[{value:"all",label:"Todos"},{value:"ok",label:"Publicado"},{value:"info",label:"Em revisão"},{value:"warn",label:"Rascunho"}]} />
          </div>
          <div className="card" style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Ordenar por</div>
            <RadioGroup name="sortBy" value={sortBy} onChange={v => { setSortBy(v); setPage(1); }}
              options={[{value:"views",label:"Mais lidos"},{value:"titulo",label:"Alfabético"}]} />
          </div>
        </div>

        {/* Main content */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {/* Search */}
          <div className="card" style={{ padding:"12px 14px" }}>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <I.Article size={16} style={{ color:"hsl(var(--muted-foreground))", flexShrink:0 }} />
              <input className="field-input" placeholder="Buscar artigos, tags…" value={search}
                onChange={e => simulateSearch(e.target.value)}
                style={{ flex:1, padding:"6px 10px", border:"none", background:"transparent", outline:"none", fontSize:13, color:"hsl(var(--foreground))" }} />
              {search && <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => simulateSearch("")} style={{ padding:"4px 8px" }}>×</button>}
            </div>
          </div>

          {/* Stats */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 4px" }}>
            <span style={{ fontSize:12, color:"hsl(var(--muted-foreground))" }}>
              {filtered.length} {filtered.length === 1 ? "artigo" : "artigos"} encontrados
            </span>
            {(selectedCats.size > 0 || statusFilter || search) && (
              <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => { setSelectedCats(new Set()); setStatusFilter(""); setSearch(""); setPage(1); }}>
                Limpar filtros
              </button>
            )}
          </div>

          {/* Results */}
          {loading ? (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {[1,2,3].map(i => (
                <div key={i} className="card" style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:8 }}>
                  <Skeleton width="60%" height={14} />
                  <Skeleton width="40%" height={11} />
                  <div style={{ display:"flex", gap:8 }}>
                    <Skeleton width={60} height={20} rounded />
                    <Skeleton width={80} height={20} rounded />
                  </div>
                </div>
              ))}
            </div>
          ) : filtered.length === 0 ? (
            <div className="card">
              <EmptyState icon="🔍" title="Nenhum artigo encontrado"
                desc="Tente outros termos de busca ou remova filtros ativos."
                action="Limpar todos os filtros" onAction={() => { setSelectedCats(new Set()); setStatusFilter(""); setSearch(""); }} />
            </div>
          ) : (
            <>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {pageRows.map(a => (
                  <div key={a.id} className="card" style={{ padding:"16px 18px", cursor:"pointer", transition:"box-shadow 150ms, transform 150ms" }}
                    onMouseEnter={e => { e.currentTarget.style.boxShadow="0 4px 16px hsl(var(--foreground)/.08)"; e.currentTarget.style.transform="translateY(-1px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.boxShadow=""; e.currentTarget.style.transform=""; }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>{a.titulo}</div>
                        <div style={{ fontSize:12, color:"hsl(var(--muted-foreground))", marginBottom:8 }}>
                          por {a.autor} · {a.views.toLocaleString("pt-BR")} visualizações
                        </div>
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                          <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, background:"hsl(var(--muted))", fontWeight:500 }}>{a.cat}</span>
                          {a.tags.map(tag => (
                            <span key={tag} style={{ fontSize:10, padding:"2px 7px", borderRadius:999, border:"1px solid hsl(var(--border))", color:"hsl(var(--muted-foreground))" }}>#{tag}</span>
                          ))}
                        </div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                        <span className={`pill ${a.status}`} style={{ whiteSpace:"nowrap" }}><span className="dot"/>{a.label}</span>
                        <span style={{ fontSize:10, fontFamily:"var(--font-mono)", color:"hsl(var(--muted-foreground))" }}>{a.id}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <Pagination page={page} total={filtered.length} perPage={PER_PAGE} onChange={setPage} />
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── SettingsScreen (+1 to +7) ────────────────────────────────────
const STORAGE_KEY = "ds-tokens-override-v2";

function SettingsScreen() {
  const [defaults, setDefaults] = useState({});
  const [overrides, setOverrides] = useState({});
  const [history, setHistory] = useState([{}]);
  const [histIdx, setHistIdx] = useState(0);
  const [namedThemes, setNamedThemes] = useState({});
  const [themeName, setThemeName] = useState("");
  const [darkDerived, setDarkDerived] = useState(false);
  const [workspaceWide, setWorkspaceWide] = useState(true);
  const [tab, setTab] = useState("editor");
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const root = getComputedStyle(document.documentElement);
    const defs = {};
    TOKEN_SECTIONS.forEach(s => s.tokens.forEach(t => {
      const v = root.getPropertyValue(t.id).trim();
      if (v) defs[t.id] = v;
    }));
    setDefaults(defs);
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
      setOverrides(saved);
      Object.entries(saved).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
    } catch {}
    try { setNamedThemes(JSON.parse(localStorage.getItem(STORAGE_KEY+"-named")||"{}")); } catch {}
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  const valueOf = (id) => overrides[id] ?? defaults[id] ?? "";
  const isOverridden = (id) => id in overrides;

  const pushHistory = (next) => {
    const newHist = history.slice(0, histIdx+1).concat([next]);
    setHistory(newHist.slice(-11));
    setHistIdx(Math.min(newHist.length-1, 10));
  };

  const applyOverrides = (next) => {
    setOverrides(next);
    Object.entries(next).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
    Object.keys(defaults).filter(k=>!(k in next)).forEach(k => document.documentElement.style.removeProperty(k));
  };

  const handleChange = (id, hex) => {
    const hsl = hexToHslStr(hex);
    const next = { ...overrides, [id]: hsl };
    pushHistory(next);
    applyOverrides(next);
  };

  const handleReset = (id) => {
    const next = { ...overrides };
    delete next[id];
    pushHistory(next);
    applyOverrides(next);
  };

  const handleResetAll = () => {
    pushHistory({});
    applyOverrides({});
  };

  const handleSave = () => {
    const ratio = getMinContrast();
    if (ratio < 3) { showToast("❌ Contraste abaixo de 3:1 — salvar bloqueado."); return; }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
    showToast("✅ Tema salvo!");
  };

  const handleApplyPreset = (name) => {
    const preset = COLOR_PRESETS[name];
    pushHistory(preset);
    applyOverrides(preset);
    showToast(`✅ Preset "${name}" aplicado`);
  };

  const handleExportJson = () => {
    const blob = new Blob([JSON.stringify(overrides, null, 2)], { type:"application/json" });
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="theme.json"; a.click();
  };

  const handleImportJson = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        pushHistory(data); applyOverrides(data); showToast("✅ Tema importado!");
      } catch { showToast("❌ JSON inválido"); }
    };
    r.readAsText(f);
  };

  const handleShareUrl = () => {
    const b64 = btoa(JSON.stringify(overrides));
    const url = new URL(window.location.href);
    url.searchParams.set("theme", b64);
    navigator.clipboard?.writeText(url.toString());
    showToast("📋 Link copiado!");
  };

  const handleUndo = () => {
    if (histIdx <= 0) return;
    const ni = histIdx - 1;
    setHistIdx(ni);
    applyOverrides(history[ni]);
  };

  const handleRedo = () => {
    if (histIdx >= history.length-1) return;
    const ni = histIdx + 1;
    setHistIdx(ni);
    applyOverrides(history[ni]);
  };

  const handleSaveNamed = () => {
    if (!themeName.trim()) return;
    const next = { ...namedThemes, [themeName]: overrides };
    setNamedThemes(next);
    localStorage.setItem(STORAGE_KEY+"-named", JSON.stringify(next));
    setThemeName("");
    showToast(`✅ Tema "${themeName}" salvo`);
  };

  const handleLoadNamed = (name) => {
    const t = namedThemes[name];
    if (!t) return;
    pushHistory(t); applyOverrides(t); showToast(`✅ Tema "${name}" carregado`);
  };

  const handleDarkDerive = (on) => {
    setDarkDerived(on);
    if (on) {
      // Invert lightness of background/foreground/card tokens
      const next = { ...overrides };
      ["--background","--card","--foreground","--muted"].forEach(id => {
        const val = valueOf(id);
        const m = val.match(/^(\d+)\s+(\d+)%\s+(\d+)%/);
        if (m) {
          const l = parseInt(m[3]);
          next[id] = `${m[1]} ${m[2]}% ${100-l}%`;
        }
      });
      pushHistory(next); applyOverrides(next);
      showToast("🌙 Dark mode derivado aplicado");
    } else {
      handleResetAll();
      showToast("☀️ Light mode restaurado");
    }
  };

  const getMinContrast = () => {
    const bgHex = hslStrToHex(valueOf("--background"));
    const fgHex = hslStrToHex(valueOf("--foreground"));
    return contrast(bgHex, fgHex);
  };

  const minContrast = getMinContrast();
  const contrastOk = minContrast >= 4.5;
  const contrastWarn = minContrast >= 3 && minContrast < 4.5;

  const importRef = useRef(null);

  return (
    <div className="page-content" style={{ position:"relative" }}>
      <div className="page-header">
        <div className="page-header-stack">
          <span className="page-crumb">conta · configurações</span>
          <h2 className="page-title">Design System</h2>
          <p className="page-sub">Editor de tokens de cor + histórico + presets + export/import</p>
        </div>
        <div className="page-actions">
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleUndo} disabled={histIdx<=0} title="Desfazer">
            <I.Undo size={13}/> Undo
          </button>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleRedo} disabled={histIdx>=history.length-1} title="Refazer">
            <I.Redo size={13}/> Redo
          </button>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleResetAll}><I.RotateCcw size={13}/> Restaurar</button>
          <button className="aa-btn aa-btn--primary aa-btn--sm" onClick={handleSave}
            style={{ opacity: minContrast<3?0.5:1 }}><I.Save size={13}/> Salvar</button>
        </div>
      </div>

      {/* WCAG banner */}
      {!contrastOk && (
        <div style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderRadius:10,
          background: contrastWarn?"hsl(var(--warning)/.12)":"hsl(var(--destructive)/.1)",
          color: contrastWarn?"hsl(35 85% 30%)":"hsl(0 70% 40%)",fontSize:13 }}>
          <I.Info size={16}/>
          {contrastWarn
            ? `Contraste text/bg: ${minContrast.toFixed(1)}:1 — abaixo de WCAG AA (4.5:1). Corrija antes de salvar.`
            : `Contraste text/bg: ${minContrast.toFixed(1)}:1 — CRÍTICO (< 3:1). Salvar bloqueado.`}
        </div>
      )}

      {/* Tabs */}
      <div className="tabs-nav">
        {[["editor","Editor"],["presets","Presets"],["export","Export/Import"],["history","Histórico"],["named","Temas Salvos"],["options","Opções"]].map(([k,l])=>(
          <div key={k} className={`tab-item${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      {/* Editor tab */}
      {tab==="editor" && TOKEN_SECTIONS.map(sec => (
        <div key={sec.title} className="card">
          <div className="card-header"><h3>{sec.title}</h3></div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:10 }}>
            {sec.tokens.map(t => {
              const val = valueOf(t.id);
              const hex = val ? hslStrToHex(val) : "#000000";
              const bgHex = t.contrastWith ? hslStrToHex(valueOf(t.contrastWith)||"0 0% 100%") : null;
              const ratio = bgHex ? contrast(hex, bgHex) : null;
              const ratioOk = ratio !== null ? ratio >= 4.5 : null;
              return (
                <div key={t.id} className="token-row">
                  <label className="color-swatch" style={{ background:`hsl(${val})` }}>
                    <input type="color" value={hex} onChange={e=>handleChange(t.id,e.target.value)} />
                  </label>
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                      <span style={{ fontSize:13,fontWeight:500 }}>{t.label}</span>
                      {isOverridden(t.id) && <span style={{ fontSize:9,fontWeight:600,padding:"1px 5px",borderRadius:4,background:"hsl(var(--accent)/.15)",color:"hsl(var(--accent))",textTransform:"uppercase" }}>CUSTOM</span>}
                      {ratio !== null && (
                        <span style={{ fontSize:10,fontWeight:700,color:ratioOk?"hsl(var(--success))":"hsl(var(--destructive))" }}
                          title={`Contraste: ${ratio.toFixed(2)}:1`}>
                          {ratioOk?`AA ✓ ${ratio.toFixed(1)}:1`:`AA ✗ ${ratio.toFixed(1)}:1`}
                        </span>
                      )}
                    </div>
                    <div style={{ fontFamily:"var(--font-mono)",fontSize:10,color:"hsl(var(--muted-foreground))",marginTop:2 }}>{hex} · {t.id}</div>
                  </div>
                  {isOverridden(t.id) && (
                    <button onClick={()=>handleReset(t.id)} style={{ width:26,height:26,border:0,borderRadius:6,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"hsl(var(--muted-foreground))" }}
                      onMouseEnter={e=>e.currentTarget.style.background="hsl(var(--muted))"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <I.RotateCcw size={13}/>
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Presets tab */}
      {tab==="presets" && (
        <div className="card">
          <div className="card-header"><h3>Presets prontos</h3><p>Aplicar preset substitui todos os tokens</p></div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12 }}>
            {Object.keys(COLOR_PRESETS).map(name => {
              const p = COLOR_PRESETS[name];
              return (
                <div key={name} onClick={()=>handleApplyPreset(name)} style={{
                  cursor:"pointer",padding:"16px",borderRadius:14,border:"1.5px solid hsl(var(--border))",
                  background:"hsl(var(--card))",transition:"border-color 150ms,box-shadow 150ms",
                }} onMouseEnter={e=>{e.currentTarget.style.borderColor="hsl(var(--primary)/.5)";e.currentTarget.style.boxShadow="0 4px 12px hsl(var(--foreground)/.06)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="hsl(var(--border))";e.currentTarget.style.boxShadow="none"}}>
                  <div style={{ display:"flex",gap:6,marginBottom:10 }}>
                    {["--primary","--accent","--background","--sidebar-background"].map(tk=>(
                      <div key={tk} style={{ width:24,height:24,borderRadius:6,background:`hsl(${p[tk]})`,border:"1px solid hsl(0 0% 0% / .1)` `" }} />
                    ))}
                  </div>
                  <div style={{ fontSize:13,fontWeight:600 }}>{name}</div>
                  <div style={{ fontSize:11.5,color:"hsl(var(--muted-foreground))",marginTop:2 }}>Clique para aplicar</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Export/Import tab */}
      {tab==="export" && (
        <div className="card">
          <div className="card-header"><h3>Export / Import</h3><p>JSON e URL compartilhável</p></div>
          <div style={{ display:"flex",gap:10,flexWrap:"wrap" }}>
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={handleExportJson}><I.Copy size={14}/> Exportar JSON</button>
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={()=>importRef.current?.click()}><I.Upload size={14}/> Importar JSON</button>
            <input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleImportJson} />
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={handleShareUrl}><I.Link size={14}/> Copiar link de tema</button>
          </div>
          <div style={{ marginTop:16,padding:16,borderRadius:10,background:"hsl(var(--muted)/.5)",fontFamily:"var(--font-mono)",fontSize:12,maxHeight:200,overflow:"auto",whiteSpace:"pre" }}>
            {JSON.stringify(overrides,null,2)||"// nenhum override ativo"}
          </div>
        </div>
      )}

      {/* History tab */}
      {tab==="history" && (
        <div className="card">
          <div className="card-header"><h3>Histórico (últimos 10 estados)</h3><p>Clique para restaurar</p></div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {history.slice().reverse().map((state, ri) => {
              const idx = history.length-1-ri;
              const isCurrent = idx===histIdx;
              const keys = Object.keys(state);
              return (
                <div key={idx} onClick={()=>{setHistIdx(idx);applyOverrides(state);}}
                  style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${isCurrent?"hsl(var(--primary))":"hsl(var(--border))"}`,cursor:"pointer",background:isCurrent?"hsl(var(--primary)/.05)":"hsl(var(--card))" }}>
                  <span style={{ fontFamily:"var(--font-mono)",fontSize:11,color:"hsl(var(--muted-foreground))",minWidth:20 }}>{idx}</span>
                  <span style={{ fontSize:13,flex:1 }}>{keys.length===0?"Estado inicial":keys.length===Object.keys(defaults).length?"Preset completo":`${keys.length} tokens sobrescritos`}</span>
                  {isCurrent && <span style={{ fontSize:11,fontWeight:600,color:"hsl(var(--primary))" }}>ATUAL</span>}
                </div>
              );
            })}
          </div>
          <div style={{ display:"flex",gap:8,marginTop:12 }}>
            <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleUndo} disabled={histIdx<=0}><I.Undo size={13}/> Undo</button>
            <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleRedo} disabled={histIdx>=history.length-1}><I.Redo size={13}/> Redo</button>
          </div>
        </div>
      )}

      {/* Named themes tab */}
      {tab==="named" && (
        <div className="card">
          <div className="card-header"><h3>Temas nomeados</h3><p>Salvar e carregar múltiplos temas</p></div>
          <div style={{ display:"flex",gap:8,marginBottom:16 }}>
            <input className="field-input" style={{ maxWidth:240 }} placeholder="Nome do tema (ex: verão 2026)"
              value={themeName} onChange={e=>setThemeName(e.target.value)} />
            <button className="aa-btn aa-btn--primary aa-btn--sm" onClick={handleSaveNamed}><I.Save size={13}/> Salvar tema atual</button>
          </div>
          {Object.keys(namedThemes).length===0
            ? <p style={{ fontSize:13,color:"hsl(var(--muted-foreground))" }}>Nenhum tema salvo ainda.</p>
            : (
              <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                {Object.keys(namedThemes).map(name=>(
                  <div key={name} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:"1px solid hsl(var(--border))",background:"hsl(var(--card))" }}>
                    <span style={{ flex:1,fontSize:13,fontWeight:500 }}>{name}</span>
                    <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={()=>handleLoadNamed(name)}>Carregar</button>
                    <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={()=>{const n={...namedThemes};delete n[name];setNamedThemes(n);localStorage.setItem(STORAGE_KEY+"-named",JSON.stringify(n));}}><I.Trash2 size={13}/></button>
                  </div>
                ))}
              </div>
            )}
        </div>
      )}

      {/* Options tab */}
      {tab==="options" && (
        <div className="card">
          <div className="card-header"><h3>Opções avançadas</h3></div>
          <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid hsl(var(--border))" }}>
              <div>
                <div style={{ fontSize:13,fontWeight:500 }}>Gerar dark mode automaticamente</div>
                <div style={{ fontSize:12,color:"hsl(var(--muted-foreground))" }}>Inverte luminance dos tokens de superfície</div>
              </div>
              <div onClick={()=>handleDarkDerive(!darkDerived)} style={{ width:36,height:20,borderRadius:999,background:darkDerived?"hsl(var(--primary))":"hsl(var(--muted))",position:"relative",cursor:"pointer",transition:"background 150ms" }}>
                <div style={{ position:"absolute",top:2,left:darkDerived?16:2,width:16,height:16,borderRadius:50,background:"#fff",transition:"left 150ms" }}/>
              </div>
            </div>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0" }}>
              <div>
                <div style={{ fontSize:13,fontWeight:500 }}>Aplicar para todos os usuários</div>
                <div style={{ fontSize:12,color:"hsl(var(--muted-foreground))" }}>Workspace-wide (no quick-start-remix: persiste em DB)</div>
              </div>
              <div onClick={()=>setWorkspaceWide(o=>!o)} style={{ width:36,height:20,borderRadius:999,background:workspaceWide?"hsl(var(--primary))":"hsl(var(--muted))",position:"relative",cursor:"pointer",transition:"background 150ms" }}>
                <div style={{ position:"absolute",top:2,left:workspaceWide?16:2,width:16,height:16,borderRadius:50,background:"#fff",transition:"left 150ms" }}/>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed",bottom:20,right:20,background:"hsl(var(--foreground))",color:"hsl(var(--background))",padding:"12px 16px",borderRadius:14,fontSize:13,fontWeight:500,boxShadow:"0 8px 24px hsl(var(--foreground)/.25)",zIndex:100,animation:"fadeUp 200ms ease" }}>
          {toast}
        </div>
      )}

      <style>{`@keyframes fadeUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────
function App() {
  const reducedMotion = useReducedMotion(); // F-RP-012

  // Demo mode: ?demo=ops|crm|wiki bypassa login (usado pelo showcase em iframe)
  const initDemo = (() => {
    try {
      const p = new URLSearchParams(window.location.search).get("demo");
      return (p && ["ops","crm","wiki"].includes(p)) ? p : null;
    } catch { return null; }
  })();
  const [session, setSession] = useState(initDemo);
  const [activePage, setActivePage] = useState("dashboard");

  // Apply theme from URL ?theme= on mount
  useEffect(() => {
    try {
      const p = new URLSearchParams(window.location.search).get("theme");
      if (p) {
        const data = JSON.parse(atob(p));
        Object.entries(data).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
      }
    } catch {}
  }, []);

  // Aplica preset de cores do template ao logar
  useEffect(() => {
    if (!session) return;
    const preset = COLOR_PRESETS[TEMPLATES[session]?.presetKey];
    if (preset) Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [session]);

  if (!session) return <LoginScreen onLogin={({ templateKey }) => { setSession(templateKey); setActivePage("dashboard"); }} />;

  const tpl = TEMPLATES[session];

  const renderPage = () => {
    if (activePage === "profile") return <ProfileScreen user={tpl.user} />;
    if (activePage === "settings") return <SettingsScreen />;
    if (activePage === "dashboard") {
      if (session === "ops") return <OpsDashboard onNav={setActivePage} />;
      if (session === "crm") return <CrmDashboard onNav={setActivePage} />;
      if (session === "wiki") return <WikiDashboard onNav={setActivePage} />;
    }
    // Rich sub-pages
    if (activePage === "romaneios") return <RomaneiosPage />;
    if (activePage === "pipeline")  return <PipelinePage />;
    if (activePage === "artigos")   return <ArticlesPage />;
    // Generic sub-pages
    const flat = tpl.navGroups.flatMap(g=>g.items).find(i=>i.k===activePage);
    const label = flat?.lbl ?? activePage;
    return <PlaceholderPage title={label} crumb={`${session} · ${activePage}`} />;
  };

  return (
    <div className="app-shell" style={{ gridTemplateColumns: undefined, transition: reducedMotion ? "none" : undefined }}>
      <AppSidebar
        templateKey={session}
        activePage={activePage}
        onNav={setActivePage}
        onLogout={() => { setSession(null); setActivePage("dashboard"); }}
      />
      <main className="main-area">
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
