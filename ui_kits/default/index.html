      {/* Zona perigosa */}
      <div className="card">
        <div className="card-header"><h3 style={{ color:"hsl(var(--destructive))" }}>Zona perigosa</h3><p>Ações irreversíveis</p></div>
        <div className="danger-zone" style={{ display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:13,fontWeight:500 }}>Excluir conta</div>
            <div style={{ fontSize:11.5,color:"hsl(var(--muted-foreground))" }}>Remove todos os dados permanentemente</div>
          </div>
          <button className="aa-btn aa-btn--destructive aa-btn--sm"><I.Trash2 size={13}/> Excluir conta</button>
        </div>
      </div>
    </div>
  );
}

function ToggleSwitch({ defaultOn=false }) {
  const [on, setOn] = useState(defaultOn);
  return (
    <div onClick={()=>setOn(o=>!o)} style={{
      width:36,height:20,borderRadius:999,background:on?"hsl(var(--primary))":"hsl(var(--muted))",
      position:"relative",cursor:"pointer",transition:"background 150ms",flexShrink:0
    }}>
      <div style={{
        position:"absolute",top:2,left:on?16:2,width:16,height:16,borderRadius:50,
        background:"#fff",transition:"left 150ms",boxShadow:"var(--shadow-control)"
      }}/>
    </div>
  );
}

// ─── SettingsScreen (+1 to +7) ────────────────────────────────────
const STORAGE_KEY = "ds-tokens-override-v2";

function SettingsScreen() {
  const [defaults, setDefaults] = useState({});
  const [overrides, setOverrides] = useState({});
  const [history, setHistory] = useState([{}]);
  const [histIdx, setHistIdx] = useState(0);
  const [namedThemes, setNamedThemes] = useState({});
  const [themeName, setThemeName] = useState("");
  const [darkDerived, setDarkDerived] = useState(false);
  const [workspaceWide, setWorkspaceWide] = useState(true);
  const [tab, setTab] = useState("editor");
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const root = getComputedStyle(document.documentElement);
    const defs = {};
    TOKEN_SECTIONS.forEach(s => s.tokens.forEach(t => {
      const v = root.getPropertyValue(t.id).trim();
      if (v) defs[t.id] = v;
    }));
    setDefaults(defs);
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
      setOverrides(saved);
      Object.entries(saved).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
    } catch {}
    try { setNamedThemes(JSON.parse(localStorage.getItem(STORAGE_KEY+"-named")||"{}")); } catch {}
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  const valueOf = (id) => overrides[id] ?? defaults[id] ?? "";
  const isOverridden = (id) => id in overrides;

  const pushHistory = (next) => {
    const newHist = history.slice(0, histIdx+1).concat([next]);
    setHistory(newHist.slice(-11));
    setHistIdx(Math.min(newHist.length-1, 10));
  };

  const applyOverrides = (next) => {
    setOverrides(next);
    Object.entries(next).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
    Object.keys(defaults).filter(k=>!(k in next)).forEach(k => document.documentElement.style.removeProperty(k));
  };

  const handleChange = (id, hex) => {
    const hsl = hexToHslStr(hex);
    const next = { ...overrides, [id]: hsl };
    pushHistory(next);
    applyOverrides(next);
  };

  const handleReset = (id) => {
    const next = { ...overrides };
    delete next[id];
    pushHistory(next);
    applyOverrides(next);
  };

  const handleResetAll = () => {
    pushHistory({});
    applyOverrides({});
  };

  const handleSave = () => {
    const ratio = getMinContrast();
    if (ratio < 3) { showToast("❌ Contraste abaixo de 3:1 — salvar bloqueado."); return; }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
    showToast("✅ Tema salvo!");
  };

  const handleApplyPreset = (name) => {
    const preset = COLOR_PRESETS[name];
    pushHistory(preset);
    applyOverrides(preset);
    showToast(`✅ Preset "${name}" aplicado`);
  };

  const handleExportJson = () => {
    const blob = new Blob([JSON.stringify(overrides, null, 2)], { type:"application/json" });
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="theme.json"; a.click();
  };

  const handleImportJson = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        pushHistory(data); applyOverrides(data); showToast("✅ Tema importado!");
      } catch { showToast("❌ JSON inválido"); }
    };
    r.readAsText(f);
  };

  const handleShareUrl = () => {
    const b64 = btoa(JSON.stringify(overrides));
    const url = new URL(window.location.href);
    url.searchParams.set("theme", b64);
    navigator.clipboard?.writeText(url.toString());
    showToast("📋 Link copiado!");
  };

  const handleUndo = () => {
    if (histIdx <= 0) return;
    const ni = histIdx - 1;
    setHistIdx(ni);
    applyOverrides(history[ni]);
  };

  const handleRedo = () => {
    if (histIdx >= history.length-1) return;
    const ni = histIdx + 1;
    setHistIdx(ni);
    applyOverrides(history[ni]);
  };

  const handleSaveNamed = () => {
    if (!themeName.trim()) return;
    const next = { ...namedThemes, [themeName]: overrides };
    setNamedThemes(next);
    localStorage.setItem(STORAGE_KEY+"-named", JSON.stringify(next));
    setThemeName("");
    showToast(`✅ Tema "${themeName}" salvo`);
  };

  const handleLoadNamed = (name) => {
    const t = namedThemes[name];
    if (!t) return;
    pushHistory(t); applyOverrides(t); showToast(`✅ Tema "${name}" carregado`);
  };

  const handleDarkDerive = (on) => {
    setDarkDerived(on);
    if (on) {
      // Invert lightness of background/foreground/card tokens
      const next = { ...overrides };
      ["--background","--card","--foreground","--muted"].forEach(id => {
        const val = valueOf(id);
        const m = val.match(/^(\d+)\s+(\d+)%\s+(\d+)%/);
        if (m) {
          const l = parseInt(m[3]);
          next[id] = `${m[1]} ${m[2]}% ${100-l}%`;
        }
      });
      pushHistory(next); applyOverrides(next);
      showToast("🌙 Dark mode derivado aplicado");
    } else {
      handleResetAll();
      showToast("☀️ Light mode restaurado");
    }
  };

  const getMinContrast = () => {
    const bgHex = hslStrToHex(valueOf("--background"));
    const fgHex = hslStrToHex(valueOf("--foreground"));
    return contrast(bgHex, fgHex);
  };

  const minContrast = getMinContrast();
  const contrastOk = minContrast >= 4.5;
  const contrastWarn = minContrast >= 3 && minContrast < 4.5;

  const importRef = useRef(null);

  return (
    <div className="page-content" style={{ position:"relative" }}>
      <div className="page-header">
        <div className="page-header-stack">
          <span className="page-crumb">conta · configurações</span>
          <h2 className="page-title">Design System</h2>
          <p className="page-sub">Editor de tokens de cor + histórico + presets + export/import</p>
        </div>
        <div className="page-actions">
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleUndo} disabled={histIdx<=0} title="Desfazer">
            <I.Undo size={13}/> Undo
          </button>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleRedo} disabled={histIdx>=history.length-1} title="Refazer">
            <I.Redo size={13}/> Redo
          </button>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleResetAll}><I.RotateCcw size={13}/> Restaurar</button>
          <button className="aa-btn aa-btn--primary aa-btn--sm" onClick={handleSave}
            style={{ opacity: minContrast<3?0.5:1 }}><I.Save size={13}/> Salvar</button>
        </div>
      </div>

      {/* WCAG banner */}
      {!contrastOk && (
        <div style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderRadius:10,
          background: contrastWarn?"hsl(var(--warning)/.12)":"hsl(var(--destructive)/.1)",
          color: contrastWarn?"hsl(35 85% 30%)":"hsl(0 70% 40%)",fontSize:13 }}>
          <I.Info size={16}/>
          {contrastWarn
            ? `Contraste text/bg: ${minContrast.toFixed(1)}:1 — abaixo de WCAG AA (4.5:1). Corrija antes de salvar.`
            : `Contraste text/bg: ${minContrast.toFixed(1)}:1 — CRÍTICO (< 3:1). Salvar bloqueado.`}
        </div>
      )}

      {/* Tabs */}
      <div className="tabs-nav">
        {[["editor","Editor"],["presets","Presets"],["export","Export/Import"],["history","Histórico"],["named","Temas Salvos"],["options","Opções"]].map(([k,l])=>(
          <div key={k} className={`tab-item${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      {/* Editor tab */}
      {tab==="editor" && TOKEN_SECTIONS.map(sec => (
        <div key={sec.title} className="card">
          <div className="card-header"><h3>{sec.title}</h3></div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:10 }}>
            {sec.tokens.map(t => {
              const val = valueOf(t.id);
              const hex = val ? hslStrToHex(val) : "#000000";
              const bgHex = t.contrastWith ? hslStrToHex(valueOf(t.contrastWith)||"0 0% 100%") : null;
              const ratio = bgHex ? contrast(hex, bgHex) : null;
              const ratioOk = ratio !== null ? ratio >= 4.5 : null;
              return (
                <div key={t.id} className="token-row">
                  <label className="color-swatch" style={{ background:`hsl(${val})` }}>
                    <input type="color" value={hex} onChange={e=>handleChange(t.id,e.target.value)} />
                  </label>
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                      <span style={{ fontSize:13,fontWeight:500 }}>{t.label}</span>
                      {isOverridden(t.id) && <span style={{ fontSize:9,fontWeight:600,padding:"1px 5px",borderRadius:4,background:"hsl(var(--accent)/.15)",color:"hsl(var(--accent))",textTransform:"uppercase" }}>CUSTOM</span>}
                      {ratio !== null && (
                        <span style={{ fontSize:10,fontWeight:700,color:ratioOk?"hsl(var(--success))":"hsl(var(--destructive))" }}
                          title={`Contraste: ${ratio.toFixed(2)}:1`}>
                          {ratioOk?`AA ✓ ${ratio.toFixed(1)}:1`:`AA ✗ ${ratio.toFixed(1)}:1`}
                        </span>
                      )}
                    </div>
                    <div style={{ fontFamily:"var(--font-mono)",fontSize:10,color:"hsl(var(--muted-foreground))",marginTop:2 }}>{hex} · {t.id}</div>
                  </div>
                  {isOverridden(t.id) && (
                    <button onClick={()=>handleReset(t.id)} style={{ width:26,height:26,border:0,borderRadius:6,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"hsl(var(--muted-foreground))" }}
                      onMouseEnter={e=>e.currentTarget.style.background="hsl(var(--muted))"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <I.RotateCcw size={13}/>
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Presets tab */}
      {tab==="presets" && (
        <div className="card">
          <div className="card-header"><h3>Presets prontos</h3><p>Aplicar preset substitui todos os tokens</p></div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12 }}>
            {Object.keys(COLOR_PRESETS).map(name => {
              const p = COLOR_PRESETS[name];
              return (
                <div key={name} onClick={()=>handleApplyPreset(name)} style={{
                  cursor:"pointer",padding:"16px",borderRadius:14,border:"1.5px solid hsl(var(--border))",
                  background:"hsl(var(--card))",transition:"border-color 150ms,box-shadow 150ms",
                }} onMouseEnter={e=>{e.currentTarget.style.borderColor="hsl(var(--primary)/.5)";e.currentTarget.style.boxShadow="0 4px 12px hsl(var(--foreground)/.06)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="hsl(var(--border))";e.currentTarget.style.boxShadow="none"}}>
                  <div style={{ display:"flex",gap:6,marginBottom:10 }}>
                    {["--primary","--accent","--background","--sidebar-background"].map(tk=>(
                      <div key={tk} style={{ width:24,height:24,borderRadius:6,background:`hsl(${p[tk]})`,border:"1px solid hsl(0 0% 0% / .1)` `" }} />
                    ))}
                  </div>
                  <div style={{ fontSize:13,fontWeight:600 }}>{name}</div>
                  <div style={{ fontSize:11.5,color:"hsl(var(--muted-foreground))",marginTop:2 }}>Clique para aplicar</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Export/Import tab */}
      {tab==="export" && (
        <div className="card">
          <div className="card-header"><h3>Export / Import</h3><p>JSON e URL compartilhável</p></div>
          <div style={{ display:"flex",gap:10,flexWrap:"wrap" }}>
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={handleExportJson}><I.Copy size={14}/> Exportar JSON</button>
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={()=>importRef.current?.click()}><I.Upload size={14}/> Importar JSON</button>
            <input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleImportJson} />
            <button className="aa-btn aa-btn--outline aa-btn--md" onClick={handleShareUrl}><I.Link size={14}/> Copiar link de tema</button>
          </div>
          <div style={{ marginTop:16,padding:16,borderRadius:10,background:"hsl(var(--muted)/.5)",fontFamily:"var(--font-mono)",fontSize:12,maxHeight:200,overflow:"auto",whiteSpace:"pre" }}>
            {JSON.stringify(overrides,null,2)||"// nenhum override ativo"}
          </div>
        </div>
      )}

      {/* History tab */}
      {tab==="history" && (
        <div className="card">
          <div className="card-header"><h3>Histórico (últimos 10 estados)</h3><p>Clique para restaurar</p></div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {history.slice().reverse().map((state, ri) => {
              const idx = history.length-1-ri;
              const isCurrent = idx===histIdx;
              const keys = Object.keys(state);
              return (
                <div key={idx} onClick={()=>{setHistIdx(idx);applyOverrides(state);}}
                  style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${isCurrent?"hsl(var(--primary))":"hsl(var(--border))"}`,cursor:"pointer",background:isCurrent?"hsl(var(--primary)/.05)":"hsl(var(--card))" }}>
                  <span style={{ fontFamily:"var(--font-mono)",fontSize:11,color:"hsl(var(--muted-foreground))",minWidth:20 }}>{idx}</span>
                  <span style={{ fontSize:13,flex:1 }}>{keys.length===0?"Estado inicial":keys.length===Object.keys(defaults).length?"Preset completo":`${keys.length} tokens sobrescritos`}</span>
                  {isCurrent && <span style={{ fontSize:11,fontWeight:600,color:"hsl(var(--primary))" }}>ATUAL</span>}
                </div>
              );
            })}
          </div>
          <div style={{ display:"flex",gap:8,marginTop:12 }}>
            <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleUndo} disabled={histIdx<=0}><I.Undo size={13}/> Undo</button>
            <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={handleRedo} disabled={histIdx>=history.length-1}><I.Redo size={13}/> Redo</button>
          </div>
        </div>
      )}

      {/* Named themes tab */}
      {tab==="named" && (
        <div className="card">
          <div className="card-header"><h3>Temas nomeados</h3><p>Salvar e carregar múltiplos temas</p></div>
          <div style={{ display:"flex",gap:8,marginBottom:16 }}>
            <input className="field-input" style={{ maxWidth:240 }} placeholder="Nome do tema (ex: verão 2026)"
              value={themeName} onChange={e=>setThemeName(e.target.value)} />
            <button className="aa-btn aa-btn--primary aa-btn--sm" onClick={handleSaveNamed}><I.Save size={13}/> Salvar tema atual</button>
          </div>
          {Object.keys(namedThemes).length===0
            ? <p style={{ fontSize:13,color:"hsl(var(--muted-foreground))" }}>Nenhum tema salvo ainda.</p>
            : (
              <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                {Object.keys(namedThemes).map(name=>(
                  <div key={name} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:"1px solid hsl(var(--border))",background:"hsl(var(--card))" }}>
                    <span style={{ flex:1,fontSize:13,fontWeight:500 }}>{name}</span>
                    <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={()=>handleLoadNamed(name)}>Carregar</button>
                    <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={()=>{const n={...namedThemes};delete n[name];setNamedThemes(n);localStorage.setItem(STORAGE_KEY+"-named",JSON.stringify(n));}}><I.Trash2 size={13}/></button>
                  </div>
                ))}
              </div>
            )}
        </div>
      )}

      {/* Options tab */}
      {tab==="options" && (
        <div className="card">
          <div className="card-header"><h3>Opções avançadas</h3></div>
          <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid hsl(var(--border))" }}>
              <div>
                <div style={{ fontSize:13,fontWeight:500 }}>Gerar dark mode automaticamente</div>
                <div style={{ fontSize:12,color:"hsl(var(--muted-foreground))" }}>Inverte luminance dos tokens de superfície</div>
              </div>
              <div onClick={()=>handleDarkDerive(!darkDerived)} style={{ width:36,height:20,borderRadius:999,background:darkDerived?"hsl(var(--primary))":"hsl(var(--muted))",position:"relative",cursor:"pointer",transition:"background 150ms" }}>
                <div style={{ position:"absolute",top:2,left:darkDerived?16:2,width:16,height:16,borderRadius:50,background:"#fff",transition:"left 150ms" }}/>
              </div>
            </div>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0" }}>
              <div>
                <div style={{ fontSize:13,fontWeight:500 }}>Aplicar para todos os usuários</div>
                <div style={{ fontSize:12,color:"hsl(var(--muted-foreground))" }}>Workspace-wide (no quick-start-remix: persiste em DB)</div>
              </div>
              <div onClick={()=>setWorkspaceWide(o=>!o)} style={{ width:36,height:20,borderRadius:999,background:workspaceWide?"hsl(var(--primary))":"hsl(var(--muted))",position:"relative",cursor:"pointer",transition:"background 150ms" }}>
                <div style={{ position:"absolute",top:2,left:workspaceWide?16:2,width:16,height:16,borderRadius:50,background:"#fff",transition:"left 150ms" }}/>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed",bottom:20,right:20,background:"hsl(var(--foreground))",color:"hsl(var(--background))",padding:"12px 16px",borderRadius:14,fontSize:13,fontWeight:500,boxShadow:"0 8px 24px hsl(var(--foreground)/.25)",zIndex:100,animation:"fadeUp 200ms ease" }}>
          {toast}
        </div>
      )}

      <style>{`@keyframes fadeUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────
function App() {
  const reducedMotion = useReducedMotion(); // F-RP-012

  // Demo mode: ?demo=ops|crm|wiki bypassa login (usado pelo showcase em iframe)
  const initDemo = (() => {
    try {
      const p = new URLSearchParams(window.location.search).get("demo");
      return (p && ["ops","crm","wiki"].includes(p)) ? p : null;
    } catch { return null; }
  })();
  const [session, setSession] = useState(initDemo);
  // Initial page from URL param ?page= (used by deck iframes)
  const initPage = (() => {
    try {
      const p = new URLSearchParams(window.location.search).get("page");
      return p || "dashboard";
    } catch { return "dashboard"; }
  })();
  const [activePage, setActivePage] = useState(initPage);
  const [selectedLeadId, setSelectedLeadId] = useState(null);
  // Sidebar collapsed estado (lifted pra parent — sincroniza com .app-shell.collapsed grid)
  const [collapsed, setCollapsed] = useState(() => typeof window !== "undefined" && window.innerWidth <= 768);
  useEffect(() => {
    const onResize = () => {
      if (window.innerWidth <= 768) setCollapsed(true);
    };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // Apply theme from URL ?theme= on mount
  useEffect(() => {
    try {
      const p = new URLSearchParams(window.location.search).get("theme");
      if (p) {
        const data = JSON.parse(atob(p));
        Object.entries(data).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
      }
    } catch {}
  }, []);

  // Theme mode (CRM only): "dark" | "light". Persiste em localStorage.
  const [themeMode, setThemeMode] = useState(() => {
    try { return localStorage.getItem("crm-theme") || "dark"; } catch { return "dark"; }
  });
  const onToggleTheme = () => {
    const next = themeMode === "light" ? "dark" : "light";
    setThemeMode(next);
    try { localStorage.setItem("crm-theme", next); } catch {}
  };

  // Aplica preset de cores do template ao logar (+ honra themeMode pra CRM — Skill #1 audit A2)
  useEffect(() => {
    if (!session) return;
    let presetKey = TEMPLATES[session]?.presetKey;
    if (session === "crm") presetKey = themeMode === "light" ? "CRM Light" : "CRM Dark";
    const preset = COLOR_PRESETS[presetKey];
    if (preset) Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [session, themeMode]);

  if (!session) return <LoginScreen onLogin={({ templateKey }) => { setSession(templateKey); setActivePage("dashboard"); }} />;

  const tpl = TEMPLATES[session];

  const renderPage = () => {
    if (activePage === "profile") return <ProfileScreen user={tpl.user} />;
    if (activePage === "settings") return (
      <div className="page-content">
        <div className="page-header">
          <div className="page-header-stack">
            <span className="page-crumb">conta · configurações</span>
            <h2 className="page-title">Design System</h2>
            <p className="page-sub">Editor canônico de tokens — mesmo do showcase</p>
          </div>
        </div>
        <TokenEditorPreview />
      </div>
    );;
    if (activePage === "dashboard") {
      if (session === "ops") return <OpsDashboard onNav={setActivePage} />;
      if (session === "crm") return <CrmDashboard onNav={setActivePage} />;
      if (session === "wiki") return <WikiDashboard onNav={setActivePage} />;
    }
    // Rich sub-pages
    if (activePage === "romaneios")  return <RomaneiosPage />;
    if (activePage === "pipeline")   return <PipelinePage />;
    if (activePage === "leads" || activePage === "contatos") return <LeadsPage onNav={setActivePage} setSelectedLeadId={setSelectedLeadId} />;
    if (activePage === "conversas")  return <ConversasPage selectedLeadId={selectedLeadId} />;
    if (activePage === "prompts")    return <PromptsPage />;
    if (activePage === "relatorios") return <RelatoriosPage />;
    if (activePage === "artigos")    return <ArticlesPage />;
    // Generic sub-pages
    const flat = tpl.navGroups.flatMap(g=>g.items).find(i=>i.k===activePage);
    const label = flat?.lbl ?? activePage;
    return <PlaceholderPage title={label} crumb={`${session} · ${activePage}`} />;
  };

  return (
    <div className={`app-shell${collapsed ? " collapsed" : ""}`} style={{ transition: reducedMotion ? "none" : undefined }}>
      <AppSidebar
        templateKey={session}
        activePage={activePage}
        onNav={setActivePage}
        onLogout={() => { setSession(null); setActivePage("dashboard"); }}
        collapsed={collapsed}
        setCollapsed={setCollapsed}
        themeMode={themeMode}
        onToggleTheme={onToggleTheme}
      />
      <main className="main-area">
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
