<!doctype html>
<html lang="en" data-preset="warm">
<head>
<meta charset="utf-8" />
<title>Choco — warm-editorial UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:inherit}
  .app{display:grid;grid-template-columns:272px 1fr;min-height:100vh}

  /* ===== Sidebar ===== */
  .side{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));padding:18px 14px;display:flex;flex-direction:column;gap:2px;border-right:1px solid hsl(var(--sidebar-border));position:relative}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px}
  .brand-mark{width:32px;height:32px;border-radius:8px;background:hsl(var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:15px}
  .brand-name{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em}
  .brand-sub{font-size:10px;font-family:var(--font-mono);color:hsl(var(--sidebar-foreground)/.6);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .section-label{font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--sidebar-foreground)/.5);padding:14px 10px 6px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13.5px;color:hsl(var(--sidebar-foreground)/.85);position:relative;cursor:pointer}
  .nav:hover{background:hsl(var(--sidebar-accent)/.6);color:#fff}
  .nav.active{background:hsl(var(--sidebar-accent));color:#fff;font-weight:500}
  .nav.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:hsl(var(--sidebar-indicator));border-radius:0 3px 3px 0}
  .nav .ic{width:16px;height:16px;flex-shrink:0;opacity:.85}
  .nav .count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:hsl(var(--sidebar-indicator));font-weight:500}
  .user{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:hsl(var(--sidebar-accent));border:1px solid hsl(var(--sidebar-border))}
  .avatar{width:32px;height:32px;border-radius:999px;background:hsl(var(--accent)/.25);color:hsl(var(--sidebar-foreground));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:12px;border:1px solid hsl(var(--accent)/.5)}
  .uname{font-size:12.5px;font-weight:500}
  .umail{font-size:10px;color:hsl(var(--sidebar-foreground)/.65);font-family:var(--font-mono)}

  /* ===== Main ===== */
  .main{display:flex;flex-direction:column}
  .topbar{height:60px;border-bottom:1px solid hsl(var(--border));display:flex;align-items:center;padding:0 24px;gap:14px;background:hsl(var(--card));position:sticky;top:0;z-index:5}
  .crumbs{font-size:12px;color:hsl(var(--muted-foreground));display:flex;align-items:center;gap:6px}
  .crumbs strong{color:hsl(var(--foreground));font-weight:500}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:hsl(var(--muted));border-radius:10px;padding:7px 12px;width:280px}
  .search input{background:transparent;border:none;outline:none;flex:1;font-size:13px;color:hsl(var(--foreground))}
  .search input::placeholder{color:hsl(var(--muted-foreground))}
  .kbd{font-family:var(--font-mono);font-size:10px;background:hsl(var(--card));border:1px solid hsl(var(--border));padding:1px 5px;border-radius:4px;color:hsl(var(--muted-foreground))}

  .page{padding:24px;display:flex;flex-direction:column;gap:20px;max-width:1280px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px}
  h2.page-title{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;margin:0;line-height:1.15}
  .page-sub{font-size:13.5px;color:hsl(var(--muted-foreground));margin:4px 0 0;max-width:560px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500;transition:all 150ms}
  .btn-primary{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
  .btn-primary:hover{background:hsl(var(--primary)/.92)}
  .btn-accent{background:hsl(var(--accent));color:hsl(var(--accent-foreground))}
  .btn-accent:hover{background:hsl(var(--accent)/.92)}
  .btn-secondary{background:hsl(var(--card));color:hsl(var(--foreground));border:1px solid hsl(var(--border))}
  .btn-secondary:hover{background:hsl(var(--muted))}
  .btn-ghost{color:hsl(var(--muted-foreground));padding:6px 10px}
  .btn-ghost:hover{background:hsl(var(--muted));color:hsl(var(--foreground))}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .kpi-label{font-size:11.5px;color:hsl(var(--muted-foreground));font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .kpi-value{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em}
  .kpi-delta{font-family:var(--font-mono);font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .kpi-delta.up{color:hsl(var(--success))}
  .kpi-delta.dn{color:hsl(var(--destructive))}

  /* Filter row */
  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;background:hsl(var(--card));border:1px solid hsl(var(--border));color:hsl(var(--muted-foreground));cursor:pointer}
  .chip.active{background:hsl(var(--primary));color:hsl(var(--primary-foreground));border-color:hsl(var(--primary))}
  .chip:hover:not(.active){background:hsl(var(--muted))}

  /* Table card */
  .table-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;overflow:hidden;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .table-head{display:grid;grid-template-columns:1.6fr 200px 140px 110px 80px;gap:12px;padding:12px 22px;font-size:11px;font-weight:600;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid hsl(var(--border));white-space:nowrap}
  .table-rows{padding:8px 12px}
  .group-head{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.06em;color:hsl(var(--foreground));text-transform:uppercase;padding:14px 10px 6px;display:flex;align-items:center;gap:10px}
  .group-head::after{content:"";flex:1;height:1px;background:hsl(var(--border))}
  .row{display:grid;grid-template-columns:1.6fr 200px 140px 110px 80px;gap:12px;align-items:center;padding:10px 10px;border-radius:14px;cursor:pointer;font-size:13.5px;transition:background 150ms}
  .row:hover{background:hsl(var(--muted)/.55)}
  .row .name{display:flex;flex-direction:column;gap:2px}
  .row .name strong{font-weight:500}
  .row .name .meta{font-size:11px;color:hsl(var(--muted-foreground));font-family:var(--font-mono)}
  .num{font-family:var(--font-mono);font-feature-settings:'tnum';color:hsl(var(--muted-foreground))}
  .row .actions{display:flex;gap:2px;justify-content:flex-end}
  .icon-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:hsl(var(--muted-foreground))}
  .icon-btn:hover{background:hsl(var(--muted));color:hsl(var(--foreground))}

  /* Status pill */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:500;width:fit-content}
  .pill .dot{width:6px;height:6px;border-radius:999px;background:currentColor}
  .pill.ok{background:hsl(var(--success)/.13);color:hsl(var(--success))}
  .pill.warn{background:hsl(var(--warning)/.18);color:hsl(35 85% 30%)}
  .pill.err{background:hsl(var(--destructive)/.1);color:hsl(0 70% 40%)}
  .pill.info{background:hsl(var(--info)/.13);color:hsl(var(--info))}

  /* Side panel */
  .layout-2col{display:grid;grid-template-columns:1fr 360px;gap:20px}

  .info-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:18px 20px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .info-card h3{font-size:13.5px;font-weight:500;margin:0 0 14px}
  .field{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid hsl(var(--border)/.6)}
  .field:last-child{border-bottom:none}
  .field .k{color:hsl(var(--muted-foreground))}
  .field .v{font-family:var(--font-mono)}

  .timeline{display:flex;flex-direction:column;gap:14px;padding-left:6px;border-left:1px dashed hsl(var(--border));margin-left:8px}
  .ev{position:relative;padding-left:18px;font-size:12.5px}
  .ev::before{content:"";position:absolute;left:-5px;top:6px;width:8px;height:8px;border-radius:999px;background:hsl(var(--primary))}
  .ev .when{font-family:var(--font-mono);font-size:10.5px;color:hsl(var(--muted-foreground));margin-bottom:2px}

  /* toasts/snackbars */
  .toast{position:fixed;bottom:20px;right:20px;background:hsl(var(--foreground));color:hsl(var(--background));padding:12px 16px;border-radius:14px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px -8px hsl(var(--foreground)/.3);z-index:50;animation:rise 300ms ease}
  @keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  .toast .ok-mark{width:20px;height:20px;border-radius:999px;background:hsl(var(--success));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}

  /* Modal */
  .scrim{position:fixed;inset:0;background:hsl(var(--foreground)/.35);display:flex;align-items:center;justify-content:center;z-index:40;animation:fade 200ms ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:hsl(var(--card));border-radius:20px;padding:24px;width:480px;border:1px solid hsl(var(--border));box-shadow:0 30px 80px -20px hsl(var(--foreground)/.4)}
  .modal h3{font-family:var(--font-display);font-size:20px;margin:0 0 6px;font-weight:600}
  .modal p{font-size:13px;color:hsl(var(--muted-foreground));margin:0 0 18px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .form-row label{font-size:12px;color:hsl(var(--muted-foreground));font-weight:500}
  .form-row input,.form-row select{padding:9px 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--card));outline:none;color:hsl(var(--foreground))}
  .form-row input:focus,.form-row select:focus{border-color:hsl(var(--primary));box-shadow:0 0 0 3px hsl(var(--primary)/.12)}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

  /* tabs */
  .tabs{display:flex;gap:4px;border-bottom:1px solid hsl(var(--border));padding:0 4px}
  .tab{padding:10px 14px;font-size:13px;color:hsl(var(--muted-foreground));border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
  .tab.active{color:hsl(var(--foreground));border-bottom-color:hsl(var(--accent));font-weight:500}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

// === Inline icon set (lucide-style, stroke 1.5) ===
const Ic = {
  pkg:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
  truck:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M5 18H3V6h13v12h-2"/><path d="M14 9h4l3 3v6h-2"/><circle cx="7.5" cy="18.5" r="1.5"/><circle cx="17.5" cy="18.5" r="1.5"/></svg>,
  globe:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>,
  users:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>,
  list:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><circle cx="3.5" cy="6" r=".7"/><circle cx="3.5" cy="12" r=".7"/><circle cx="3.5" cy="18" r=".7"/></svg>,
  cog:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.21.78.33 1.21.33H21a2 2 0 1 1 0 4h-.09c-.43 0-.85.12-1.21.33Z"/></svg>,
  search: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  plus:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
  more:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
  arrow:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="ic"><path d="M7 17l10-10"/><path d="M7 7h10v10"/></svg>,
};

// === Sidebar ===
function Sidebar({ active, onNav }) {
  const items = [
    { k: "romaneios", lbl: "Romaneios", I: Ic.list, count: 12 },
    { k: "lotes",     lbl: "Lotes",      I: Ic.pkg },
    { k: "rotas",     lbl: "Rotas",      I: Ic.truck },
    { k: "origens",   lbl: "Origens",    I: Ic.globe },
  ];
  const items2 = [
    { k: "produtores", lbl: "Produtores", I: Ic.users },
    { k: "config",     lbl: "Configurações", I: Ic.cog },
  ];
  return (
    <aside className="side">
      <div className="brand">
        <div className="brand-mark">B</div>
        <div>
          <div className="brand-name">Choco</div>
          <div className="brand-sub">barry callebaut</div>
        </div>
      </div>
      <div className="section-label">Operação</div>
      {items.map(({ k, lbl, I, count }) => (
        <div key={k} className={"nav " + (active === k ? "active" : "")} onClick={() => onNav(k)}>
          <I />
          <span>{lbl}</span>
          {count != null && <span className="count">{count}</span>}
        </div>
      ))}
      <div className="section-label">Cadastros</div>
      {items2.map(({ k, lbl, I }) => (
        <div key={k} className={"nav " + (active === k ? "active" : "")} onClick={() => onNav(k)}>
          <I /><span>{lbl}</span>
        </div>
      ))}
      <div className="user">
        <div className="avatar">PN</div>
        <div style={{flex:1, minWidth:0}}>
          <div className="uname">Patrick N.</div>
          <div className="umail">patrick@bc.com</div>
        </div>
      </div>
    </aside>
  );
}

// === Topbar ===
function Topbar({ crumbs }) {
  return (
    <div className="topbar">
      <div className="crumbs">
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            <span style={i === crumbs.length - 1 ? {color:"hsl(var(--foreground))",fontWeight:500} : {}}>{c}</span>
            {i < crumbs.length - 1 && <span style={{opacity:.5}}>/</span>}
          </React.Fragment>
        ))}
      </div>
      <div className="search">
        <Ic.search />
        <input placeholder="Buscar romaneios, lotes, produtores..." />
        <span className="kbd">⌘K</span>
      </div>
    </div>
  );
}

// === KPI ===
function Kpi({ label, value, delta, dir }) {
  return (
    <div className="kpi">
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      <div className={"kpi-delta " + dir}>
        {dir === "up" ? "▲" : "▼"} {delta}
      </div>
    </div>
  );
}

// === Status pill ===
function Pill({ kind, children }) {
  return <span className={"pill " + kind}><span className="dot"></span>{children}</span>;
}

// === Data ===
const DATA = [
  { group: "BARRY CALLEBAUT · BR", rows: [
    { id: "RM-0421", name: "Selo Sustentável · Bahia", origin: "Salvador → Lyon", vol: "15.0 t", status: ["ok","Entregue"], date: "2026-04-22" },
    { id: "RM-0422", name: "Cacao Horizons", origin: "Itabuna → Rotterdam", vol: "12.4 t", status: ["info","Em trânsito"], date: "2026-04-25" },
    { id: "RM-0423", name: "Direto do Produtor · Linhares", origin: "Vitória → Bordeaux", vol: "8.1 t", status: ["warn","Em revisão"], date: "2026-04-26" },
  ]},
  { group: "FEMSA · MX", rows: [
    { id: "RM-0501", name: "Lote Nayarit", origin: "Manzanillo → Long Beach", vol: "22.8 t", status: ["ok","Entregue"], date: "2026-04-21" },
    { id: "RM-0502", name: "Trazabilidad MX-09", origin: "Veracruz → Hamburg", vol: "9.6 t", status: ["err","Pendente docs"], date: "2026-04-26" },
  ]},
];

// === Page ===
function App() {
  const [active, setActive] = useState("romaneios");
  const [filter, setFilter] = useState("todos");
  const [tab, setTab] = useState("ativos");
  const [modal, setModal] = useState(false);
  const [toast, setToast] = useState(null);

  const submit = () => {
    setModal(false);
    setToast("Romaneio RM-0503 criado");
    setTimeout(() => setToast(null), 2400);
  };

  return (
    <div className="app">
      <Sidebar active={active} onNav={setActive} />
      <div className="main">
        <Topbar crumbs={["Operação", "Romaneios"]} />
        <div className="page">
          <div className="page-head">
            <div>
              <h2 className="page-title">Romaneios</h2>
              <p className="page-sub">12 abertos · 3 em revisão · semana 18 de 2026. Última sincronização há 2 minutos.</p>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-secondary">Exportar</button>
              <button className="btn btn-primary" onClick={() => setModal(true)}>
                <Ic.plus /> Novo romaneio
              </button>
            </div>
          </div>

          <div className="kpis">
            <Kpi label="Volume (semana)" value="142.4 t"   delta="6.8% vs anterior" dir="up" />
            <Kpi label="Em trânsito"     value="38"        delta="2 atrasos"        dir="dn" />
            <Kpi label="Entregues"       value="124"       delta="98.4% no prazo"   dir="up" />
            <Kpi label="Pendentes docs"  value="5"         delta="1 alerta novo"    dir="dn" />
          </div>

          <div className="tabs">
            {["ativos","arquivados","modelos"].map(t => (
              <div key={t} className={"tab " + (tab===t?"active":"")} onClick={()=>setTab(t)}>
                {t === "ativos" ? "Ativos" : t === "arquivados" ? "Arquivados" : "Modelos"}
              </div>
            ))}
          </div>

          <div className="filters">
            {["todos","entregues","em-transito","revisao","pendentes"].map(f => (
              <div key={f} className={"chip " + (filter===f?"active":"")} onClick={()=>setFilter(f)}>
                {f === "todos" ? "Todos" : f === "em-transito" ? "Em trânsito" : f === "revisao" ? "Em revisão" : f.charAt(0).toUpperCase()+f.slice(1)}
              </div>
            ))}
          </div>

          <div className="layout-2col">
            <div className="table-card">
              <div className="table-head">
                <span>Lote</span>
                <span>Rota</span>
                <span>Status</span>
                <span style={{textAlign:"right"}}>Volume</span>
                <span></span>
              </div>
              <div className="table-rows">
                {DATA.map(g => (
                  <React.Fragment key={g.group}>
                    <div className="group-head">{g.group}</div>
                    {g.rows.map(r => (
                      <div key={r.id} className="row">
                        <div className="name">
                          <strong>{r.name}</strong>
                          <span className="meta">{r.id} · {r.date}</span>
                        </div>
                        <span className="num">{r.origin}</span>
                        <span><Pill kind={r.status[0]}>{r.status[1]}</Pill></span>
                        <span className="num" style={{textAlign:"right"}}>{r.vol}</span>
                        <span className="actions">
                          <button className="icon-btn" aria-label="Open"><Ic.arrow /></button>
                          <button className="icon-btn" aria-label="More"><Ic.more /></button>
                        </span>
                      </div>
                    ))}
                  </React.Fragment>
                ))}
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div className="info-card">
                <h3>RM-0422 · Cacao Horizons</h3>
                <div className="field"><span className="k">Lote</span><span className="v">CH-2026-0422</span></div>
                <div className="field"><span className="k">Origem</span><span className="v">Itabuna · BA</span></div>
                <div className="field"><span className="k">Destino</span><span className="v">Rotterdam · NL</span></div>
                <div className="field"><span className="k">Volume</span><span className="v">12.4 t</span></div>
                <div className="field"><span className="k">ETA</span><span className="v">2026-05-08</span></div>
                <div className="field"><span className="k">Status</span><span><Pill kind="info">Em trânsito</Pill></span></div>
              </div>
              <div className="info-card">
                <h3>Histórico</h3>
                <div className="timeline">
                  <div className="ev"><div className="when">26/04 · 09:14</div>Saiu de Salvador rumo a Itaqui.</div>
                  <div className="ev"><div className="when">25/04 · 17:02</div>Documentação aduaneira aprovada.</div>
                  <div className="ev"><div className="when">25/04 · 11:30</div>Lote conferido por Patrick N.</div>
                  <div className="ev"><div className="when">22/04 · 14:00</div>Romaneio criado.</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {modal && (
        <div className="scrim" onClick={(e)=>{if(e.target===e.currentTarget) setModal(false)}}>
          <div className="modal">
            <h3>Novo romaneio</h3>
            <p>Crie um novo romaneio. O número será gerado automaticamente.</p>
            <div className="form-row"><label>Cliente</label><select><option>Barry Callebaut · BR</option><option>FEMSA · MX</option></select></div>
            <div className="form-row"><label>Origem</label><input defaultValue="Salvador, BA" /></div>
            <div className="form-row"><label>Destino</label><input defaultValue="Lyon, FR" /></div>
            <div className="form-row"><label>Volume estimado (t)</label><input defaultValue="11.0" /></div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={submit}>Criar romaneio</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast">
          <div className="ok-mark">✓</div>
          <span>{toast}</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
