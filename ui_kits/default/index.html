<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anti-AI Design System · Templates</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="./components/base/_aa-btn.css" />
<link rel="stylesheet" href="./components/base/_aa-input.css" />
<link rel="stylesheet" href="./components/surfaces/_aa-card.css" />
<link rel="stylesheet" href="./components/navigation/_aa-sidebar.css" />
<link rel="stylesheet" href="./showcase/_token-editor.css" />
<style>
html,body{margin:0;padding:0;height:100%;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
*{box-sizing:border-box}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:inherit}
a{color:inherit;text-decoration:none}
#root{height:100%}

/* ===== LOGIN ===== */
.login-root{display:grid;grid-template-columns:1fr 1fr;min-height:100dvh}
@media(max-width:768px){.login-root{grid-template-columns:1fr}}
.login-brand{position:relative;background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;gap:32px;overflow:hidden;isolation:isolate}
@media(max-width:768px){.login-brand{display:none}}
.login-brand-logo{height:44px;width:auto;position:relative;z-index:2}
.login-brand-title{position:relative;z-index:2;font-family:var(--font-display);font-size:36px;font-weight:600;letter-spacing:-.02em;line-height:1.15;text-align:center;margin:0}
.login-brand-sub{position:relative;z-index:2;font-size:15px;opacity:.75;text-align:center;max-width:340px;line-height:1.6;margin:0}
.login-brand-badge{position:relative;z-index:2;display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;border:1px solid hsl(var(--sidebar-foreground)/.25);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;opacity:.85;background:hsl(var(--sidebar-foreground)/.04);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

/* Brand panel — animated background orbs (muda hue por template selecionado) */
.login-brand-orbs{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.55}
.login-brand-orbs::before,.login-brand-orbs::after{content:"";position:absolute;border-radius:50%;filter:blur(60px);transition:background 600ms,transform 800ms ease-out}
/* F-MO-002: cap ambient loops — 5 → 2 (orb-a + bf-1 only). orb-b static. */
.login-brand-orbs::before{width:380px;height:380px;background:hsl(var(--sidebar-decorative, var(--sidebar-indicator)));top:-120px;left:-100px;animation:orb-float-a 16s ease-in-out infinite}
.login-brand-orbs::after{width:320px;height:320px;background:hsl(var(--accent));bottom:-80px;right:-80px;opacity:.7}
@keyframes orb-float-a{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}}
@keyframes orb-float-b{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-40px) scale(.95)}}
.login-brand-grid{position:absolute;inset:0;z-index:1;opacity:.06;pointer-events:none;background-image:linear-gradient(hsl(var(--sidebar-foreground)) 1px,transparent 1px),linear-gradient(90deg,hsl(var(--sidebar-foreground)) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%)}

/* Floating template glyphs */
.brand-floats{position:absolute;inset:0;z-index:1;pointer-events:none}
.brand-float{position:absolute;color:hsl(var(--sidebar-foreground)/.12);transition:color 400ms,transform 400ms}
.brand-float svg{width:100%;height:100%}
/* F-MO-002: only bf-1 animates; bf-2/3 static to cap simultaneous loops at 2 */
.brand-float.bf-1{top:18%;left:12%;width:46px;height:46px;animation:bf-drift 12s ease-in-out infinite}
.brand-float.bf-2{top:62%;right:14%;width:54px;height:54px;opacity:.7}
.brand-float.bf-3{bottom:20%;left:20%;width:38px;height:38px;opacity:.5}
@keyframes bf-drift{0%,100%{transform:translate(0,0) rotate(0)}33%{transform:translate(8px,-12px) rotate(8deg)}66%{transform:translate(-6px,8px) rotate(-6deg)}}
.login-form-side{display:flex;align-items:center;justify-content:center;padding:32px;background:hsl(var(--background))}
.login-box{width:100%;max-width:420px;display:flex;flex-direction:column;gap:24px}
.login-box h2{font-family:var(--font-display);font-size:26px;font-weight:600;margin:0 0 4px}
.login-box p{font-size:13px;color:hsl(var(--muted-foreground));margin:0}

/* Template cards */
.tpl-cards{display:flex;flex-direction:column;gap:8px}
.tpl-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid hsl(var(--border));cursor:pointer;transition:border-color 150ms,background 150ms}
.tpl-card:hover{border-color:hsl(var(--primary)/.5);background:hsl(var(--muted)/.4)}
.tpl-card.selected{border-color:hsl(var(--primary));background:hsl(var(--primary)/.06)}
.tpl-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tpl-card-info{flex:1;min-width:0}
.tpl-card-name{font-size:13px;font-weight:600}
.tpl-card-desc{font-size:11.5px;color:hsl(var(--muted-foreground));margin-top:2px}
.tpl-cred{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));margin-top:4px;padding:3px 7px;border-radius:5px;background:hsl(var(--muted));width:fit-content}
.tpl-radio{width:18px;height:18px;border-radius:50%;border:2px solid hsl(var(--border));flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color 150ms}
.tpl-card.selected .tpl-radio{border-color:hsl(var(--primary))}
.tpl-radio-dot{width:8px;height:8px;border-radius:50%;background:hsl(var(--primary));opacity:0;transition:opacity 150ms}
.tpl-card.selected .tpl-radio-dot{opacity:1}

/* Form fields */
.field-group{display:flex;flex-direction:column;gap:6px}
.field-group label{font-size:12.5px;font-weight:500;color:hsl(var(--foreground))}
.field-input{padding:10px 14px;border-radius:10px;border:1.5px solid hsl(var(--border));background:hsl(var(--card));outline:none;width:100%;color:hsl(var(--foreground));transition:border-color 150ms,box-shadow 150ms;font-size:13px}
.field-input:focus{border-color:hsl(var(--primary));box-shadow:0 0 0 3px hsl(var(--primary)/.1)}
.forgot-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:-2px}
.forgot-link{font-size:12px;color:hsl(var(--accent));font-weight:500;cursor:pointer}
.forgot-link:hover{opacity:.8}
/* W1.2: .btn-login removida — substituida por aa-btn aa-btn--primary aa-btn--md aa-btn--full (canonical, F-INT-001) */
.err-msg{font-size:12px;color:hsl(var(--destructive));text-align:center;padding:8px 12px;background:hsl(var(--destructive)/.08);border-radius:8px}

/* ===== APP SHELL ===== */
.app-shell{display:grid;grid-template-columns:272px 1fr;height:100dvh;overflow:hidden;transition:grid-template-columns var(--motion-normal,200ms) var(--ease-out, cubic-bezier(0,0,.2,1))}
.app-shell.collapsed{grid-template-columns:68px 1fr}

/* ===== SIDEBAR (Wave 1b) — CSS migrado pra _aa-sidebar.css canonical ===== */
/* AppSidebar agora usa <Sidebar> componente. CSS classes .sidebar/.nav-*/.user-panel*
   removidas — substituidas pela hierarquia .aa-sidebar* no _aa-sidebar.css.
   UserMenu injeta proprio .aa-user-panel* CSS via id check.
   Mantido: .avatar standalone (usado pelo chat-thread linha 2235), nao em sidebar. */
.avatar{width:36px;height:36px;border-radius:50%;background:hsl(var(--accent)/.3);color:hsl(var(--sidebar-accent-foreground, var(--sidebar-foreground)));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:12px;border:1px solid hsl(var(--sidebar-accent-foreground, var(--sidebar-foreground))/.3);flex-shrink:0}

/* ===== MAIN ===== */
.main-area{display:flex;flex-direction:column;min-width:0;background:hsl(var(--background));overflow:auto}
.page-content{padding:28px 32px 40px;display:flex;flex-direction:column;gap:18px;width:100%}

/* ===== COMPONENTS reused inline ===== */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:4px}
.page-header-stack{display:flex;flex-direction:column;gap:4px}
.page-crumb{font-family:var(--font-mono);font-size:11px;color:hsl(var(--muted-foreground));text-transform:lowercase;letter-spacing:.06em}
.page-title{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;margin:0;line-height:1.15}
.page-sub{font-size:12.5px;color:hsl(var(--muted-foreground));margin:4px 0 0;max-width:580px;line-height:1.5}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:20px 22px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
.card-header{margin-bottom:14px}
.card-header h3{font-size:14px;font-weight:600;color:hsl(var(--foreground));margin:0}
.card-header p{font-size:12px;color:hsl(var(--muted-foreground));margin:3px 0 0}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
.kpi-label{font-size:11.5px;color:hsl(var(--muted-foreground));font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi-delta{font-family:var(--font-mono);font-size:11px;display:inline-flex;align-items:center;gap:3px}
.kpi-delta.up{color:hsl(var(--success))}
.kpi-delta.dn{color:hsl(var(--destructive))}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:hsl(var(--muted-foreground));padding:10px 16px;text-align:left;border-bottom:1px solid hsl(var(--border))}
.tbl td{padding:11px 16px;border-bottom:1px solid hsl(var(--border)/.6);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:hsl(var(--muted)/.4)}
.mono{font-family:var(--font-mono);font-size:11.5px}
.muted{color:hsl(var(--muted-foreground))}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:500}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill.ok{background:hsl(var(--success)/.12);color:hsl(var(--success))}
.pill.warn{background:hsl(var(--warning)/.18);color:hsl(35 85% 30%)}
.pill.err{background:hsl(var(--destructive)/.1);color:hsl(0 70% 40%)}
.pill.neutral{background:hsl(var(--muted));color:hsl(var(--muted-foreground))}
.pill.info{background:hsl(var(--info)/.12);color:hsl(var(--info))}

/* W1.2: .btn / .btn-primary / .btn-outline / .btn-sm / .btn-ghost / .btn-destructive removidas — substituidas por aa-btn (canonical, F-INT-001).
   App demo agora consome a mesma camada do showcase (F-INT-003). */

/* Settings color editor */
.token-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid hsl(var(--border));background:hsl(var(--card))}
.color-swatch{width:40px;height:40px;border-radius:8px;border:1px solid hsl(var(--border));cursor:pointer;overflow:hidden;position:relative;flex-shrink:0}
.color-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100%+8px);height:calc(100%+8px)}
.section-label-mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:hsl(var(--muted-foreground));margin:0 0 10px}

/* Profile */
.profile-avatar-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.profile-avatar{width:88px;height:88px;border-radius:50%;background:hsl(var(--primary)/.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:28px;font-weight:700;color:hsl(var(--primary));overflow:hidden;border:2px solid hsl(var(--border))}
.avatar-img{width:100%;height:100%;object-fit:cover}
.avatar-edit-btn{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:hsl(var(--card));border:1.5px solid hsl(var(--border));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px hsl(var(--foreground)/.1);color:hsl(var(--foreground));transition:background 150ms}
.avatar-edit-btn:hover{background:hsl(var(--muted))}
.avatar-upload-input{display:none}

/* Tabs (iter2 fix: indicator outside pattern + press anim — pega user-panel ::before vibe) */
.tabs-nav{display:flex;gap:2px;border-bottom:1px solid hsl(var(--border));margin-bottom:20px}
.tab-item{padding:10px 16px;font-size:13px;color:hsl(var(--muted-foreground));margin-bottom:-1px;cursor:pointer;transition:color 150ms,transform var(--motion-fast,150ms) var(--ease-out, cubic-bezier(0,0,.2,1));position:relative;background:none;border:none;font-family:inherit}
.tab-item:hover:not(.active){color:hsl(var(--foreground))}
.tab-item:active{transform:scale(0.97)}
.tab-item.active{color:hsl(var(--foreground));font-weight:500}
.tab-item.active::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:3px;background:hsl(var(--ring));border-radius:3px 3px 0 0}

/* Custom scrollbar (iter2 fix — substitui scroll padrão feio) */
*::-webkit-scrollbar{height:8px;width:8px}
*::-webkit-scrollbar-track{background:hsl(var(--muted) / .3);border-radius:4px}
*::-webkit-scrollbar-thumb{background:hsl(var(--muted-foreground) / .35);border-radius:4px;transition:background 150ms}
*::-webkit-scrollbar-thumb:hover{background:hsl(var(--muted-foreground) / .55)}
* {scrollbar-width:thin;scrollbar-color:hsl(var(--muted-foreground) / .35) hsl(var(--muted) / .3)}

/* Kanban scroll combo (Wave 12.1): scrollbar fina + gradient mask + arrows + indicator */
.kanban-wrap{position:relative}
.kanban-scroll::-webkit-scrollbar{height:4px}
.kanban-scroll::-webkit-scrollbar-track{background:transparent}
.kanban-scroll::-webkit-scrollbar-thumb{background:hsl(var(--muted-foreground) / .2);border-radius:2px;transition:background 150ms}
.kanban-wrap:hover .kanban-scroll::-webkit-scrollbar-thumb{background:hsl(var(--muted-foreground) / .4)}
.kanban-scroll::-webkit-scrollbar-thumb:hover{background:hsl(var(--muted-foreground) / .6)}
.kanban-scroll{scrollbar-width:thin;scrollbar-color:hsl(var(--muted-foreground) / .2) transparent;scroll-behavior:smooth}
.kanban-fade{position:absolute;top:0;bottom:14px;width:32px;pointer-events:none;z-index:2;opacity:0;transition:opacity 200ms var(--ease-out, cubic-bezier(0,0,.2,1))}
.kanban-fade.visible{opacity:1}
.kanban-fade-l{left:0;background:linear-gradient(to right, hsl(var(--background)) 0%, hsl(var(--background) / 0) 100%)}
.kanban-fade-r{right:0;background:linear-gradient(to left, hsl(var(--background)) 0%, hsl(var(--background) / 0) 100%)}
.kanban-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:32px;height:32px;border-radius:999px;background:hsl(var(--card));border:1px solid hsl(var(--border));color:hsl(var(--foreground));display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px hsl(var(--foreground) / .08);transition:opacity 200ms,transform 150ms,background 150ms;opacity:0;pointer-events:none}
.kanban-arrow.visible{opacity:1;pointer-events:auto}
.kanban-arrow:hover{background:hsl(var(--muted));transform:translateY(-50%) scale(1.06)}
.kanban-arrow:active{transform:translateY(-50%) scale(.94)}
.kanban-arrow-l{left:-6px}
.kanban-arrow-r{right:-6px}
.kanban-indicator{position:absolute;bottom:-2px;right:0;display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground));padding:2px 6px;border-radius:999px;background:hsl(var(--card));border:1px solid hsl(var(--border));z-index:2}
.kanban-indicator-dot{width:4px;height:4px;border-radius:999px;background:hsl(var(--muted-foreground) / .3);transition:background 200ms,transform 200ms}
.kanban-indicator-dot.active{background:hsl(var(--primary));transform:scale(1.4)}

/* Danger zone */
.danger-zone{border-top:1px solid hsl(var(--destructive)/.3);padding-top:20px;margin-top:4px}
/* D2: @keyframes btn-spin removido — login spinner agora usa aa-btn-spin de _aa-btn.css. */

/* PromptEditor preview — markdown rendered (iter3) */
.prompt-preview h1,.prompt-preview h2,.prompt-preview h3{font-weight:600;margin:8px 0 4px;line-height:1.2}
.prompt-preview h1{font-size:18px}
.prompt-preview h2{font-size:16px}
.prompt-preview h3{font-size:14px}
.prompt-preview p{margin:6px 0}
.prompt-preview strong{font-weight:600;color:hsl(var(--foreground))}
.prompt-preview em{font-style:italic}
.prompt-preview code{font-family:var(--font-mono);font-size:12px;background:hsl(var(--muted));padding:1px 5px;border-radius:4px}
.prompt-preview pre{background:hsl(var(--card));padding:10px 12px;border-radius:8px;border:1px solid hsl(var(--border));overflow-x:auto;font-size:12px;line-height:1.5}
.prompt-preview a{color:hsl(var(--primary));text-decoration:underline}
.prompt-preview ul,.prompt-preview ol{padding-left:20px;margin:6px 0}
.prompt-preview li{margin:2px 0}
.prompt-preview blockquote{border-left:3px solid hsl(var(--accent));padding-left:10px;color:hsl(var(--muted-foreground));margin:8px 0}


/* ===== REFLOW (Skill #1 audit A3 — WCAG 1.4.10 320 CSS px) ===== */
@media (max-width:640px){
  .page-content{padding:16px 14px 32px;gap:14px}
  .page-header{flex-direction:column;align-items:flex-start;gap:8px}
  .page-header-stack{min-width:0;width:100%}
  .page-title{font-size:24px;line-height:1.2;word-break:break-word}
  .page-sub{word-break:break-word}
  .kpis{grid-template-columns:1fr;gap:10px}
  .kpi{padding:14px 16px}
  .kpi-value{font-size:22px}
  /* Grids inline 1fr 1fr quebram em 1col */
  .page-content > div[style*="grid-template-columns"]{grid-template-columns:1fr !important}
}
@media (max-width:380px){
  .page-content{padding:12px 10px 24px}
  .card{padding:14px 16px;border-radius:14px}
}
</style>
</head>
<body class="preset-base">
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/brand/Logo.jsx"></script>
<script type="text/babel" src="components/base/ToggleGroup.jsx"></script>
<script type="text/babel" src="components/display/Drawer.jsx"></script>
<script type="text/babel" src="components/display/Dialog.jsx"></script>
<script type="text/babel" src="components/navigation/UserMenu.jsx"></script>
<script type="text/babel" src="components/navigation/Sidebar.jsx"></script>
<script type="text/babel" src="components/showcase/TokenEditorPreview.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Reduced motion hook (F-RP-012 / WCAG 2.2.2) ─────────────────
const useReducedMotion = () => {
  const [reduced, setReduced] = useState(
    () => window.matchMedia("(prefers-reduced-motion: reduce)").matches
  );
  useEffect(() => {
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    const handler = (e) => setReduced(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return reduced;
};

// ─── Icons ────────────────────────────────────────────────────────
const ic = (d) => ({ size = 16, ...p } = {}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}>
    {d.map((x, i) => <path key={i} d={x} />)}
  </svg>
);
const I = {
  Menu:        ic(["M3 12h18","M3 6h18","M3 18h18"]),
  ChevronLeft: ic(["m15 18-6-6 6-6"]),

// ─── Color utils ─────────────────────────────────────────────────
const hexToRgb = (hex) => {
  const h = hex.replace("#", "");
  const n = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  return [parseInt(n.slice(0,2),16), parseInt(n.slice(2,4),16), parseInt(n.slice(4,6),16)];
};
const rgbToHex = (r,g,b) => "#"+[r,g,b].map((v)=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0")).join("");
const rgbToHsl = (r,g,b) => {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0, s=0; const l=(max+min)/2;
  if(max!==min){ const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; case b: h=(r-g)/d+4; break; }
    h*=60; }
  return [Math.round(h),Math.round(s*100),Math.round(l*100)];
};
const hslToRgb = (h,s,l) => {
  s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs(((h/60)%2)-1)), m=l-c/2;
  let [r,g,b]=[0,0,0];
  if(h<60)[r,g,b]=[c,x,0]; else if(h<120)[r,g,b]=[x,c,0]; else if(h<180)[r,g,b]=[0,c,x];
  else if(h<240)[r,g,b]=[0,x,c]; else if(h<300)[r,g,b]=[x,0,c]; else [r,g,b]=[c,0,x];
  return [(r+m)*255,(g+m)*255,(b+m)*255];
};
const hexToHslStr = (hex) => { const [r,g,b]=hexToRgb(hex); const [h,s,l]=rgbToHsl(r,g,b); return `${h} ${s}% ${l}%`; };
const hslStrToHex = (str) => {
  const m=String(str).trim().match(/^(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)%\s+(\d+(?:\.\d+)?)%/);
  if(!m) return "#000000";
  const [r,g,b]=hslToRgb(parseFloat(m[1]),parseFloat(m[2]),parseFloat(m[3]));
  return rgbToHex(r,g,b);
};
const relLum = (r,g,b) => [r,g,b].map(v=>{ v/=255; return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4); }).reduce((s,v,i)=>s+[0.2126,0.7152,0.0722][i]*v, 0);
const contrast = (h1,h2) => { const l1=relLum(...hexToRgb(h1)), l2=relLum(...hexToRgb(h2)); return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05); };
const getCssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

function LoginScreen({ onLogin }) {
  const [selected, setSelected] = useState("ops");
  const [email, setEmail] = useState(TEMPLATES.ops.email);
  const [password, setPassword] = useState(TEMPLATES.ops.password);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const selectTemplate = (key) => {
    setSelected(key);
    setEmail(TEMPLATES[key].email);
    setPassword(TEMPLATES[key].password);
    setError(null);
  };

  const handleLogin = (e) => {
    e.preventDefault();
    setError(null);
    setLoading(true);
    setTimeout(() => {
      const tpl = Object.entries(TEMPLATES).find(([, t]) => t.email === email.trim());
      if (tpl && password === tpl[1].password) {
        onLogin({ templateKey: tpl[0] });
      } else {
        setError("Email ou senha inválidos. Use as credenciais de um dos templates.");
        setLoading(false);
      }
    }, 600);
  };

  // Aplica preset de cores do template selecionado em tempo real (preview)
  useEffect(() => {
    const preset = COLOR_PRESETS[TEMPLATES[selected]?.presetKey];
    if (!preset) return;
    Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [selected]);

  const SelTplIcon = TEMPLATES[selected]?.IconCmp || I.BarChart;

/* Telemetria IA — observability panel pra CRMs c/ IA conversacional (inspirado ia-da-plus).
   Count-up animation entry (iter3 fix). */
function CountUpNumber({ value, prefix = "", suffix = "", duration = 1000 }) {
  const [displayed, setDisplayed] = useState(0);
  useEffect(() => {
    let raf, start;
    const animate = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      // ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplayed(value * eased);
      if (progress < 1) raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  // Format: integer pra valores >= 100, 1 decimal pra < 100
  const fmt = displayed >= 100 ? Math.round(displayed) : displayed.toFixed(1);
  return <>{prefix}{fmt}{suffix}</>;
}

function PipelineTrendChart() {
  // 12 meses de volume (R$k)
  const data = [180, 215, 205, 240, 260, 275, 245, 290, 310, 305, 340, 352];
  const labels = ["J","F","M","A","M","J","J","A","S","O","N","D"];
  const W = 360, H = 140, P = 24;
  const max = Math.max(...data), min = Math.min(...data);
  const xStep = (W - P*2) / (data.length - 1);
  const points = data.map((v, i) => {
    const x = P + i * xStep;
    const y = H - P - ((v - min) / (max - min)) * (H - P*2);
    return [x, y];
  });
  const path = points.map(([x,y], i) => `${i===0?"M":"L"} ${x} ${y}`).join(" ");
  // Area fill
  const area = `${path} L ${points[points.length-1][0]} ${H - P} L ${P} ${H - P} Z`;
  return (
    <div className="card" style={{ padding:0 }}>
      <div style={{ padding:"16px 20px" }}>
        <h3 style={{ fontSize:14,fontWeight:600,margin:0 }}>Volume mensal</h3>
        <p style={{ fontSize:12,color:"hsl(var(--muted-foreground))",marginTop:2,marginBottom:0 }}>Pipeline R$k últimos 12 meses</p>
      </div>
      <div style={{ padding:"4px 20px 20px" }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display:"block" }} aria-label="Tendência mensal">
          <defs>
            <linearGradient id="trendFill" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%"   stopColor="hsl(var(--accent))" stopOpacity="0.35"/>
              <stop offset="100%" stopColor="hsl(var(--accent))" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {/* gridlines horizontais */}
          {[0, 0.5, 1].map(t => {
            const y = P + t * (H - P*2);
            return <line key={t} x1={P} x2={W-P} y1={y} y2={y} stroke="hsl(var(--border))" strokeDasharray="2 3" strokeWidth="1"/>;
          })}
          <path d={area} fill="url(#trendFill)" />
          <path d={path} fill="none" stroke="hsl(var(--accent))" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {points.map(([x,y], i) => (
            <circle key={i} cx={x} cy={y} r={i === points.length-1 ? 4 : 2.5}
              fill="hsl(var(--background))" stroke="hsl(var(--accent))" strokeWidth="2"/>
          ))}
          {labels.map((l, i) => (
            <text key={i} x={P + i * xStep} y={H - 6} fontSize="9" textAnchor="middle"
              fill="hsl(var(--muted-foreground))" fontFamily="var(--font-mono)">{l}</text>
          ))}
        </svg>
      </div>
    </div>
  );
}

      <div style={{ display:"flex", alignItems:"center", border:"1.5px solid hsl(var(--border))", borderRadius:8, overflow:"hidden", width:"fit-content" }}>
        <button className="aa-btn aa-btn--ghost aa-btn--md" onClick={() => onChange(Math.max(min, value-step))}
          style={{ padding:"6px 10px", borderRadius:0, borderRight:"1px solid hsl(var(--border))" }}>−</button>
        <span style={{ padding:"6px 14px", fontFamily:"var(--font-mono)", fontSize:13, minWidth:40, textAlign:"center" }}>{value}</span>
        <button className="aa-btn aa-btn--ghost aa-btn--md" onClick={() => onChange(Math.min(max, value+step))}
          style={{ padding:"6px 10px", borderRadius:0, borderLeft:"1px solid hsl(var(--border))" }}>+</button>
      </div>
    </div>
  );
}

function RadioGroup({ name, options, value, onChange }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      {options.map(opt => (
        <label key={opt.value} style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", fontSize:13 }}>
          <div onClick={() => onChange(opt.value)} style={{
            width:16, height:16, borderRadius:"50%", border:`1.5px solid ${value===opt.value?"hsl(var(--primary))":"hsl(var(--border))"}`,

          }}>
            {value===opt.value && <div style={{ width:8, height:8, borderRadius:"50%", background:"hsl(var(--primary))" }} />}
          </div>
          <span>{opt.label}</span>
          {opt.desc && <span style={{ fontSize:11, color:"hsl(var(--muted-foreground))" }}>{opt.desc}</span>}
        </label>
      ))}
    </div>
  );
}

function TextareaField({ value, onChange, placeholder, rows=4, label }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      {label && <label style={{ fontSize:12, fontWeight:500 }}>{label}</label>}
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{ padding:"10px 12px", borderRadius:10, border:"1.5px solid hsl(var(--border))", background:"hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:13, fontFamily:"var(--font-body)", resize:"vertical", outline:"none", lineHeight:1.6, transition:"border-color 150ms" }}

        onBlur={e => e.target.style.borderColor = "hsl(var(--border))"} />
    </div>
  );
}

function RomaneiosPage() {
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [transFilter, setTransFilter] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [page, setPage] = useState(1);
  const [drawer, setDrawer] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(false);
  const [loadingRows, setLoadingRows] = useState(false);
  const PER_PAGE = 5;

  const transportadoras = [...new Set(ROMANEIOS_ALL.map(r => r.trans))];

  const filtered = ROMANEIOS_ALL.filter(r => {
    const matchSearch = !search || r.id.toLowerCase().includes(search.toLowerCase()) || r.trans.toLowerCase().includes(search.toLowerCase());
    const matchStatus = !statusFilter || r.status === statusFilter;
    const matchTrans = !transFilter || r.trans === transFilter;
    return matchSearch && matchStatus && matchTrans;
  });

  const pageRows = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const allPageSelected = pageRows.length > 0 && pageRows.every(r => selected.has(r.id));

  const toggleAll = () => {
    const next = new Set(selected);
    if (allPageSelected) pageRows.forEach(r => next.delete(r.id));
    else pageRows.forEach(r => next.add(r.id));
    setSelected(next);
  };

  const toggleRow = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };

  const handleFilterChange = () => { setPage(1); };

  const simulateReload = () => {
    setLoadingRows(true);
    setTimeout(() => setLoadingRows(false), 1200);
  };

    <div className="page-content">
      <Breadcrumb items={["Ops", "Operação", "Romaneios"]} />

          <SelectField value={transFilter} onChange={v => { setTransFilter(v); handleFilterChange(); }}

            <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => { setSearch(""); setStatusFilter(""); setTransFilter(""); setPage(1); }}>

        <div className="card" style={{ padding:"20px 18px", display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>

      {/* Drawer detalhe */}
      <Drawer open={!!drawer} onClose={() => setDrawer(null)} title={`Romaneio ${drawer?.id}`}>
        {drawer && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <span className={`pill ${drawer.status}`}><span className="dot"/>{drawer.label}</span>
            </div>
            <div className="card" style={{ padding:"14px 16px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[["Transportadora", drawer.trans], ["Data", drawer.date], ["Itens", drawer.itens], ["Valor total", drawer.valor]].map(([l,v]) => (
                  <div key={l}><div style={{ fontSize:11, color:"hsl(var(--muted-foreground))", marginBottom:2 }}>{l}</div><div style={{ fontSize:13, fontWeight:500 }}>{v}</div></div>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:600, marginBottom:8 }}>Progresso de conferência</div>
              <ProgressBar value={drawer.status==="ok"?100:drawer.status==="info"?60:drawer.status==="warn"?20:0} />
              <div style={{ fontSize:11, color:"hsl(var(--muted-foreground))", marginTop:4 }}>
                {drawer.status==="ok"?"Conferência completa":drawer.status==="info"?"Em andamento":drawer.status==="warn"?"Aguardando início":"Divergência detectada"}

            </div>

            <div style={{ display:"flex", gap:8 }}>
              <button className="aa-btn aa-btn--primary aa-btn--sm" style={{ flex:1 }} onClick={() => setDrawer(null)}>Salvar observações</button>
              <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => setDrawer(null)}>Fechar</button>
            </div>
          </div>
        )}
      </Drawer>

      {/* Dialog confirmação exclusão */}
      <Dialog open={confirmDialog} onClose={() => setConfirmDialog(false)} title="Confirmar exclusão">
        <p style={{ fontSize:14, color:"hsl(var(--muted-foreground))", marginBottom:20, lineHeight:1.6 }}>
          Você está prestes a excluir <strong style={{ color:"hsl(var(--foreground))" }}>{selected.size} romaneios</strong>. Esta ação é irreversível.
        </p>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={() => setConfirmDialog(false)}>Cancelar</button>
          <button className="aa-btn aa-btn--destructive aa-btn--sm" onClick={() => { setSelected(new Set()); setConfirmDialog(false); }}>
            <I.Trash2 size={13}/> Confirmar exclusão
          </button>
        </div>
      </Dialog>
    </div>
  );
}

/* FilterBar — pattern CRM completo: active chips + popover trigger + saved views + quick toggles.
   Inspirado HubSpot + Salesforce + Pipedrive. Reusable inline. */
function FilterChip({ label, value, onRemove, color = "primary" }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 4px 4px 10px", borderRadius:999,
      background:`hsl(var(--${color}) / .12)`, color:`hsl(var(--${color}))`, border:`1px solid hsl(var(--${color}) / .25)`,
      fontSize:12, fontWeight:500 }}>
      <span style={{ fontFamily:"var(--font-mono)", opacity:.7, fontSize:11 }}>{label}:</span>
      <span>{value}</span>
      {onRemove && (
        <button type="button" onClick={onRemove} aria-label={`Remover filtro ${label}`}
          style={{ width:18, height:18, borderRadius:"50%", border:"none", background:"transparent", cursor:"pointer",
            color:`hsl(var(--${color}))`, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:13, lineHeight:1, padding:0 }}>×</button>
      )}
    </span>
  );
}

function FilterBar({ search, setSearch, filters, setFilters, savedViews, activeView, setActiveView, options, placeholder = "Buscar…" }) {
  const [popoverOpen, setPopoverOpen] = useState(false);
  const activeFilters = Object.entries(filters || {}).filter(([_, v]) => v && (Array.isArray(v) ? v.length > 0 : true));
  const removeFilter = (key) => setFilters({ ...filters, [key]: Array.isArray(filters[key]) ? [] : "" });
  const clearAll = () => { setFilters(Object.fromEntries(Object.keys(filters).map(k => [k, Array.isArray(filters[k]) ? [] : ""]))); setSearch(""); };
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
        {/* Saved views tabs */}
        {savedViews && savedViews.length > 0 && (
          <div style={{ display:"flex", gap:2, padding:2, background:"hsl(var(--muted) / .5)", borderRadius:8, border:"1px solid hsl(var(--border))" }}>
            {savedViews.map(v => (
              <button key={v.value} type="button" onClick={() => setActiveView(v.value)}
                style={{ padding:"5px 10px", borderRadius:6, fontSize:11, fontWeight:500, border:"none", cursor:"pointer", fontFamily:"inherit",
                  background: activeView===v.value ? "hsl(var(--card))" : "transparent",
                  color: activeView===v.value ? "hsl(var(--foreground))" : "hsl(var(--muted-foreground))",
                  boxShadow: activeView===v.value ? "0 1px 2px hsl(var(--foreground)/.08)" : "none" }}>{v.label} <span style={{ opacity:.6, fontFamily:"var(--font-mono)", fontSize:10 }}>{v.count}</span></button>
            ))}
          </div>
        )}
        {/* Search */}
        <input type="search" placeholder={placeholder} aria-label="Buscar" value={search} onChange={e => setSearch(e.target.value)}
          style={{ flex:"1 1 240px", minWidth:0, padding:"8px 12px", borderRadius:8, border:"1px solid hsl(var(--border))", background:"hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:13, outline:"none" }} />
        {/* Filter button */}
        <button type="button" onClick={() => setPopoverOpen(!popoverOpen)}
          style={{ padding:"8px 12px", borderRadius:8, border:"1px solid hsl(var(--border))", background: popoverOpen ? "hsl(var(--muted))" : "hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:12, fontWeight:500, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:6, fontFamily:"inherit" }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          Filtros{activeFilters.length > 0 && <span style={{ padding:"1px 6px", borderRadius:999, background:"hsl(var(--primary))", color:"hsl(var(--primary-foreground))", fontSize:10, fontFamily:"var(--font-mono)" }}>{activeFilters.length}</span>}
        </button>
      </div>
      {/* Active chips */}
      {activeFilters.length > 0 && (
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
          {activeFilters.map(([key, val]) => (
            <FilterChip key={key} label={options?.[key]?.label || key} value={Array.isArray(val) ? val.join(", ") : val} onRemove={() => removeFilter(key)} />
          ))}
          <button type="button" onClick={clearAll} style={{ background:"none", border:"none", color:"hsl(var(--muted-foreground))", cursor:"pointer", fontSize:11, textDecoration:"underline", fontFamily:"inherit" }}>Limpar tudo</button>
        </div>
      )}
      {/* Filter popover (drawer pra mobile) */}
      {popoverOpen && (
        <div role="dialog" aria-label="Filtros avançados" style={{ position:"absolute", marginTop:48, right:0, zIndex:30, width:320, padding:16, borderRadius:12, border:"1px solid hsl(var(--border))", background:"hsl(var(--card))", boxShadow:"0 8px 24px hsl(var(--foreground)/.15)" }}>
          <div style={{ fontSize:12, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Filtros avançados</div>
          {Object.entries(options || {}).map(([key, opt]) => (
            <div key={key} style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:500, marginBottom:6 }}>{opt.label}</div>
              {opt.type === "checkbox" ? (
                <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  {opt.values.map(v => {
                    const arr = Array.isArray(filters[key]) ? filters[key] : [];
                    const checked = arr.includes(v);
                    return (
                      <label key={v} style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, cursor:"pointer", padding:"4px 6px", borderRadius:6 }}>
                        <input type="checkbox" checked={checked} onChange={() => setFilters({ ...filters, [key]: checked ? arr.filter(x=>x!==v) : [...arr, v] })} />
                        {v}
                      </label>
                    );
                  })}
                </div>
              ) : (
                <select value={filters[key] || ""} onChange={e => setFilters({ ...filters, [key]: e.target.value })}
                  style={{ width:"100%", padding:"6px 10px", borderRadius:6, border:"1px solid hsl(var(--border))", background:"hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:12 }}>
                  <option value="">Todos</option>
                  {opt.values.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              )}
            </div>
          ))}
          <div style={{ display:"flex", gap:6, marginTop:12, paddingTop:10, borderTop:"1px solid hsl(var(--border))" }}>
            <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={clearAll}>Limpar</button>
            <button className="aa-btn aa-btn--primary aa-btn--sm" style={{ flex:1 }} onClick={() => setPopoverOpen(false)}>Aplicar</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CenarioPill({ letter }) {
  if (!letter) return null;
  const color = CENARIO_COLOR[letter] || "muted-foreground";
  return (
    <span title={`Cenário ${letter} — ${CENARIO_LABEL[letter] || ""}`}
      style={{ fontFamily:"var(--font-mono)", fontSize:11, fontWeight:600, padding:"2px 7px", borderRadius:6,
        background:`hsl(var(--${color}) / .15)`, color:`hsl(var(--${color}))`, border:`1px solid hsl(var(--${color}) / .3)` }}>
      {letter}
    </span>
  );
}

function RelatoriosPage() {
  const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const cur = [180, 215, 205, 240, 260, 275, 245, 290, 310, 305, 340, 352];
  const prev = [140, 165, 175, 195, 210, 220, 215, 245, 270, 265, 295, 305];
  const W = 720, H = 240, P = 32;
  const all = [...cur, ...prev];
  const max = Math.max(...all), min = Math.min(...all);
  const xStep = (W - P*2) / (cur.length - 1);
  const lineFor = (data) => data.map((v, i) => {
    const x = P + i * xStep;
    const y = H - P - ((v - min) / (max - min)) * (H - P*2);
    return [x, y];
  });
  const ptsCur = lineFor(cur);
  const ptsPrev = lineFor(prev);
  const path = (pts) => pts.map(([x,y], i) => `${i===0?"M":"L"} ${x} ${y}`).join(" ");
  const winRate = [42, 48, 51, 56, 60, 64, 62, 67, 71, 68, 70, 68];
  const conversionByOrigin = [
    { lbl:"Inbound",   pct:68, color:"hsl(var(--success))" },
    { lbl:"Outbound",  pct:42, color:"hsl(var(--accent))" },
    { lbl:"Indicação", pct:75, color:"hsl(var(--info))" },
    { lbl:"Evento",    pct:38, color:"hsl(var(--warning))" },
  ];
  // Skill #4 audit F1: entry animation
  const [mounted, setMounted] = useState(false);

          <div key={l} className="kpi">
            <div className="kpi-label">{l}</div>
            <div className="kpi-value" style={{ fontSize:"var(--text-xl)" }}>{v}</div>
            <span className={`kpi-delta ${d}`}>{pct}</span>
          </div>
        ))}
      </div>
      <div className="card" style={{ padding:0 }}>
        <div style={{ padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div>
            <h3 style={{ fontSize:14,fontWeight:600,margin:0 }}>Receita: 2025 vs 2024</h3>
            <p style={{ fontSize:12,color:"hsl(var(--muted-foreground))",marginTop:2,marginBottom:0 }}>Volume mensal R$k</p>
          </div>
          <div style={{ display:"flex", gap:14, fontSize:11, fontFamily:"var(--font-mono)" }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}><span style={{ width:12, height:2, background:"hsl(var(--accent))" }}/> 2025</span>
            <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}><span style={{ width:12, height:2, background:"hsl(var(--muted-foreground))", opacity:.5 }}/> 2024</span>
          </div>
        </div>
        <div style={{ padding:"4px 20px 20px" }}>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display:"block" }} aria-label="Tendência receita">
            {[0, 0.25, 0.5, 0.75, 1].map(t => {
              const y = P + t * (H - P*2);
              return <line key={t} x1={P} x2={W-P} y1={y} y2={y} stroke="hsl(var(--border))" strokeDasharray="2 3" strokeWidth="1"/>;
            })}
            <path d={path(ptsPrev)} fill="none" stroke="hsl(var(--muted-foreground))" strokeOpacity=".5" strokeWidth="2" strokeDasharray="4 3" strokeLinecap="round"/>
            <path d={path(ptsCur)}  fill="none" stroke="hsl(var(--accent))" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            {ptsCur.map(([x,y], i) => (
              <circle key={i} cx={x} cy={y} r={i === ptsCur.length-1 ? 5 : 3}
                fill="hsl(var(--background))" stroke="hsl(var(--accent))" strokeWidth="2"/>
            ))}
            {months.map((l, i) => (
              <text key={i} x={P + i * xStep} y={H - 8} fontSize="10" textAnchor="middle"
                fill="hsl(var(--muted-foreground))" fontFamily="var(--font-mono)">{l}</text>
            ))}
          </svg>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
        <div className="card" style={{ padding:0 }}>
          <div style={{ padding:"16px 20px" }}>
            <h3 style={{ fontSize:14,fontWeight:600,margin:0 }}>Win rate mensal</h3>

          <div style={{ padding:"4px 20px 20px" }}>
            <svg viewBox="0 0 360 140" width="100%" height="140" style={{ display:"block" }}>
              {winRate.map((v, i) => {
                const bw = (360 - 48) / winRate.length;
                const x = 24 + i * bw;
                const h = (v / 100) * 100;
                const y = 130 - h;
                return (
                  <g key={i}>
                    <rect x={x+1} y={y} width={bw - 2} height={h} fill="hsl(var(--accent))" rx="2" opacity={i === winRate.length-1 ? 1 : 0.7}/>
                    {i % 2 === 0 && <text x={x + bw/2} y="138" fontSize="9" textAnchor="middle" fill="hsl(var(--muted-foreground))" fontFamily="var(--font-mono)">{months[i]}</text>}

        <div className="card" style={{ padding:0 }}>

          </div>
          <div style={{ padding:"4px 20px 20px", display:"flex", flexDirection:"column", gap:14 }}>
            {conversionByOrigin.map(s => (
              <div key={s.lbl}>

                  <span style={{ color:"hsl(var(--foreground))", fontWeight:500 }}>{s.lbl}</span>

  );
}

/* PromptEditor — drawer com editor markdown + preview switch (marked.js).
   Inspirado ia-da-plus mas melhorado: split-view OR toggle, render real, atalhos. */
function PromptEditor({ prompt, onClose }) {
  const [view, setView] = useState("editor"); // "editor" | "preview" | "split"
  const [body, setBody] = useState(prompt?.body || "");
  const [titulo, setTitulo] = useState(prompt?.titulo || "");
  useEffect(() => {
    setBody(prompt?.body || "");
    setTitulo(prompt?.titulo || "");
  }, [prompt?.id]);
  if (!prompt) return null;
  const renderMd = (md) => {
    try {
      return window.marked ? window.marked.parse(md, { breaks:true }) : md.replace(/\n/g, "<br>");
    } catch { return md; }
  };
  const renderedHtml = renderMd(body);
  return (
    <Drawer open={!!prompt} onClose={onClose} title={`Editar prompt — ${prompt.id}`} width={720}>
      <div style={{ display:"flex", flexDirection:"column", gap:14, height:"100%" }}>
        <div>
          <label style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".04em", color:"hsl(var(--muted-foreground))", display:"block", marginBottom:6 }}>Título</label>
          <input type="text" value={titulo} onChange={e => setTitulo(e.target.value)} aria-label="Título do prompt"
            style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1px solid hsl(var(--border))", background:"hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:13, outline:"none" }} />
        </div>
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <label style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".04em", color:"hsl(var(--muted-foreground))" }}>Body (Markdown)</label>
            <div style={{ display:"flex", gap:2, padding:2, background:"hsl(var(--muted) / .5)", borderRadius:8, border:"1px solid hsl(var(--border))" }}>
              {[["editor","Editor"],["preview","Preview"],["split","Split"]].map(([k,l]) => (
                <button key={k} type="button" onClick={() => setView(k)}
                  style={{ padding:"4px 10px", borderRadius:6, fontSize:11, fontWeight:500, border:"none", cursor:"pointer", fontFamily:"inherit", transition:"background 120ms",
                    background: view===k ? "hsl(var(--card))" : "transparent",
                    color: view===k ? "hsl(var(--foreground))" : "hsl(var(--muted-foreground))",
                    boxShadow: view===k ? "0 1px 2px hsl(var(--foreground)/.08)" : "none" }}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns: view==="split" ? "1fr 1fr" : "1fr", gap:10, minHeight:280 }}>
            {(view === "editor" || view === "split") && (
              <textarea value={body} onChange={e => setBody(e.target.value)} aria-label="Body markdown"
                style={{ width:"100%", minHeight:280, padding:"12px 14px", borderRadius:10, border:"1px solid hsl(var(--border))", background:"hsl(var(--card))", color:"hsl(var(--foreground))", fontSize:13, fontFamily:"var(--font-mono)", lineHeight:1.6, outline:"none", resize:"vertical" }} />
            )}
            {(view === "preview" || view === "split") && (
              <div className="prompt-preview" dangerouslySetInnerHTML={{ __html: renderedHtml }}
                style={{ minHeight:280, padding:"14px 16px", borderRadius:10, border:"1px solid hsl(var(--border))", background:"hsl(var(--muted) / .35)", color:"hsl(var(--foreground))", fontSize:13, lineHeight:1.6, overflow:"auto" }} />
            )}
          </div>
          <div style={{ display:"flex", gap:6, marginTop:8, fontSize:11, color:"hsl(var(--muted-foreground))", flexWrap:"wrap" }}>
            <span style={{ fontFamily:"var(--font-mono)" }}>Vars: {`{{nome}}`} {`{{empresa}}`} {`{{valor}}`}</span>
            <span>·</span>
            <span>Markdown: **bold**, *italic*, `code`, [link](url), # heading</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginTop:"auto", paddingTop:12, borderTop:"1px solid hsl(var(--border))" }}>
          <button className="aa-btn aa-btn--primary aa-btn--sm" onClick={onClose} style={{ flex:1 }}>Salvar</button>
          <button className="aa-btn aa-btn--outline aa-btn--sm" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </Drawer>
  );
}

  { id:"ART-0064", titulo:"Roadmap do produto Q2 2024",        cat:"Produto",     autor:"Mariana Costa",  views:1100, status:"ok",   label:"Publicado",  tags:["produto","roadmap"] },
];
const ARTICLE_CATS = ["Processos","Técnico","Compliance","Vendas","Financeiro","Produto"];

function ArticlesPage() {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [selectedCats, setSelectedCats] = useState(new Set());
  const [sortBy, setSortBy] = useState("views");
  const [page, setPage] = useState(1);
  const [loading, setLoading] = useState(false);
  const PER_PAGE = 4;

  const toggleCat = (cat) => {
    const next = new Set(selectedCats);
    next.has(cat) ? next.delete(cat) : next.add(cat);
    setSelectedCats(next);
    setPage(1);
  };

  const filtered = ARTICLES_ALL.filter(a => {
    const matchSearch = !search || a.titulo.toLowerCase().includes(search.toLowerCase()) || a.tags.some(t => t.includes(search.toLowerCase()));
    const matchCat = selectedCats.size === 0 || selectedCats.has(a.cat);
    const matchStatus = !statusFilter || a.status === statusFilter;
    return matchSearch && matchCat && matchStatus;
  }).sort((a,b) => sortBy === "views" ? b.views-a.views : a.titulo.localeCompare(b.titulo));

  const pageRows = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const simulateSearch = (v) => {
    setSearch(v);
    setLoading(true);
    setPage(1);
    setTimeout(() => setLoading(false), 400);
  };

  return (
    <div className="page-content">
      <Breadcrumb items={["Wiki", "Conteúdo", "Artigos"]} />
      <div className="page-header">
        <div className="page-header-stack">
          <h2 className="page-title">Base de Conhecimento</h2>
          <p className="page-sub">Encontre artigos, guias e políticas internas. {ARTICLES_ALL.length} documentos publicados.</p>
        </div>
        <div className="page-actions">
          <button className="aa-btn aa-btn--primary aa-btn--sm"><I.Plus size={13}/> Novo artigo</button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"220px 1fr", gap:18, alignItems:"start" }}>
        {/* Sidebar filtros */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div className="card" style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Categorias</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {ARTICLE_CATS.map(cat => (
                <Checkbox key={cat} checked={selectedCats.has(cat)} onChange={() => toggleCat(cat)} label={`${cat} (${ARTICLES_ALL.filter(a=>a.cat===cat).length})`} />
              ))}
            </div>
          </div>
          <div className="card" style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Status</div>
            <RadioGroup name="statusFilter" value={statusFilter||"all"} onChange={v => { setStatusFilter(v==="all"?"":v); setPage(1); }}
              options={[{value:"all",label:"Todos"},{value:"ok",label:"Publicado"},{value:"info",label:"Em revisão"},{value:"warn",label:"Rascunho"}]} />
          </div>
          <div className="card" style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", color:"hsl(var(--muted-foreground))", marginBottom:10 }}>Ordenar por</div>
            <RadioGroup name="sortBy" value={sortBy} onChange={v => { setSortBy(v); setPage(1); }}
              options={[{value:"views",label:"Mais lidos"},{value:"titulo",label:"Alfabético"}]} />
          </div>
        </div>

        {/* Main content */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {/* Search */}
          <div className="card" style={{ padding:"12px 14px" }}>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <I.Article size={16} style={{ color:"hsl(var(--muted-foreground))", flexShrink:0 }} />
              <input className="field-input" placeholder="Buscar artigos, tags…" value={search}
                onChange={e => simulateSearch(e.target.value)}
                style={{ flex:1, padding:"6px 10px", border:"none", background:"transparent", outline:"none", fontSize:13, color:"hsl(var(--foreground))" }} />
              {search && <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => simulateSearch("")} style={{ padding:"4px 8px" }}>×</button>}
            </div>
          </div>

          {/* Stats */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 4px" }}>
            <span style={{ fontSize:12, color:"hsl(var(--muted-foreground))" }}>
              {filtered.length} {filtered.length === 1 ? "artigo" : "artigos"} encontrados
            </span>
            {(selectedCats.size > 0 || statusFilter || search) && (
              <button className="aa-btn aa-btn--ghost aa-btn--sm" onClick={() => { setSelectedCats(new Set()); setStatusFilter(""); setSearch(""); setPage(1); }}>
                Limpar filtros
              </button>
            )}
          </div>

          {/* Results */}
          {loading ? (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {[1,2,3].map(i => (
                <div key={i} className="card" style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:8 }}>
                  <Skeleton width="60%" height={14} />
                  <Skeleton width="40%" height={11} />
                  <div style={{ display:"flex", gap:8 }}>
                    <Skeleton width={60} height={20} rounded />
                    <Skeleton width={80} height={20} rounded />
                  </div>
                </div>
              ))}
            </div>
          ) : filtered.length === 0 ? (
            <div className="card">
              <EmptyState icon="🔍" title="Nenhum artigo encontrado"
                desc="Tente outros termos de busca ou remova filtros ativos."
                action="Limpar todos os filtros" onAction={() => { setSelectedCats(new Set()); setStatusFilter(""); setSearch(""); }} />
            </div>
          ) : (
            <>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {pageRows.map(a => (
                  <div key={a.id} className="card" style={{ padding:"16px 18px", cursor:"pointer", transition:"box-shadow 150ms, transform 150ms" }}
                    onMouseEnter={e => { e.currentTarget.style.boxShadow="0 4px 16px hsl(var(--foreground)/.08)"; e.currentTarget.style.transform="translateY(-1px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.boxShadow=""; e.currentTarget.style.transform=""; }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>{a.titulo}</div>
                        <div style={{ fontSize:12, color:"hsl(var(--muted-foreground))", marginBottom:8 }}>
                          por {a.autor} · {a.views.toLocaleString("pt-BR")} visualizações
                        </div>
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                          <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, background:"hsl(var(--muted))", fontWeight:500 }}>{a.cat}</span>
                          {a.tags.map(tag => (
                            <span key={tag} style={{ fontSize:10, padding:"2px 7px", borderRadius:999, border:"1px solid hsl(var(--border))", color:"hsl(var(--muted-foreground))" }}>#{tag}</span>
                          ))}
                        </div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                        <span className={`pill ${a.status}`} style={{ whiteSpace:"nowrap" }}><span className="dot"/>{a.label}</span>
                        <span style={{ fontSize:10, fontFamily:"var(--font-mono)", color:"hsl(var(--muted-foreground))" }}>{a.id}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <Pagination page={page} total={filtered.length} perPage={PER_PAGE} onChange={setPage} />
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function ProfileScreen({ user }) {

    const f = e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    setAvatarUrl(url);
  };

  const handleSave = () => {
    setSaved(true);
    setEditing(false);
    setTimeout(() => setSaved(false), 2000);
  };

          <div className="profile-avatar-wrap">
            <div className="profile-avatar">
              {avatarUrl ? <img src={avatarUrl} alt="Avatar" className="avatar-img" /> : initials}

        </div>
      </div>

      {/* Preferências */}
      <div className="card">
        <div className="card-header"><h3>Preferências</h3><p>Notificações e idioma</p></div>
        {[["Notificações por email","Receber alertas de atividade"],[" Resumo semanal","Email toda segunda-feira"],["Idioma","Português (Brasil)"]].map(([l,d],i)=>(
          <div key={i} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom: i<2?"1px solid hsl(var(--border))":"none" }}>
            <div><div style={{ fontSize:13,fontWeight:500 }}>{l}</div><div style={{ fontSize:11.5,color:"hsl(var(--muted-foreground))",marginTop:1 }}>{d}</div></div>
            <ToggleSwitch defaultOn={i===0} />
          </div>
        ))}

      {/* Atividade */}
      <div className="card">
        <div className="card-header"><h3>Atividade recente</h3></div>
        {[["Entrou no sistema","Agora há pouco","info"],["Perfil atualizado","há 2 dias","ok"],["Senha alterada","há 14 dias","warn"]].map(([act,when,st])=>(
          <div key={act} style={{ display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid hsl(var(--border)/.6)" }}>
            <span className={`pill ${st}`} style={{ minWidth:8,padding:"3px 8px",fontSize:11 }}>{act}</span>

      {/* Segurança */}
      <div className="card">
        <div className="card-header"><h3>Segurança</h3><p>Senha e autenticação de dois fatores</p></div>
        {[["Senha","Última alteração há 14 dias","Alterar senha"],["2FA","Não configurado","Configurar 2FA"]].map(([l,d,btn])=>(
          <div key={l} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid hsl(var(--border)/.6)" }}>
            <div><div style={{ fontSize:13,fontWeight:500 }}>{l}</div><div style={{ fontSize:11.5,color:"hsl(var(--muted-foreground))" }}>{d}</div></div>
            <button className="aa-btn aa-btn--outline aa-btn--sm">{btn}</button>
          </div>
        ))}
