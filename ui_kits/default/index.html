<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Choco — default UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:inherit}
  .app{display:grid;grid-template-columns:272px 1fr;min-height:100vh}

  /* ===== Sidebar ===== */
  .side{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));padding:18px 14px;display:flex;flex-direction:column;gap:2px;border-right:1px solid hsl(var(--sidebar-border));position:relative}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px}
  .brand-mark{width:32px;height:32px;border-radius:8px;background:hsl(var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:15px}
  .brand-name{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em}
  .brand-sub{font-size:10px;font-family:var(--font-mono);color:hsl(var(--sidebar-foreground)/.6);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .section-label{font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--sidebar-foreground)/.5);padding:14px 10px 6px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13.5px;color:hsl(var(--sidebar-foreground)/.85);position:relative;cursor:pointer}
  .nav:hover{background:hsl(var(--sidebar-accent)/.6);color:#fff}
  .nav.active{background:hsl(var(--sidebar-accent));color:#fff;font-weight:500}
  .nav.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:hsl(var(--sidebar-indicator));border-radius:0 3px 3px 0}
  .nav .ic{width:16px;height:16px;flex-shrink:0;opacity:.85}
  .nav .count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:hsl(var(--sidebar-indicator));font-weight:500}
  .user{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:hsl(var(--sidebar-accent));border:1px solid hsl(var(--sidebar-border))}
  .avatar{width:32px;height:32px;border-radius:999px;background:hsl(var(--accent)/.25);color:hsl(var(--sidebar-foreground));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:12px;border:1px solid hsl(var(--accent)/.5)}
  .uname{font-size:12.5px;font-weight:500}
  .umail{font-size:10px;color:hsl(var(--sidebar-foreground)/.65);font-family:var(--font-mono)}

  /* ===== Main (no topbar) ===== */
  .main{display:flex;flex-direction:column;min-width:0}
  .page{padding:28px 32px 40px;display:flex;flex-direction:column;gap:18px;width:100%}

  /* Header pattern: eyebrow mono + h2 Lora big + sub */
  .eyebrow-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:6px}
  .eyebrow-stack{display:flex;flex-direction:column;gap:4px;min-width:0}
  .crumb-mono{font-family:var(--font-mono);font-size:11px;color:hsl(var(--muted-foreground));text-transform:lowercase;letter-spacing:.06em;line-height:1}
  h2.page-title{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.02em;margin:0;line-height:1.15;text-transform:none}
  .page-sub{font-size:12.5px;color:hsl(var(--muted-foreground));margin:6px 0 0;max-width:620px;line-height:1.5}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500;transition:all 150ms;white-space:nowrap}
  .btn-primary{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
  .btn-primary:hover{background:hsl(var(--primary)/.92)}
  .btn-accent{background:hsl(var(--accent));color:hsl(var(--accent-foreground))}
  .btn-accent:hover{background:hsl(var(--accent)/.92)}
  .btn-secondary{background:hsl(var(--card));color:hsl(var(--foreground));border:1px solid hsl(var(--border))}
  .btn-secondary:hover{background:hsl(var(--muted))}
  .btn-ghost{color:hsl(var(--muted-foreground));padding:6px 10px}
  .btn-ghost:hover{background:hsl(var(--muted));color:hsl(var(--foreground))}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .kpi-label{font-size:11.5px;color:hsl(var(--muted-foreground));font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .kpi-value{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em}
  .kpi-delta{font-family:var(--font-mono);font-size:11px;display:inline-flex;align-items:center;gap:4px}
  .kpi-delta.up{color:hsl(var(--success))}
  .kpi-delta.dn{color:hsl(var(--destructive))}
  .kpi-delta.flat{color:hsl(var(--muted-foreground))}

  /* Filter row + contextual search */
  .filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;background:hsl(var(--card));border:1px solid hsl(var(--border));color:hsl(var(--muted-foreground));cursor:pointer}
  .chip.active{background:hsl(var(--primary));color:hsl(var(--primary-foreground));border-color:hsl(var(--primary))}
  .chip:hover:not(.active){background:hsl(var(--muted))}
  .ctx-search{margin-left:auto;display:flex;align-items:center;gap:8px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:10px;padding:6px 12px;width:280px}
  .ctx-search input{background:transparent;border:none;outline:none;flex:1;font-size:12.5px;color:hsl(var(--foreground))}
  .ctx-search input::placeholder{color:hsl(var(--muted-foreground))}
  .ctx-search:focus-within{border-color:hsl(var(--primary)/.5);box-shadow:0 0 0 3px hsl(var(--primary)/.08)}
  .kbd{font-family:var(--font-mono);font-size:10px;background:hsl(var(--muted));border:1px solid hsl(var(--border));padding:1px 5px;border-radius:4px;color:hsl(var(--muted-foreground))}

  /* Table card */
  .table-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;overflow:hidden;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .table-head{display:grid;gap:12px;padding:12px 22px;font-size:11px;font-weight:600;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid hsl(var(--border));white-space:nowrap}
  .table-rows{padding:8px 12px}
  .group-head{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.06em;color:hsl(var(--foreground));text-transform:uppercase;padding:14px 10px 6px;display:flex;align-items:center;gap:10px}
  .group-head::after{content:"";flex:1;height:1px;background:hsl(var(--border))}
  .row{display:grid;gap:12px;align-items:center;padding:10px 10px;border-radius:14px;cursor:pointer;font-size:13.5px;transition:background 150ms}
  .row:hover{background:hsl(var(--muted)/.55)}
  .row .name{display:flex;flex-direction:column;gap:2px;min-width:0}
  .row .name strong{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .name .meta{font-size:11px;color:hsl(var(--muted-foreground));font-family:var(--font-mono)}
  .num{font-family:var(--font-mono);font-feature-settings:'tnum';color:hsl(var(--muted-foreground));overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .actions{display:flex;gap:2px;justify-content:flex-end}
  .icon-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:hsl(var(--muted-foreground))}
  .icon-btn:hover{background:hsl(var(--muted));color:hsl(var(--foreground))}

  /* Per-view grid templates */
  .gt-romaneios .table-head, .gt-romaneios .row{grid-template-columns:1.6fr 200px 140px 110px 80px}
  .gt-lotes     .table-head, .gt-lotes     .row{grid-template-columns:1.5fr 1.1fr 100px 100px 110px 70px}
  .gt-rotas     .table-head, .gt-rotas     .row{grid-template-columns:1.4fr 90px 110px 110px 110px 70px}
  .gt-prod      .table-head, .gt-prod      .row{grid-template-columns:1.5fr 1.1fr 100px 110px 90px 70px}

  /* Status pill */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:500;width:fit-content}
  .pill .dot{width:6px;height:6px;border-radius:999px;background:currentColor}
  .pill.ok{background:hsl(var(--success)/.13);color:hsl(var(--success))}
  .pill.warn{background:hsl(var(--warning)/.18);color:hsl(35 85% 30%)}
  .pill.err{background:hsl(var(--destructive)/.1);color:hsl(0 70% 40%)}
  .pill.info{background:hsl(var(--info)/.13);color:hsl(var(--info))}
  .pill.neutral{background:hsl(var(--muted));color:hsl(var(--muted-foreground))}

  /* Side panel layout */
  .layout-2col{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:20px}
  .info-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:18px 20px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .info-card h3{font-size:13.5px;font-weight:500;margin:0 0 14px}
  .field{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid hsl(var(--border)/.6);gap:12px}
  .field:last-child{border-bottom:none}
  .field .k{color:hsl(var(--muted-foreground));flex-shrink:0}
  .field .v{font-family:var(--font-mono);text-align:right}

  .timeline{display:flex;flex-direction:column;gap:14px;padding-left:6px;border-left:1px dashed hsl(var(--border));margin-left:8px}
  .ev{position:relative;padding-left:18px;font-size:12.5px}
  .ev::before{content:"";position:absolute;left:-5px;top:6px;width:8px;height:8px;border-radius:999px;background:hsl(var(--primary))}
  .ev .when{font-family:var(--font-mono);font-size:10.5px;color:hsl(var(--muted-foreground));margin-bottom:2px}

  /* Tabs */
  .tabs{display:flex;gap:4px;border-bottom:1px solid hsl(var(--border));padding:0 4px}
  .tab{padding:10px 14px;font-size:13px;color:hsl(var(--muted-foreground));border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
  .tab.active{color:hsl(var(--foreground));border-bottom-color:hsl(var(--accent));font-weight:500}

  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:hsl(var(--foreground));color:hsl(var(--background));padding:12px 16px;border-radius:14px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px -8px hsl(var(--foreground)/.3);z-index:50;animation:rise 300ms ease}
  @keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  .toast .ok-mark{width:20px;height:20px;border-radius:999px;background:hsl(var(--success));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}

  /* Modal */
  .scrim{position:fixed;inset:0;background:hsl(var(--foreground)/.35);display:flex;align-items:center;justify-content:center;z-index:40;animation:fade 200ms ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:hsl(var(--card));border-radius:20px;padding:24px;width:480px;border:1px solid hsl(var(--border));box-shadow:0 30px 80px -20px hsl(var(--foreground)/.4)}
  .modal h3{font-family:var(--font-display);font-size:20px;margin:0 0 6px;font-weight:600}
  .modal p{font-size:13px;color:hsl(var(--muted-foreground));margin:0 0 18px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .form-row label{font-size:12px;color:hsl(var(--muted-foreground));font-weight:500}
  .form-row input,.form-row select{padding:9px 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--card));outline:none;color:hsl(var(--foreground))}
  .form-row input:focus,.form-row select:focus{border-color:hsl(var(--primary));box-shadow:0 0 0 3px hsl(var(--primary)/.12)}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

  /* Origem cards (grid) */
  .origin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .origin-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 2px hsl(var(--foreground)/.04);cursor:pointer;transition:all 150ms}
  .origin-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px hsl(var(--foreground)/.08);border-color:hsl(var(--primary)/.3)}
  .origin-flag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:hsl(var(--accent))}
  .origin-name{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em}
  .origin-region{font-size:12.5px;color:hsl(var(--muted-foreground));margin-top:-4px}
  .origin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 12px;margin-top:6px;padding-top:10px;border-top:1px solid hsl(var(--border)/.6)}
  .origin-stat{display:flex;flex-direction:column;gap:2px}
  .origin-stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:hsl(var(--muted-foreground));font-weight:500}
  .origin-stat .v{font-family:var(--font-mono);font-size:13.5px;color:hsl(var(--foreground))}
  .origin-certs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}

  /* Config view */
  .config-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .config-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:20px;box-shadow:0 1px 2px hsl(var(--foreground)/.04);display:flex;flex-direction:column;gap:12px}
  .config-card h3{font-size:14px;font-weight:600;margin:0}
  .config-card .desc{font-size:12.5px;color:hsl(var(--muted-foreground));margin:0}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid hsl(var(--border)/.6);font-size:13px}
  .toggle-row:last-child{border-bottom:none}
  .toggle-row .toggle{width:32px;height:18px;background:hsl(var(--muted));border-radius:999px;position:relative;cursor:pointer;transition:background 150ms;flex-shrink:0}
  .toggle-row .toggle.on{background:hsl(var(--primary))}
  .toggle-row .toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:999px;transition:transform 150ms}
  .toggle-row .toggle.on::after{transform:translateX(14px)}

  /* Design system view */
  .ds-section-label{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--accent));padding:14px 6px 4px;display:flex;align-items:center;gap:12px}
  .ds-section-label::after{content:"";flex:1;height:1px;background:hsl(var(--border))}
  .ds-section{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:20px;padding:24px 28px;box-shadow:0 1px 2px hsl(var(--foreground)/.04)}
  .ds-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .ds-demo-frame{background:hsl(var(--background));border:1px dashed hsl(var(--border));border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .ds-callout-bad{font-family:var(--font-mono);font-size:11px;color:hsl(var(--destructive));padding:6px 10px;background:hsl(var(--destructive)/.08);border-radius:6px;width:fit-content}
  .ds-callout-good{font-family:var(--font-mono);font-size:11px;color:hsl(var(--success));padding:6px 10px;background:hsl(var(--success)/.1);border-radius:6px;width:fit-content}
  .ds-icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px}
  .ds-icon-cell{aspect-ratio:1;border:1px solid hsl(var(--border));border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;color:hsl(var(--foreground))}
  .ds-icon-cell .ds-icon-name{font-family:var(--font-mono);font-size:9.5px;color:hsl(var(--muted-foreground))}
  .ds-icon-cell svg{width:20px;height:20px}
  .ds-input-demo{display:flex;flex-direction:column;gap:6px;width:240px}
  .ds-input-demo label{font-size:12px;color:hsl(var(--muted-foreground));font-weight:500}
  .ds-input-demo input{padding:9px 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--card));outline:none;color:hsl(var(--foreground));font-size:13px}
  .ds-input-demo input:focus{border-color:hsl(var(--primary));box-shadow:0 0 0 3px hsl(var(--primary)/.12)}
  .ds-anim-box{width:80px;height:48px;background:hsl(var(--primary)/.15);border:1px solid hsl(var(--primary)/.4);border-radius:8px;cursor:pointer;transition:all 200ms cubic-bezier(0.4,0,0.2,1)}
  .ds-anim-box:hover{background:hsl(var(--primary));transform:translateY(-2px)}
  .ds-mini-toast{background:hsl(var(--foreground));color:hsl(var(--background));padding:10px 14px;border-radius:14px;font-size:12.5px;display:inline-flex;align-items:center;gap:10px;box-shadow:0 8px 20px -6px hsl(var(--foreground)/.3)}
  .ds-mini-toast .ok-mark{width:18px;height:18px;border-radius:999px;background:hsl(var(--success));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
  .ds-mini-modal{background:hsl(var(--card));border-radius:16px;padding:18px;width:280px;border:1px solid hsl(var(--border));box-shadow:0 20px 50px -16px hsl(var(--foreground)/.3)}
  .ds-mini-modal h4{font-family:var(--font-display);font-size:16px;margin:0 0 4px;font-weight:600}
  .ds-mini-modal p{font-size:11.5px;color:hsl(var(--muted-foreground));margin:0 0 12px}
  .ds-side-demo{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));padding:10px;border-radius:14px;display:flex;flex-direction:column;gap:2px;width:240px}
  .ds-side-demo .nav-demo{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13px;color:hsl(var(--sidebar-foreground)/.85);position:relative}
  .ds-side-demo .nav-demo.active{background:hsl(var(--sidebar-accent));color:#fff;font-weight:500}
  .ds-side-demo .nav-demo.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:hsl(var(--sidebar-indicator));border-radius:0 3px 3px 0}
  .ds-side-demo .nav-demo svg{width:14px;height:14px;opacity:.85}
  .ds-container-vis{display:flex;flex-direction:column;gap:8px;width:100%}
  .ds-container-bar{height:24px;background:hsl(var(--accent)/.2);border:1px solid hsl(var(--accent)/.5);border-radius:6px;display:flex;align-items:center;padding:0 10px;font-family:var(--font-mono);font-size:10.5px;color:hsl(var(--foreground))}
  .ds-divider-demo{width:200px;height:1px;background:hsl(var(--border))}
  .ds-divider-dashed{width:200px;height:1px;background:repeating-linear-gradient(to right,hsl(var(--border)) 0,hsl(var(--border)) 4px,transparent 4px,transparent 8px)}
  .ds-section h3{font-family:var(--font-display);font-size:20px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .ds-section .ds-sub{font-size:12.5px;color:hsl(var(--muted-foreground));margin:0 0 18px}
  .ds-type-row{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:baseline;padding:14px 0;border-bottom:1px solid hsl(var(--border)/.6)}
  .ds-type-row:last-child{border-bottom:none}
  .ds-type-meta{font-family:var(--font-mono);font-size:11px;color:hsl(var(--muted-foreground));line-height:1.5}
  .ds-type-meta strong{color:hsl(var(--foreground));font-weight:500;display:block;margin-bottom:2px}
  .ds-swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .ds-swatch{border:1px solid hsl(var(--border));border-radius:14px;overflow:hidden;background:hsl(var(--card))}
  .ds-swatch-color{height:64px;display:flex;align-items:flex-end;padding:10px;color:#fff;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  .ds-swatch-color.dark-fg{color:hsl(16 38% 12%)}
  .ds-swatch-meta{padding:10px 12px;display:flex;flex-direction:column;gap:2px}
  .ds-swatch-meta .name{font-size:12.5px;font-weight:500}
  .ds-swatch-meta .hsl{font-family:var(--font-mono);font-size:10.5px;color:hsl(var(--muted-foreground))}

          <li><strong>Ícone com propósito</strong>, não decoração. Status, primary action, file type. Não em todo label.</li>
          <li><strong>Sem gradientes em UI.</strong> Banido em hero AI bluish-purple. Surface flat hue-washed é o canvas.</li>
        </ul>

// App shell
// ============================================================
function App() {
  const [active, setActive] = useState("romaneios");
  const [modal, setModal] = useState(false);
  const [toast, setToast] = useState(null);

  const submit = () => {
    setModal(false);
    setToast("Romaneio RM-0625 criado");
    setTimeout(() => setToast(null), 2400);
  };

  const VIEWS = {
    romaneios:  () => <RomaneiosView onNew={() => setModal(true)} />,
    lotes:      LotesView,
    rotas:      RotasView,
    origens:    OrigensView,
    produtores: ProdutoresView,
    config:     ConfigView,
    design:     SystemView,
  };
  const View = VIEWS[active] || RomaneiosView;

  return (
    <div className="app">
      <Sidebar active={active} onNav={setActive} />
      <div className="main">
        <View />
      </div>

      {modal && (
        <div className="scrim" onClick={(e)=>{if(e.target===e.currentTarget) setModal(false)}}>
          <div className="modal">
            <h3>Novo romaneio</h3>
            <p>Crie um novo romaneio. O número será gerado automaticamente.</p>
            <div className="form-row"><label>Cliente</label><select><option>Barry Callebaut · BR</option><option>FEMSA · MX</option><option>Nestlé · CIV</option></select></div>
            <div className="form-row"><label>Origem</label><input defaultValue="Salvador, BA" /></div>
            <div className="form-row"><label>Destino</label><input defaultValue="Lyon, FR" /></div>
            <div className="form-row"><label>Volume estimado (t)</label><input defaultValue="11.0" /></div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={submit}>Criar romaneio</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast">
          <div className="ok-mark">✓</div>
          <span>{toast}</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
