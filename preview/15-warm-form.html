<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:230px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);padding:16px 20px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:12px;color:hsl(20 29% 33%);font-weight:500}
  input,select{font-family:'Poppins',sans-serif;font-size:14px;padding:9px 12px;border:1px solid hsl(30 20% 87%);border-radius:8px;background:#fff;color:hsl(16 38% 12%);outline:none}
  input:focus{border-color:hsl(184 100% 18%);box-shadow:0 0 0 3px hsl(184 100% 18% / .12)}
  .help{font-size:11px;color:hsl(20 29% 33% / .8)}
  .err{color:hsl(0 80% 40%);font-size:11px}
  .group{display:flex;flex-direction:column;gap:18px}
  .lbl{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(20 29% 33% / .7);grid-column:1/-1;margin-bottom:-8px}
</style></head><body>
<div class="lbl">// form — label text-xs, space-y-1.5 inside field, space-y-4 between</div>
<div class="group">
  <div class="field"><label>Origin region</label><input value="São Paulo, BR" /><span class="help">Used for routing and customs.</span></div>
  <div class="field"><label>Cargo type</label><select><option>Cocoa mass · 65% solids</option></select></div>
</div>
<div class="group">
  <div class="field"><label>Tonnage</label><input value="12.4" /><span class="err">Exceeds container limit (11.8 t)</span></div>
  <div class="field"><label>ETA</label><input value="2026-05-12" style="border-color:hsl(184 100% 18%);box-shadow:0 0 0 3px hsl(184 100% 18% / .12)" /></div>
</div>
</body></html>
