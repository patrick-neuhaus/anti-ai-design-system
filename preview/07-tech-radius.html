<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);display:flex;align-items:center;justify-content:space-around;padding:16px;box-sizing:border-box}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:60px;height:60px;background:hsl(222 25% 13%);border-radius:0}
  .name{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(222 12% 38%)}
  .px{font-family:'Geist Mono',monospace;font-size:9px;color:hsl(222 12% 38% / .7)}
  .stamp{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(0 70% 45%);border:1px solid hsl(0 70% 45%);padding:3px 8px}
</style></head><body>
<div class="col"><div class="box"></div><div class="name">sm</div><div class="px">0px</div></div>
<div class="col"><div class="box"></div><div class="name">md</div><div class="px">0px</div></div>
<div class="col"><div class="box"></div><div class="name">lg</div><div class="px">0px</div></div>
<div class="col"><div class="box"></div><div class="name">xl</div><div class="px">0px</div></div>
<div class="col"><div class="stamp">RADIUS = 0 · BRUTALIST</div><div class="px" style="margin-top:6px;text-align:center">avatars only:<br/>rounded-full</div></div>
</body></html>
