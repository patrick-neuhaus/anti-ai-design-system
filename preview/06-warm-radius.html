<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);display:flex;align-items:center;justify-content:space-around;padding:16px;box-sizing:border-box}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:60px;height:60px;background:hsl(184 100% 18%);border:1px solid hsl(184 80% 22%)}
  .name{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(20 29% 33%)}
  .px{font-family:'Geist Mono',monospace;font-size:9px;color:hsl(20 29% 33% / .6)}
</style></head><body>
<div class="col"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="px">6px · input</div></div>
<div class="col"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="px">8px · select</div></div>
<div class="col"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="px">12px · button</div></div>
<div class="col"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="px">16px · row</div></div>
<div class="col"><div class="box" style="border-radius:20px"></div><div class="name">2xl</div><div class="px">20px · card</div></div>
</body></html>
