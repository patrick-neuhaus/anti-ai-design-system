<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:160px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);display:flex;align-items:center;justify-content:space-around;padding:16px;box-sizing:border-box}
  .card{width:140px;height:90px;background:#fff;border:1px solid hsl(30 20% 87%);border-radius:20px;padding:12px;display:flex;flex-direction:column;justify-content:space-between}
  .a{box-shadow:0 1px 2px hsl(16 38% 12% / .04)}
  .b{box-shadow:0 4px 10px -2px hsl(16 38% 12% / .08)}
  .c{box-shadow:0 12px 30px -8px hsl(16 38% 12% / .14)}
  .name{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(20 29% 33%)}
  .use{font-size:11px;color:hsl(20 29% 33%)}
</style></head><body>
<div class="card a"><div class="name">shadow-sm</div><div class="use">static cards</div></div>
<div class="card b"><div class="name">shadow-md</div><div class="use">hover · lift</div></div>
<div class="card c"><div class="name">shadow-lg</div><div class="use">popover · modal</div></div>
</body></html>
