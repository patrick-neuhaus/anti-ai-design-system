<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:240px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);padding:16px 20px;box-sizing:border-box}
  .display{font-family:'Lora',serif;font-size:30px;font-weight:600;letter-spacing:-.025em;line-height:1.1;margin:0}
  .h2{font-size:20px;font-weight:600;letter-spacing:-.02em;margin:14px 0 2px;line-height:1.25}
  .h3{font-size:14px;font-weight:500;margin:10px 0 2px}
  .body{font-size:14px;line-height:1.5;color:hsl(20 29% 33%);margin:0;max-width:560px}
  .label{font-size:12px;color:hsl(20 29% 33%);font-weight:500;letter-spacing:.01em}
  .meta{font-size:10px;color:hsl(20 29% 33% / .7);font-family:'Geist Mono',monospace;margin-top:6px;display:flex;gap:18px}
</style></head><body>
<h1 class="display">Lora — para títulos editoriais.</h1>
<h2 class="h2">Page title — Poppins 20/600</h2>
<p class="body">Body em Poppins 14/400. Tracking neutro, line-height 1.5. Foreground tem hue (não <code>0 0% 12%</code>) — sinal de intenção.</p>
<div class="meta">
  <span>3xl 30/600</span>
  <span>xl 20/600</span>
  <span>sm 14/400</span>
  <span>xs 12/500</span>
</div>
</body></html>
