<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;height:150px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%)}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  .grid{display:grid;grid-template-columns:repeat(8,1fr);height:100%;border-top:1px solid hsl(222 10% 88%);border-bottom:1px solid hsl(222 10% 88%)}
  .sw{display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:9px;font-family:'Geist Mono',monospace;border-right:1px solid hsl(222 10% 88%)}
  .sw:last-child{border-right:none}
  .name{font-weight:600;font-size:10px}
  .hex{opacity:.6}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:hsl(222 15% 99%)"><div class="name">bg</div><div class="hex">222 15 99</div></div>
  <div class="sw" style="background:hsl(0 0% 100%)"><div class="name">card</div><div class="hex">0 0 100</div></div>
  <div class="sw" style="background:hsl(222 12% 93%)"><div class="name">muted</div><div class="hex">222 12 93</div></div>
  <div class="sw" style="background:hsl(222 20% 11%);color:hsl(222 15% 95%)"><div class="name">fg</div><div class="hex">222 20 11</div></div>
  <div class="sw" style="background:hsl(222 25% 13%);color:hsl(222 15% 95%)"><div class="name">sidebar</div><div class="hex">222 25 13</div></div>
  <div class="sw" style="background:hsl(217 91% 65%);color:#fff"><div class="name">indicator</div><div class="hex">217 91 65</div></div>
  <div class="sw" style="background:hsl(152 85% 30%);color:#fff"><div class="name">success</div><div class="hex">152 85 30</div></div>
  <div class="sw" style="background:hsl(0 70% 45%);color:#fff"><div class="name">destructive</div><div class="hex">0 70 45</div></div>
</div></body></html>
