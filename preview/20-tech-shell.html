<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:200px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);box-sizing:border-box;overflow:hidden}
  .shell{display:grid;grid-template-columns:172px 1fr;height:100%}
  .side{background:hsl(222 25% 13%);color:hsl(222 15% 95%);padding:14px 10px;display:flex;flex-direction:column;gap:2px;border-right:1px solid hsl(222 20% 22%)}
  .brand{font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;padding:6px 8px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .mark{width:22px;height:22px;background:hsl(217 91% 65%);color:hsl(222 25% 13%);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:11px;font-weight:600}
  .label{font-family:'Geist Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:hsl(222 15% 95% / .5);padding:8px 8px 4px}
  .nav{font-size:13px;padding:5px 8px;display:flex;align-items:center;gap:8px;color:hsl(222 15% 95% / .8);font-family:'Geist Mono',monospace;border-left:2px solid transparent}
  .nav.active{background:hsl(222 20% 22%);color:#fff;border-left-color:hsl(217 91% 65%)}
  .main{padding:14px 16px}
  .h2{font-size:18px;font-weight:600;letter-spacing:-.02em;margin:0}
  .sub{font-size:12px;color:hsl(222 12% 38%);margin:2px 0 12px;font-family:'Geist Mono',monospace}
  .card{background:#fff;border:1px solid hsl(222 10% 88%);padding:10px 14px;font-size:12px;display:flex;justify-content:space-between;align-items:center;font-family:'Geist Mono',monospace}
  .num{font-weight:600;font-size:14px;color:hsl(217 91% 35%)}
</style></head><body>
<div class="shell">
  <aside class="side">
    <div class="brand"><span class="mark">os</span>openstatus</div>
    <div class="label">monitor</div>
    <div class="nav active">[ status ]</div>
    <div class="nav">[ incidents ]</div>
    <div class="nav">[ probes ]</div>
    <div class="label">workspace</div>
    <div class="nav">[ team ]</div>
  </aside>
  <main class="main">
    <h2 class="h2">status</h2>
    <p class="sub">// 28 monitors · 27 ok · 1 degraded</p>
    <div class="card"><span>uptime · 30d</span><span class="num">99.94%</span></div>
  </main>
</div>
</body></html>
