<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);display:flex;align-items:center;gap:10px;padding:16px 20px;box-sizing:border-box;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border-radius:0}
  .primary{background:hsl(222 25% 13%);color:#fff;padding:7px 14px;border:1px solid hsl(222 25% 13%);font-size:13px;font-weight:500}
  .secondary{background:#fff;color:hsl(222 20% 11%);padding:7px 14px;border:1px solid hsl(222 10% 88%);font-size:13px;font-weight:500}
  .text{background:transparent;color:hsl(217 91% 35%);padding:7px 6px;border:none;font-size:13px;font-family:'Geist Mono',monospace}
  .danger{background:#fff;color:hsl(0 70% 45%);padding:7px 14px;border:1px solid hsl(0 70% 45%);font-size:13px;font-weight:500;font-family:'Geist Mono',monospace}
  .label{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(222 12% 38%);width:100%}
  .text:hover{text-decoration:underline}
</style></head><body>
<div class="label">// buttons — radius 0, hairline border, brackets for text-first actions</div>
<button class="primary">Deploy</button>
<button class="secondary">Cancel</button>
<button class="text">[copy]</button>
<button class="text">[edit]</button>
<button class="danger">[delete]</button>
</body></html>
