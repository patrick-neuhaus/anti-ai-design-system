<!doctype html>
<html><head><meta charset="utf-8"><title>Anti-AI · presets</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif}
  .wrap{display:grid;grid-template-columns:1fr 1fr;height:150px}
  .panel{padding:18px 22px;display:flex;flex-direction:column;justify-content:space-between}
  .warm{background:hsl(30 33% 96%);color:hsl(16 38% 12%)}
  .tech{background:hsl(222 15% 99%);color:hsl(222 20% 11%);font-family:'Inter',sans-serif}
  .label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:hsl(16 38% 12% / .5);font-weight:600}
  .tech .label{color:hsl(222 20% 11% / .5);font-family:'Geist Mono',monospace;letter-spacing:0}
  h2{font-family:'Lora',serif;font-size:22px;font-weight:600;margin:0;letter-spacing:-.02em}
  .tech h2{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;letter-spacing:-.02em}
  .row{display:flex;gap:6px;align-items:center}
  .sw{width:18px;height:18px;border-radius:6px;border:1px solid hsl(30 20% 87%)}
  .tech .sw{border-radius:0;border-color:hsl(222 10% 88%)}
  .pill{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:500}
  .meta{font-size:11px;color:hsl(16 38% 12% / .55)}
  .tech .meta{color:hsl(222 20% 11% / .55);font-family:'Geist Mono',monospace}
</style></head><body>
<div class="wrap">
  <div class="panel warm">
    <div class="label">warm-editorial</div>
    <h2>Caloroso. Editorial.</h2>
    <div class="row">
      <span class="sw" style="background:hsl(30 33% 96%)"></span>
      <span class="sw" style="background:hsl(16 38% 12%)"></span>
      <span class="sw" style="background:hsl(184 100% 18%)"></span>
      <span class="sw" style="background:hsl(12 65% 55%)"></span>
      <span class="meta" style="margin-left:8px">Poppins · Lora</span>
    </div>
  </div>
  <div class="panel tech">
    <div class="label">minimalist-tech</div>
    <h2>Brutal. Mono-first.</h2>
    <div class="row">
      <span class="sw" style="background:hsl(222 15% 99%)"></span>
      <span class="sw" style="background:hsl(222 20% 11%)"></span>
      <span class="sw" style="background:hsl(222 25% 13%)"></span>
      <span class="sw" style="background:hsl(217 91% 65%)"></span>
      <span class="meta" style="margin-left:8px">Inter · Geist Mono</span>
    </div>
  </div>
</div>
</body></html>
