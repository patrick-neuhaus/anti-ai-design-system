<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:240px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);padding:16px 20px;box-sizing:border-box}
  .card{background:#fff;border:1px solid hsl(222 10% 88%);overflow:hidden;max-width:520px}
  .head{padding:10px 16px;border-bottom:1px solid hsl(222 10% 88%);display:flex;justify-content:space-between;align-items:center}
  .title{font-size:13px;font-weight:500;margin:0;font-family:'Geist Mono',monospace}
  .meta{font-size:11px;color:hsl(222 12% 38%);font-family:'Geist Mono',monospace}
  .row{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;padding:9px 16px;font-size:13px;font-family:'Geist Mono',monospace;border-bottom:1px solid hsl(222 10% 88%)}
  .row:last-child{border-bottom:none}
  .dot{width:7px;height:7px}
  .ok{background:hsl(152 85% 30%)} .deg{background:hsl(38 92% 35%)} .down{background:hsl(0 70% 45%)}
  .num{color:hsl(222 12% 38%)}
  .lbl{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(222 12% 38%);margin-bottom:8px}
</style></head><body>
<div class="lbl">// border-only card — no shadow, no radius, mono-first</div>
<div class="card">
  <div class="head"><h3 class="title">incidents/active</h3><span class="meta">3 open</span></div>
  <div class="row"><span class="dot down"></span><span>api.eu-west-2 · 503 elevated</span><span class="num">2m ago</span><span>[view]</span></div>
  <div class="row"><span class="dot deg"></span><span>cdn.assets · p99 latency</span><span class="num">14m ago</span><span>[view]</span></div>
  <div class="row"><span class="dot ok"></span><span>db.primary · recovered</span><span class="num">1h ago</span><span>[view]</span></div>
</div>
</body></html>
