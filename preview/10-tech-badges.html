<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);display:flex;align-items:center;gap:10px;padding:16px 20px;box-sizing:border-box;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;font-family:'Geist Mono',monospace;font-size:11px;font-weight:500;border:1px solid;text-transform:lowercase}
  .dot{width:6px;height:6px}
  .success{color:hsl(152 85% 30%);border-color:hsl(152 85% 30%);background:hsl(152 85% 30% / .06)} .success .dot{background:hsl(152 85% 30%)}
  .warn{color:hsl(38 92% 35%);border-color:hsl(38 92% 35%);background:hsl(38 92% 35% / .06)} .warn .dot{background:hsl(38 92% 35%)}
  .err{color:hsl(0 70% 45%);border-color:hsl(0 70% 45%);background:hsl(0 70% 45% / .06)} .err .dot{background:hsl(0 70% 45%)}
  .info{color:hsl(217 91% 35%);border-color:hsl(217 91% 35%);background:hsl(217 91% 35% / .06)} .info .dot{background:hsl(217 91% 35%)}
  .neutral{color:hsl(222 20% 25%);border-color:hsl(222 10% 70%);background:hsl(222 12% 93%)} .neutral .dot{background:hsl(222 20% 25%)}
  .label{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(222 12% 38%);width:100%}
</style></head><body>
<div class="label">// status — squared, mono, hairline border. no radius.</div>
<span class="pill success"><span class="dot"></span>operational</span>
<span class="pill warn"><span class="dot"></span>degraded</span>
<span class="pill err"><span class="dot"></span>down</span>
<span class="pill info"><span class="dot"></span>maintenance</span>
<span class="pill neutral"><span class="dot"></span>unknown</span>
</body></html>
