<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:200px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);padding:16px 20px;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:18px;margin-bottom:12px}
  .swatch{width:28px;height:28px;border-radius:6px;background:hsl(184 100% 18%)}
  .label{font-family:'Geist Mono',monospace;font-size:11px;color:hsl(20 29% 33%);min-width:90px}
  .bar{height:14px;background:hsl(184 100% 18%);border-radius:6px}
  .legend{font-size:10px;font-family:'Geist Mono',monospace;color:hsl(20 29% 33% / .7);min-width:42px;text-align:right}
</style></head><body>
<div class="row"><span class="label">space-1</span><div class="bar" style="width:4px"></div><span class="legend">4px</span></div>
<div class="row"><span class="label">space-1.5</span><div class="bar" style="width:6px"></div><span class="legend">6px</span></div>
<div class="row"><span class="label">space-2</span><div class="bar" style="width:8px"></div><span class="legend">8px</span></div>
<div class="row"><span class="label">space-4</span><div class="bar" style="width:16px"></div><span class="legend">16px</span></div>
<div class="row"><span class="label">space-5</span><div class="bar" style="width:20px"></div><span class="legend">20px · container</span></div>
<div class="row"><span class="label">space-6</span><div class="bar" style="width:24px"></div><span class="legend">24px · shell</span></div>
<div class="row"><span class="label">space-8</span><div class="bar" style="width:32px"></div><span class="legend">32px</span></div>
</body></html>
