<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);display:flex;align-items:center;gap:14px;padding:16px 20px;box-sizing:border-box;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none}
  .primary{background:hsl(184 100% 18%);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
  .accent{background:hsl(12 65% 55%);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500}
  .secondary{background:transparent;color:hsl(16 38% 12%);padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid hsl(30 20% 87%)}
  .ghost{background:transparent;color:hsl(20 29% 33%);padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500}
  .ghost:hover{background:hsl(30 20% 90%)}
  .danger{background:transparent;color:hsl(0 80% 40%);padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid hsl(0 80% 40% / .25)}
  .label{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(20 29% 33% / .7);width:100%}
</style></head><body>
<div class="label">// buttons — radius lg (12px), no shadow, weight 500</div>
<button class="primary">+ Save</button>
<button class="accent">Confirm</button>
<button class="secondary">Cancel</button>
<button class="ghost">Skip</button>
<button class="danger">Delete</button>
</body></html>
