<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:240px;background:hsl(222 15% 99%);font-family:'Inter',sans-serif;color:hsl(222 20% 11%);padding:16px 20px;box-sizing:border-box}
  .display{font-size:30px;font-weight:600;letter-spacing:-.03em;line-height:1.1;margin:0}
  .h2{font-size:20px;font-weight:600;letter-spacing:-.02em;margin:14px 0 2px;line-height:1.25}
  .body{font-size:14px;line-height:1.5;color:hsl(222 12% 38%);margin:0;max-width:560px}
  .mono{font-family:'Geist Mono',monospace}
  .meta{font-size:10px;color:hsl(222 12% 38%);font-family:'Geist Mono',monospace;margin-top:8px;display:flex;gap:14px}
  code{font-family:'Geist Mono',monospace;background:hsl(222 12% 93%);padding:1px 5px;font-size:13px}
</style></head><body>
<h1 class="display">Inter. <span class="mono" style="color:hsl(217 91% 35%)">[mono]</span> first-class.</h1>
<h2 class="h2">Page title — Inter 20/600 tracking-tight</h2>
<p class="body">Status, numbers, kbd → <span class="mono">Geist Mono</span>. Brackets <code>[copy]</code> replace decorative icons. <code>tnum</code> on for tabular figures.</p>
<div class="meta">
  <span>// 3xl 30/600</span>
  <span>// xl 20/600</span>
  <span>// sm 14/400</span>
  <span>// mono cv11 ss01</span>
</div>
</body></html>
