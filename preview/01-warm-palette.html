<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:150px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);height:100%;gap:0}
  .sw{display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:9px;font-family:'Geist Mono',monospace}
  .name{font-weight:600;font-size:10px}
  .hex{opacity:.6}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:hsl(30 33% 96%);color:hsl(16 38% 12%)"><div class="name">bg</div><div class="hex">30 33 96</div></div>
  <div class="sw" style="background:hsl(0 0% 100%);color:hsl(16 38% 12%);border-right:1px solid hsl(30 20% 87%)"><div class="name">card</div><div class="hex">0 0 100</div></div>
  <div class="sw" style="background:hsl(30 20% 90%);color:hsl(16 38% 12%)"><div class="name">muted</div><div class="hex">30 20 90</div></div>
  <div class="sw" style="background:hsl(16 38% 12%);color:hsl(30 33% 96%)"><div class="name">fg</div><div class="hex">16 38 12</div></div>
  <div class="sw" style="background:hsl(184 100% 18%);color:#fff"><div class="name">primary</div><div class="hex">184 100 18</div></div>
  <div class="sw" style="background:hsl(12 65% 55%);color:#fff"><div class="name">accent</div><div class="hex">12 65 55</div></div>
  <div class="sw" style="background:hsl(152 85% 30%);color:#fff"><div class="name">success</div><div class="hex">152 85 30</div></div>
  <div class="sw" style="background:hsl(38 92% 50%);color:hsl(16 38% 12%)"><div class="name">warning</div><div class="hex">38 92 50</div></div>
</div></body></html>
