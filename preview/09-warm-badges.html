<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
  html,body{margin:0;padding:0;height:170px;background:hsl(30 33% 96%);font-family:'Poppins',sans-serif;color:hsl(16 38% 12%);display:flex;align-items:center;gap:14px;padding:16px 20px;box-sizing:border-box;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500}
  .dot{width:6px;height:6px;border-radius:999px}
  .success{background:hsl(152 85% 30% / .12);color:hsl(152 85% 22%)} .success .dot{background:hsl(152 85% 30%)}
  .warn{background:hsl(38 92% 50% / .14);color:hsl(35 80% 30%)} .warn .dot{background:hsl(38 92% 50%)}
  .err{background:hsl(0 100% 50% / .1);color:hsl(0 80% 40%)} .err .dot{background:hsl(0 100% 50%)}
  .info{background:hsl(217 91% 45% / .12);color:hsl(217 91% 35%)} .info .dot{background:hsl(217 91% 45%)}
  .pending{background:hsl(30 20% 87%);color:hsl(16 38% 20%)} .pending .dot{background:hsl(20 29% 33%)}
  .label{font-family:'Geist Mono',monospace;font-size:10px;color:hsl(20 29% 33% / .7);width:100%}
</style></head><body>
<div class="label">// status badges — capsule, with optional dot. semi-transparent bg, hue-aligned</div>
<span class="pill success"><span class="dot"></span>Approved</span>
<span class="pill warn"><span class="dot"></span>Pending review</span>
<span class="pill err"><span class="dot"></span>Failed</span>
<span class="pill info"><span class="dot"></span>In transit</span>
<span class="pill pending"><span class="dot"></span>Draft</span>
</body></html>
